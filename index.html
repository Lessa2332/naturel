<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чарівний віночок 🌸</title>
    <!-- Підключення WebAR.rocks.face (легкий face tracking + Three.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@webar-rocks/face@1.0.5/dist/webar-face.min.js"></script>
    <!-- Додаткові бібліотеки для фото -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* щоб не виділялися кнопки/емодзі */
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: #000;
            touch-action: none; /* покращує роботу з тач-екраном */
        }

        /* Головний контейнер AR */
        #ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* Панель квіток (емодзі) внизу */
        .flower-panel {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            margin: 0 16px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .flower-emoji {
            font-size: 44px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            background: rgba(255,255,240,0.7);
            border-radius: 60px;
            padding: 6px;
            width: 64px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .flower-emoji:active {
            transform: scale(0.9);
        }

        /* Кнопки управління */
        .button-bar {
            position: fixed;
            bottom: 110px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            padding: 0 20px;
        }

        .magic-btn {
            background: rgba(255, 220, 200, 0.9);
            backdrop-filter: blur(12px);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: #5a3e2b;
            font-family: inherit;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .magic-btn:active {
            transform: scale(0.96);
            background: #ffe0c0;
        }

        .reset-btn {
            background: rgba(255, 180, 160, 0.9);
            color: #8b3c1c;
        }

        /* Лічильник квіток */
        .counter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            color: #fff3e6;
            font-weight: bold;
            font-size: 18px;
            z-index: 10;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* Привітання (показується при старті) */
        .welcome {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #ffdde1, #ee9ca7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            transition: opacity 1s ease;
            font-family: inherit;
            color: #3b2a1f;
        }

        .welcome h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(255,255,200,0.8);
        }

        .welcome p {
            font-size: 1.4rem;
            max-width: 80%;
            margin-bottom: 30px;
        }

        .welcome button {
            background: #ffb347;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* Приховуємо стандартні рамки навколо відео/канвас */
        video, canvas {
            outline: none;
        }

        @media (max-width: 600px) {
            .flower-emoji { font-size: 36px; width: 52px; }
            .magic-btn { padding: 8px 18px; font-size: 16px; }
            .counter { font-size: 14px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

<div id="ar-container"></div>
<div class="flower-panel" id="flowerPanel">
    <!-- Емодзі квіток (доступно багато, але обмеження 7) -->
    <div class="flower-emoji" data-flower="🌸">🌸</div>
    <div class="flower-emoji" data-flower="🌼">🌼</div>
    <div class="flower-emoji" data-flower="🌻">🌻</div>
    <div class="flower-emoji" data-flower="🌺">🌺</div>
    <div class="flower-emoji" data-flower="🌷">🌷</div>
    <div class="flower-emoji" data-flower="🌹">🌹</div>
    <div class="flower-emoji" data-flower="💮">💮</div>
    <div class="flower-emoji" data-flower="🌸">🌸</div> <!-- додаткова -->
</div>

<div class="button-bar">
    <button class="magic-btn" id="photoBtn">📸 Фото</button>
    <button class="magic-btn reset-btn" id="resetBtn">🌀 Скинути</button>
    <button class="magic-btn" id="saveBtn">💾 Зберегти</button>
</div>
<div class="counter" id="counter">🌼 0 / 7</div>

<div class="welcome" id="welcomeScreen">
    <h1>✨ Вітаю, чарівнице! ✨</h1>
    <p>Оберіть квіти для магічного віночка.<br>Збережіть природу та свою красу 🌍💚</p>
    <button id="startBtn">🌺 Розпочати чарівництво 🌸</button>
</div>

<script>
    (function(){
        // ---- Глобальні змінні ----
        let arScene = null;          // об'єкт WebAR.rocks.face
        let currentFlowers = [];     // масив вибраних квітів (емодзі)
        let flowerSprites = [];       // масив 3D-спрайтів (квіток у віночку)
        let groupFlowers = null;      // група Three.js для віночка
        let isARReady = false;
        let frameRequestId = null;
        let lastTimestamp = 0;
        const MAX_FLOWERS = 7;
        
        // Отримуємо доступ до Three.js через глобальний об'єкт WebAR
        let THREE = null;
        let scene = null;
        let camera = null;
        let renderer = null;
        
        // Елементи UI
        const flowerPanel = document.getElementById('flowerPanel');
        const resetBtn = document.getElementById('resetBtn');
        const photoBtn = document.getElementById('photoBtn');
        const saveBtn = document.getElementById('saveBtn');
        const counterDiv = document.getElementById('counter');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const startBtn = document.getElementById('startBtn');
        
        // Оновлення лічильника
        function updateCounter() {
            counterDiv.innerHTML = `🌸 ${currentFlowers.length} / ${MAX_FLOWERS}`;
        }
        
        // Скинути віночок
        function resetWreath() {
            currentFlowers = [];
            updateCounter();
            rebuildWreath();
            // магічний ефект: коротка вібрація (якщо підтримується)
            if (navigator.vibrate) navigator.vibrate(50);
        }
        
        // Побудувати віночок з поточних квітів
        function rebuildWreath() {
            if (!groupFlowers || !THREE) return;
            // видалити старі спрайти
            while(groupFlowers.children.length > 0) {
                groupFlowers.remove(groupFlowers.children[0]);
            }
            flowerSprites = [];
            
            const count = currentFlowers.length;
            if (count === 0) return;
            
            // Розташування по півколу над головою (радіус, кут)
            const radius = 0.32;      // радіус віночка
            const yOffset = 0.22;      // висота над центром обличчя (середина чола)
            const startAngle = -Math.PI / 2.2;  // початок зліва
            const endAngle = Math.PI / 2.2;      // кінець справа
            
            for (let i = 0; i < count; i++) {
                const t = count === 1 ? 0.5 : i / (count - 1); // 0..1
                const angle = startAngle + t * (endAngle - startAngle);
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius * 0.6; // трохи зміщено назад для об'єму
                const y = yOffset + Math.sin(angle) * 0.05; // легка хвиля
                
                // Створюємо спрайт з текстурою емодзі (використовуємо canvas texture)
                const emoji = currentFlowers[i];
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.font = '100px "Segoe UI Emoji"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(255,200,200,0.8)';
                ctx.fillText(emoji, 64, 64);
                // додаємо світіння
                const texture = new THREE.CanvasTexture(canvas);
                const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.95 });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(0.28, 0.28, 1);
                sprite.position.set(x, y, z);
                groupFlowers.add(sprite);
                flowerSprites.push(sprite);
                
                // Анімація пульсації (додамо пізніше в update)
            }
        }
        
        // Додати квітку
        function addFlower(emoji) {
            if (currentFlowers.length >= MAX_FLOWERS) {
                // легке попередження - вібрація + анімація лічильника
                if (navigator.vibrate) navigator.vibrate(200);
                counterDiv.style.transform = 'scale(1.2)';
                setTimeout(() => counterDiv.style.transform = '', 200);
                return;
            }
            currentFlowers.push(emoji);
            updateCounter();
            rebuildWreath();
            // магічний звук? (опціонально, без додаткових бібліотек)
            // можна зробити простий "динь" через Web Audio, але залишимо вібрацію
            if (navigator.vibrate) navigator.vibrate(30);
        }
        
        // Ініціалізація AR за допомогою WebAR.rocks.face
        async function initAR() {
            // Сховати привітання
            welcomeScreen.style.opacity = '0';
            setTimeout(() => welcomeScreen.style.display = 'none', 1000);
            
            const container = document.getElementById('ar-container');
            // Використовуємо WebAR.rocks.face
            // Документація: створюємо об'єкт FaceFilter
            const faceFilter = new window.WebARFaceFilter({
                container: container,
                camera: { facingMode: 'user', width: 640, height: 480 },
                // обмеження FPS для енергоефективності
                maxFPS: 30,
                // автозапуск камери
                autoplay: true,
                onLoad: () => {
                    console.log('AR завантажено');
                    isARReady = true;
                    // Отримуємо Three.js сцену з faceFilter
                    // WebAR.rocks.face надає доступ до three.js об'єктів через .three
                    THREE = window.THREE || faceFilter.three;
                    scene = faceFilter.scene;
                    camera = faceFilter.camera;
                    renderer = faceFilter.renderer;
                    
                    // Створюємо групу для віночка, яка буде слідувати за обличчям
                    groupFlowers = new THREE.Group();
                    scene.add(groupFlowers);
                    
                    // Позиціонуємо групу відносно голови – в реальному часі оновлюємо
                    // WebAR.rocks.face має подію onFaceDetected, де отримуємо координати обличчя
                    faceFilter.onFaceDetected = (face) => {
                        if (face && groupFlowers) {
                            // Отримуємо 3D позицію носа/чола (landmark)
                            // У WebAR.rocks.face є face.mesh (ключові точки)
                            // Беремо точку верхньої частини перенісся (індекс 10)
                            if (face.mesh && face.mesh.length > 10) {
                                const noseBridge = face.mesh[10]; // 3D позиція
                                // Встановлюємо позицію групи віночка над носом (трохи вище)
                                groupFlowers.position.set(noseBridge.x, noseBridge.y + 0.12, noseBridge.z);
                            } else {
                                // fallback – приблизно центр екрану
                                groupFlowers.position.set(0, 0.2, -0.5);
                            }
                        }
                    };
                    
                    // Анімаційний цикл (пульсація квіток)
                    function animateFlowers() {
                        if (!flowerSprites) return;
                        const time = Date.now() * 0.008;
                        flowerSprites.forEach((sprite, idx) => {
                            const scale = 0.28 + Math.sin(time + idx) * 0.03;
                            sprite.scale.set(scale, scale, 1);
                        });
                        requestAnimationFrame(animateFlowers);
                    }
                    animateFlowers();
                    
                    // Додаткове налаштування енергоефективності: знижуємо якість текстур
                    if (renderer) renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                },
                onError: (err) => {
                    console.error('Помилка AR:', err);
                    alert('Не вдалося запустити камеру. Дозвольте доступ до камери.');
                }
            });
            
            // Запускаємо
            faceFilter.start();
            arScene = faceFilter;
        }
        
        // Функція для знімка (фото з AR)
        async function takePhoto() {
            if (!arScene || !renderer || !scene) {
                alert('Зачекайте, AR ще не готовий');
                return;
            }
            // Робимо знімок canvas renderer'а
            const canvas = renderer.domElement;
            if (!canvas) return;
            const dataURL = canvas.toDataURL('image/png');
            // Тимчасово показуємо зображення для підтвердження?
            const link = document.createElement('a');
            link.download = 'magic_wreath.png';
            link.href = dataURL;
            link.click();
            // Вібрація як магічний спалах
            if (navigator.vibrate) navigator.vibrate(100);
        }
        
        // Зберегти на телефон (через share API, або завантаження)
        async function saveToPhone() {
            if (!arScene || !renderer) return;
            const canvas = renderer.domElement;
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const file = new File([blob], 'charming_wreath.png', { type: 'image/png' });
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Мій чарівний віночок',
                        files: [file]
                    });
                } catch(e) { 
                    // fallback
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'wreath.png';
                    a.click();
                    URL.revokeObjectURL(url);
                }
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'magic_wreath.png';
                a.click();
                URL.revokeObjectURL(url);
            }
        }
        
        // Події для квіток
        function setupUI() {
            const flowers = document.querySelectorAll('.flower-emoji');
            flowers.forEach(flower => {
                flower.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const emoji = flower.getAttribute('data-flower') || flower.innerText;
                    addFlower(emoji);
                });
            });
            
            resetBtn.addEventListener('click', resetWreath);
            photoBtn.addEventListener('click', takePhoto);
            saveBtn.addEventListener('click', saveToPhone);
            startBtn.addEventListener('click', () => {
                initAR();
            });
        }
        
        // Викликаємо UI налаштування
        setupUI();
        
        // Адаптація до зміни розмірів
        window.addEventListener('resize', () => {
            if (renderer && camera) {
                const width = window.innerWidth;
                const height = window.innerHeight;
                renderer.setSize(width, height);
                if (camera.aspect) camera.aspect = width / height;
                camera.updateProjectionMatrix?.();
            }
        });
        
        // Якщо користувач захоче одразу почати без привітання - нехай натисне
        // Додатковий захист: якщо камера не підтримується
        if (!navigator.mediaDevices) {
            alert('Ваш пристрій не підтримує камеру для AR');
        }
    })();
</script>
</body>
</html>
