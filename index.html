<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartLessa · Квест-Вінок</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root { --gold: #f3cf8a; --glass: rgba(10, 20, 10, 0.8); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: system-ui, sans-serif; height: 100dvh; overflow: hidden; color: white; }

    /* Камери */
    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); z-index: 10; }
    #threeCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }

    /* UI ГРИ */
    .game-ui { position: absolute; inset: 0; z-index: 100; display: flex; flex-direction: column; pointer-events: none; }
    .top-panel { padding: 40px 20px; display: flex; justify-content: space-between; pointer-events: auto; }
    .status-badge { background: var(--glass); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--gold); backdrop-filter: blur(10px); }

    .bottom-panel { margin-top: auto; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); pointer-events: auto; }
    
    /* Кнопка переходу до маски */
    #wreathModeBtn { 
        display: none; width: 100%; background: var(--gold); color: #000; 
        padding: 18px; border-radius: 20px; font-weight: 800; border: none;
        margin-bottom: 15px; box-shadow: 0 0 20px rgba(243, 207, 138, 0.5);
        animation: pulse 2s infinite; cursor: pointer;
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

    /* Список квітів */
    .flower-grid { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .flower-item { 
        min-width: 70px; height: 85px; background: rgba(255,255,255,0.1); 
        border-radius: 15px; display: flex; flex-direction: column; align-items: center; 
        justify-content: center; opacity: 0.3; filter: grayscale(1); transition: 0.4s;
    }
    .flower-item.unlocked { opacity: 1; filter: grayscale(0); border: 1px solid var(--gold); background: var(--glass); }
    .flower-item.selected { background: var(--gold); }
    .flower-item.selected span { color: #000; }
    .flower-item img { width: 40px; height: 40px; }
    .flower-item span { font-size: 8px; margin-top: 5px; color: var(--gold); font-weight: bold; }

    /* Сканер */
    .scan-box { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 250px; height: 250px; border: 2px solid var(--gold); border-radius: 30px;
        display: flex; align-items: center; justify-content: center; opacity: 0.5;
    }
    .scan-box::after { content: "СКАНУЙ QR"; font-size: 12px; letter-spacing: 2px; color: var(--gold); }

    #msg { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 1000; }
  </style>
</head>
<body>

<div id="msg">НОВА КВІТКА У ГЕРБАРІЇ! 🌸</div>

<video id="videoElement" autoplay playsinline muted></video>
<canvas id="outputCanvas"></canvas>
<div id="threeCanvas"></div>

<div class="game-ui">
    <div class="top-panel">
        <div class="status-badge" id="counter">Знайдено: 0</div>
        <div class="status-badge" id="modeName">РЕЖИМ: ПОШУК</div>
    </div>

    <div class="scan-box" id="scannerVisual"></div>

    <div class="bottom-panel">
        <button id="wreathModeBtn" onclick="switchToWreathMode()">СПЛЕСТИ ВІНОК 🌿</button>
        <div class="flower-grid" id="flowerGrid"></div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

    const FLOWERS_DB = [
        { id: 1, name: 'Шафран', src: 'flower_1.png', code: 'SL_01' },
        { id: 2, name: 'Нарцис', src: 'flower_2.png', code: 'SL_02' },
        { id: 3, name: 'Тюльпан', src: 'flower_3.png', code: 'SL_03' },
        { id: 4, name: 'Сон-трава', src: 'flower_4.png', code: 'SL_04' },
        { id: 5, name: 'Півники', src: 'flower_5.png', code: 'SL_05' },
        { id: 6, name: 'Дзвоники', src: 'flower_6.png', code: 'SL_06' }
    ];

    let state = {
        found: [],
        selected: [],
        mode: 'SCAN', // 'SCAN' або 'WREATH'
        stream: null
    };

    let video, canvas, ctx, faceLandmarker, renderer, scene, camera3D, wreathGroup;

    async function init() {
        video = document.getElementById('videoElement');
        canvas = document.getElementById('outputCanvas');
        ctx = canvas.getContext('2d');

        await startCamera('environment');
        initThree();
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    async function startCamera(mode) {
        if (state.stream) state.stream.getTracks().forEach(t => t.stop());
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: mode, width: 1280, height: 720 }
        });
        state.stream = stream;
        video.srcObject = stream;
        
        // Віддзеркалення тільки для фронталки
        video.style.transform = mode === 'user' ? 'translate(-50%, -50%) scaleX(-1)' : 'translate(-50%, -50%) scaleX(1)';
        return new Promise(r => video.onloadedmetadata = r);
    }

    function initThree() {
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('threeCanvas').appendChild(renderer.domElement);
        scene = new THREE.Scene();
        camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        wreathGroup = new THREE.Group();
        scene.add(wreathGroup);
        scene.add(new THREE.AmbientLight(0xffffff, 2));
    }

    window.switchToWreathMode = async () => {
        state.mode = 'WREATH';
        document.getElementById('scannerVisual').style.display = 'none';
        document.getElementById('wreathModeBtn').style.display = 'none';
        document.getElementById('modeName').textContent = 'РЕЖИМ: ПРИМІРКА';
        
        await startCamera('user');
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
            runningMode: "VIDEO"
        });
    };

    function updateUI() {
        const grid = document.getElementById('flowerGrid');
        grid.innerHTML = '';
        FLOWERS_DB.forEach(f => {
            const isFound = state.found.includes(f.id);
            const isSel = state.selected.includes(f.id);
            const item = document.createElement('div');
            item.className = `flower-item ${isFound ? 'unlocked' : ''} ${isSel ? 'selected' : ''}`;
            item.innerHTML = `<img src="${f.src}"><span>${f.name}</span>`;
            
            item.onclick = () => {
                if (state.mode === 'WREATH' && isFound) {
                    toggleFlower(f.id);
                }
            };
            grid.appendChild(item);
        });
        document.getElementById('counter').textContent = `Знайдено: ${state.found.length}`;
        if (state.found.length > 0 && state.mode === 'SCAN') {
            document.getElementById('wreathModeBtn').style.display = 'block';
        }
    }

    function toggleFlower(id) {
        const idx = state.selected.indexOf(id);
        if (idx > -1) state.selected.splice(idx, 1);
        else state.selected.push(id);
        updateWreathModel();
        updateUI();
    }

    function updateWreathModel() {
        while(wreathGroup.children.length) wreathGroup.remove(wreathGroup.children[0]);
        state.selected.forEach((id, i) => {
            const f = FLOWERS_DB.find(x => x.id === id);
            const map = new THREE.TextureLoader().load(f.src);
            const mat = new THREE.SpriteMaterial({ map });
            const s = new THREE.Sprite(mat);
            const angle = (i / state.selected.length) * Math.PI * 2;
            s.position.set(Math.cos(angle) * 0.7, Math.sin(angle) * 0.2 + 0.5, 0);
            s.scale.set(0.4, 0.4, 1);
            wreathGroup.add(s);
        });
    }

    function gameLoop() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        if (state.mode === 'SCAN') {
            ctx.drawImage(video, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const qr = jsQR(data.data, data.width, data.height);
            if (qr) {
                const flower = FLOWERS_DB.find(f => f.code === qr.data);
                if (flower && !state.found.includes(flower.id)) {
                    state.found.push(flower.id);
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => document.getElementById('msg').style.display = 'none', 2000);
                    updateUI();
                    if(navigator.vibrate) navigator.vibrate(100);
                }
            }
        } else if (state.mode === 'WREATH' && faceLandmarker) {
            const res = faceLandmarker.detectForVideo(video, performance.now());
            if (res.faceLandmarks?.[0]) {
                const head = res.faceLandmarks[0][10];
                // Коригуємо позицію для віддзеркаленої камери
                wreathGroup.position.set((0.5 - head.x) * 3, (0.5 - head.y) * 3, -head.z * 2);
                wreathGroup.visible = true;
            } else wreathGroup.visible = false;
        }

        renderer.render(scene, camera3D);
        requestAnimationFrame(gameLoop);
    }

    init();
</script>
</body>
</html>
