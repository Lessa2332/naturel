<div class="welcome-screen" id="welcome">
  <div class="welcome-logo">SMARTLESSA</div>
  <div style="color: var(--gold); margin: 15px 0; font-weight: 600;">ПРИВІТ, ДОСЛІДНИКУ! 🌿</div>
  <div class="welcome-desc" style="font-size:16px; line-height: 1.5; padding: 0 10px;">
    Твоя місія: знайди 12 рідкісних рослин.<br>
    Шукай <b>12 QR-кодів</b> на першому поверсі школи.<br>
    Збери їх усі, щоб сплести магічний віночок!
  </div>
  <button class="start-btn" id="startBtn">РОЗПОЧАТИ КВЕСТ</button>
</div>

<script type="module">
  import * as THREE from 'three';
  import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';
  
  const jsQR = window.jsQR;
  
  const FLOWERS = [
    { id: 1, name: 'Шафран Гейфелів', img: 'flower_1.png' }, { id: 2, name: 'Нарцис', img: 'flower_2.png' },
    { id: 3, name: 'Тюльпан', img: 'flower_3.png' }, { id: 4, name: 'Горицвіт', img: 'flower_4.png' },
    { id: 5, name: 'Півники', img: 'flower_5.png' }, { id: 6, name: 'Сон-трава', img: 'flower_6.png' },
    { id: 7, name: 'Дзвоники', img: 'flower_7.png' }, { id: 8, name: 'Тирлич', img: 'flower_8.png' },
    { id: 9, name: 'Айстра', img: 'flower_9.png' }, { id: 10, name: 'Фіалка', img: 'flower_10.png' },
    { id: 11, name: 'Підсніжник', img: 'flower_11.png' }, { id: 12, name: 'Черевички', img: 'flower_12.png' }
  ];

  const QR_MAP = {};
  for(let i=1; i<=12; i++) { QR_MAP[`SMARTLESSA_FLOWER_${i}`] = i; }

  let foundFlowers = [];
  let wreathFlowers = [];
  let currentFacingMode = 'environment'; 
  let currentStream = null;
  let faceLandmarker = null;
  let video, canvas2d, ctx2d;
  let renderer, scene, camera3D, wreathGroup;

  // --- Логіка завантаження/збереження ---
  function loadLocal() {
    const stored = localStorage.getItem('smartlessa_found');
    foundFlowers = stored ? JSON.parse(stored) : [];
  }
  function saveLocal() {
    localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers));
  }
  loadLocal();

  // --- Візуалізація ---
  function processVideo() {
    if (video.readyState < 2) { requestAnimationFrame(processVideo); return; }

    ctx2d.save();
    // Дзеркало тільки для селфі-камери
    if (currentFacingMode === 'user') {
        ctx2d.translate(canvas2d.width, 0);
        ctx2d.scale(-1, 1);
    }
    ctx2d.drawImage(video, 0, 0, canvas2d.width, canvas2d.height);
    ctx2d.restore();

    // Скануємо QR тільки якщо працює основна камера (режим пошуку)
    if (currentFacingMode === 'environment' && jsQR) {
      const imageData = ctx2d.getImageData(0, 0, canvas2d.width, canvas2d.height);
      const code = jsQR(imageData.data, canvas2d.width, canvas2d.height, { inversionAttempts: "dontInvert" });
      if (code && QR_MAP[code.data]) {
        addFlower(QR_MAP[code.data]);
      }
    }

    // Обробка обличчя для вінка
    if (currentFacingMode === 'user' && faceLandmarker) {
      const results = faceLandmarker.detectForVideo(video, performance.now());
      if (results.faceLandmarks && results.faceLandmarks.length > 0) {
        const lm = results.faceLandmarks[0];
        // Точка 10 - верх лоба, 1 - кінчик носа
        const top = lm[10];
        const nose = lm[1];
        wreathGroup.position.set((top.x - 0.5) * -5, -(top.y - 0.4) * 5, -top.z * 5);
        wreathGroup.rotation.z = Math.atan2(lm[263].y - lm[33].y, lm[263].x - lm[33].x);
      }
    }

    requestAnimationFrame(processVideo);
  }

  function addFlower(id) {
    if (!foundFlowers.includes(id)) {
      foundFlowers.push(id);
      saveLocal();
      updateUI();
      const f = FLOWERS.find(x => x.id === id);
      showPopup(`🌼 ${f.name} знайдено!`);
      if (navigator.vibrate) navigator.vibrate(70);
      document.getElementById('addSound').play();
    }
  }

  function updateUI() {
    document.getElementById('flowerCounter').textContent = `${foundFlowers.length}/12`;
    // Тут можна оновити сітку гербарію
  }

  // --- Старт гри ---
  document.getElementById('startBtn').onclick = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacingMode, width: 640, height: 480 }
      });
      video.srcObject = stream;
      await video.play();
      canvas2d.width = video.videoWidth;
      canvas2d.height = video.videoHeight;
      
      document.getElementById('welcome').classList.add('hidden');
      
      // Ініціалізуємо MediaPipe у фоні
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
        runningMode: "VIDEO"
      });
      
      processVideo();
    } catch (err) {
      alert("Будь ласка, дозвольте доступ до камери для гри!");
    }
  };

  // Інші функції (initThree, updateWreath3D) залишаються без змін
</script>
