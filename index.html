
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1a">
  <title>VINOK 2050 · SMARTLESSA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      font-family: 'Segoe UI', 'Exo 2', system-ui, sans-serif;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    #videoElement, #outputCanvas {
      position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%; object-fit: cover;
      transform: translate(-50%, -50%) scaleX(-1);
      z-index: 10;
    }

    .author-badge {
      position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px;
      z-index: 1000; display: flex; align-items: center; gap: 10px;
      background: rgba(0, 255, 255, 0.1); backdrop-filter: blur(15px);
      padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(0, 255, 255, 0.4);
      text-decoration: none; transition: 0.3s;
      box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
    }
    .author-badge span {
      color: #a0f0ff; font-size: 11px; letter-spacing: 3px; font-weight: bold; text-transform: uppercase;
      text-shadow: 0 0 8px cyan;
    }

    #flowerNamePopup {
      position: fixed; top: 15%; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(0, 20, 30, 0.8); backdrop-filter: blur(20px);
      padding: 18px 35px; border-radius: 40px; border: 1px solid #0ff;
      z-index: 1100; opacity: 0; pointer-events: none;
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center; box-shadow: 0 0 30px #0ff8;
    }
    #flowerNamePopup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 20px calc(45px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, #000 60%, transparent);
      z-index: 1000; pointer-events: auto;
    }

    .flower-scroll {
      display: flex; gap: 14px; overflow-x: auto; padding: 10px 5px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .flower-scroll::-webkit-scrollbar { display: none; }

    .item-card {
      min-width: 90px; height: 100px;
      background: rgba(0, 255, 255, 0.05); backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 25px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: 0.2s; cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 200, 0.2);
    }
    .item-card:active { transform: scale(0.9); background: #0ff3; border-color: #0ff; }
    .item-card img { width: 55px; height: 55px; object-fit: contain; margin-bottom: 6px; }
    .item-card span { font-size: 9px; color: #8ef; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding: 0 10px; }
    .shutter { width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .shutter:active { transform: scale(0.9); }
    .shutter-inner { width: 85%; height: 85%; background: #fff; border-radius: 50%; }
    .btn-utility {
      width: 55px; height: 55px; border-radius: 20px;
      background: rgba(0, 255, 255, 0.1); backdrop-filter: blur(10px);
      border: 1px solid #0ff8; color: #fff; font-size: 1.5rem;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .btn-utility:active { transform: scale(0.9); background: #0ff4; }

    /* ===== 2050 HOLO WELCOME (стиль залишається) ===== */
    .welcome-screen {
      position: fixed; inset: 0; z-index: 2000;
      background: radial-gradient(circle at 30% 40%, #021218, #000);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: 1.2s cubic-bezier(0.7,0,0.3,1);
      backdrop-filter: blur(8px);
    }
    .welcome-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }

    .holo-ring {
      width: 280px; height: 280px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #0ff, #f0f, #0ff);
      filter: blur(25px);
      opacity: 0.3;
      animation: spinSlow 12s infinite linear;
      position: absolute;
    }
    @keyframes spinSlow { 100% { transform: rotate(360deg); } }

    .logo-2050 {
      font-size: 4.8rem; font-weight: 900; letter-spacing: 12px;
      text-transform: uppercase;
      background: linear-gradient(45deg, #a0f0ff, #b3ffd9, #b3b3ff);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px cyan;
      animation: textGlitch 3s infinite;
      position: relative; z-index: 10;
    }
    @keyframes textGlitch {
      0%,100% { transform: skew(0deg); opacity: 1; }
      95% { transform: skew(2deg); opacity: 0.9; text-shadow: 4px 0 cyan, -4px 0 magenta; }
      96% { transform: skew(-2deg); }
    }

    .subtitle-2050 {
      font-size: 1rem; letter-spacing: 6px; color: #7df; margin-top: 20px;
      text-transform: uppercase; font-weight: 300;
      border-top: 1px solid #0ff8; padding-top: 20px;
      backdrop-filter: blur(5px);
    }

    .start-btn {
      background: transparent; border: 2px solid #0ff;
      color: #0ff; padding: 18px 50px; border-radius: 60px;
      font-weight: 800; font-size: 1.3rem; cursor: pointer;
      margin-top: 60px; text-transform: uppercase; letter-spacing: 6px;
      box-shadow: 0 0 30px #0ff6; backdrop-filter: blur(10px);
      transition: 0.3s; z-index: 10;
    }
    .start-btn:hover { background: #0ff2; box-shadow: 0 0 50px #0ff; color: #fff; }
    .start-btn:active { transform: scale(0.95); }

    .ornament-2050 {
      width: 200px; height: 200px; position: absolute;
      border: 2px dashed #0ff8; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      animation: morph 8s infinite alternate;
      filter: drop-shadow(0 0 15px cyan);
      opacity: 0.6;
    }
    @keyframes morph {
      0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    }
  </style>
</head>
<body>

<a href="https://www.instagram.com/smartlessa" class="author-badge" target="_blank">
  <span>SMARTLESSA 2050</span>
  <div style="width: 12px; height: 12px; background: #0ff; border-radius: 50%; box-shadow: 0 0 20px #0ff;"></div>
</a>

<!-- 2050 WELCOME SCREEN -->
<div class="welcome-screen" id="welcome">
  <div class="holo-ring"></div>
  <div class="ornament-2050"></div>
  <div class="logo-2050">VINOK</div>
  <div class="subtitle-2050">╳ FLORA GUARDIAN ╳</div>
  <button class="start-btn" id="startBtn">⟁ ACCESS ⟁</button>
  <p style="margin-top: 30px; color: #6cf; font-size: 12px; letter-spacing: 3px;">NEURAL LINK · 2050</p>
</div>

<!-- AR VIEW -->
<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flowerNamePopup"><span id="popupText">КВІТКА</span></div>
  
  <div class="bottom-nav">
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
      <button class="btn-utility" onclick="resetWreath()">✕</button>
      <div class="shutter" onclick="capturePhoto()"><div class="shutter-inner"></div></div>
      <button class="btn-utility" id="shareBtn">↗</button>
    </div>
  </div>
</div>

<!-- 🎵 ФОНОВА МЕЛОДІЯ -->
<audio id="fonMusic" src="fon.mp3" loop preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
  (function(){
    "use strict";

    // ---------- 15 КВІТІВ (PNG з репо) ----------
    const redBookFlowers = [
      { id: 1, src: 'flower_1.png', name: 'Шафран Гейфелів' },
      { id: 2, src: 'flower_2.png', name: 'Нарцис вузьколистий' },
      { id: 3, src: 'flower_3.png', name: 'Тюльпан дібровний' },
      { id: 4, src: 'flower_4.png', name: 'Горицвіт весняний' },
      { id: 5, src: 'flower_5.png', name: 'Півники борові' },
      { id: 6, src: 'flower_6.png', name: 'Сон-трава велика' },
      { id: 7, src: 'flower_7.png', name: 'Дзвоники карпатські' },
      { id: 8, src: 'flower_8.png', name: 'Тирлич безстебловий' },
      { id: 9, src: 'flower_9.png', name: 'Айстра альпійська' },
      { id: 10, src: 'flower_10.png', name: 'Фіалка кримська' },
      { id: 11, src: 'flower_11.png', name: 'Підсніжник білосніжний' },
      { id: 12, src: 'flower_12.png', name: 'Зозулині черевички' },
      { id: 13, src: 'flower_13.png', name: 'Лілія лісова' },
      { id: 14, src: 'flower_14.png', name: 'Едельвейс альпійський' },
      { id: 15, src: 'flower_15.png', name: 'Червона рута' }
    ];

    // Завантаження PNG
    const loadedImages = {};
    redBookFlowers.forEach(f => {
      const img = new Image();
      img.src = f.src;
      loadedImages[f.id] = img;
    });

    // ---------- AR STATE ----------
    const state = { selected: [], smileScore: 0, popupTimer: null };
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoElement');
    const music = document.getElementById('fonMusic');

    // ---------- UI СКРОЛ ----------
    function initUI() {
      const scroll = document.getElementById('flowerScroll');
      redBookFlowers.forEach(f => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `<img src="${f.src}"><span>${f.name.split(' ')[0]}</span>`;
        card.onclick = () => {
          showName(f.name);
          if(state.selected.length < 12) {
            state.selected.push({ id: f.id, scale: 0, rotation: (Math.random()-0.5)*0.4 });
            if(navigator.vibrate) navigator.vibrate(40);
          }
        };
        scroll.appendChild(card);
      });
    }

    function showName(name) {
      const p = document.getElementById('flowerNamePopup');
      document.getElementById('popupText').textContent = name;
      p.classList.add('show');
      clearTimeout(state.popupTimer);
      state.popupTimer = setTimeout(() => p.classList.remove('show'), 2500);
    }

    // ---------- FACEMESH ----------
    async function startAR() {
      const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
      faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
      faceMesh.onResults(onResults);

      new Camera(video, {
        onFrame: async () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          await faceMesh.send({image: video});
        },
        width: 1280, height: 720
      }).start();
    }

    function onResults(results) {
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      if (results.multiFaceLandmarks?.[0]) {
        const landmarks = results.multiFaceLandmarks[0];
        
        // Посмішка (ширина рота)
        const mouthLeft = landmarks[61], mouthRight = landmarks[291];
        const mouthWidth = Math.hypot(mouthRight.x - mouthLeft.x, mouthRight.y - mouthLeft.y);
        state.smileScore = Math.max(0, (mouthWidth - 0.13) * 25);
        
        if(state.smileScore > 0.5) drawDoubleRibbons(landmarks);
        drawWreath(landmarks);
      }
      ctx.restore();
    }

    function drawDoubleRibbons(landmarks) {
      const left = landmarks[234], right = landmarks[454];
      const headW = Math.abs(right.x * canvas.width - left.x * canvas.width);
      const time = Date.now() / 250;
      const wave = Math.sin(time) * 30;

      ctx.save();
      ctx.lineWidth = canvas.width * 0.04;
      ctx.lineCap = 'round';
      // ❌ БЕЗ НЕОНОВОГО СВІТІННЯ — тільки легка тінь для реалістичності
      ctx.shadowBlur = 8; 
      ctx.shadowColor = 'rgba(0,0,0,0.3)';

      const drawSide = (point, side) => {
        const sx = point.x * canvas.width;
        const sy = point.y * canvas.height - (headW * 0.48);
        const ex = side === 'left' ? canvas.width * 0.15 : canvas.width * 0.85;
        const ey = canvas.height * 0.85;

        // Синя стрічка (природний відтінок)
        ctx.strokeStyle = '#2a6f9c';
        ctx.beginPath(); 
        ctx.moveTo(sx - 12, sy);
        ctx.bezierCurveTo(sx + (side==='left'?-100:100) + wave, sy + 180, ex + (side==='left'?80:-80), ey - 150, ex - 12, ey);
        ctx.stroke();

        // Жовта стрічка (природний відтінок)
        ctx.strokeStyle = '#e0b044';
        ctx.beginPath(); 
        ctx.moveTo(sx + 12, sy);
        ctx.bezierCurveTo(sx + (side==='left'?-70:70) + wave, sy + 180, ex + (side==='left'?110:-110), ey - 150, ex + 12, ey);
        ctx.stroke();
      };

      drawSide(left, 'left');
      drawSide(right, 'right');
      ctx.restore();
    }

    function drawWreath(landmarks) {
      const headW = Math.abs(landmarks[454].x * canvas.width - landmarks[234].x * canvas.width);
      const raiseSide = headW * 0.48;
      const raiseTop  = headW * 0.68;

      const p0 = { 
        x: landmarks[234].x * canvas.width, 
        y: landmarks[234].y * canvas.height - raiseSide 
      };
      const p2 = { 
        x: landmarks[454].x * canvas.width, 
        y: landmarks[454].y * canvas.height - raiseSide 
      };
      const p1 = { 
        x: (p0.x + p2.x) / 2, 
        y: (landmarks[10].y * canvas.height) - raiseTop 
      };

      state.selected.forEach((f, i) => {
        const t = state.selected.length === 1 ? 0.5 : i / (state.selected.length - 1);
        const mt = 1 - t;
        const x = mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x;
        const y = mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y;

        if(f.scale < 1) f.scale += 0.08;
        const size = (headW * 0.3) * f.scale * (1 + state.smileScore * 0.2);
        const img = loadedImages[f.id];

        if(img && img.complete) {
          ctx.save(); 
          ctx.translate(x, y); 
          ctx.rotate(f.rotation);
          // ❌ БЕЗ НЕОНУ — тільки природна легка тінь
          ctx.shadowBlur = 10;
          ctx.shadowColor = 'rgba(0,0,0,0.2)';
          ctx.drawImage(img, -size/2, -size/2, size, size); 
          ctx.restore();
        }
      });
    }

    // ---------- CONTROLS ----------
    window.resetWreath = () => {
      state.selected = [];
      if(navigator.vibrate) navigator.vibrate(20);
    };

    window.capturePhoto = () => {
      const link = document.createElement('a');
      link.download = `vinok-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      if(navigator.vibrate) navigator.vibrate([30,30,30]);
    };

    document.getElementById('shareBtn').onclick = async () => {
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      const file = new File([blob], 'vinok-ar.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Vinok AR', text: '🌿 Хранитель Флори' });
      } else { capturePhoto(); }
    };

    // ---------- START ----------
    document.getElementById('startBtn').onclick = () => {
      document.getElementById('welcome').classList.add('hidden');
      music.play().catch(e => console.log('🎵 Мелодія готова до відтворення'));
      startAR();
    };

    initUI();
  })();
</script>
</body>
</html>
