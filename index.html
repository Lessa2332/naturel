<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a3a1a">
    <title>Вінок · 7 квітів</title>
    <style>
        :root {
            --gold: #eabd6a;
            --dark-green: #0f1f0f;
            --panel-bg: rgba(44, 58, 40, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--dark-green);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* Контейнер додатку */
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #1a2a1a;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Камера */
        .camera-box {
            position: relative;
            flex-grow: 1;
            background: #000;
            overflow: hidden;
        }

        #videoElement, #outputCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scaleX(-1);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
        }

        /* Інтерфейс поверх камери */
        .overlay-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding-bottom: env(safe-area-inset-bottom);
        }

        .counter {
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Панель вибору */
        .flower-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-top: 1px solid rgba(234, 189, 106, 0.3);
        }

        .flower-strip {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 0 20px;
            scrollbar-width: none;
        }
        .flower-strip::-webkit-scrollbar { display: none; }

        .flower-card {
            min-width: 65px;
            height: 65px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .flower-card:active { transform: scale(0.8); }
        .flower-card.selected { border: 3px solid var(--gold); }

        /* Кнопка фото */
        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        #takePhotoBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid white;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            opacity: 0.4;
            pointer-events: none;
        }

        #takePhotoBtn.active {
            opacity: 1;
            pointer-events: auto;
            background: white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        #takePhotoBtn::after {
            content: "";
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            border: 2px solid #000;
        }

        .btn-round {
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Стартовий екран */
        .start-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a3a1a, #050a05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 0.5s;
        }

        .start-btn {
            background: var(--gold);
            color: #241a05;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-top: 30px;
        }

        .hidden { opacity: 0; pointer-events: none; }
        
        .toast {
            position: fixed;
            top: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 1000;
            border: 1px solid var(--gold);
        }
    </style>
</head>
<body>

<audio id="bgMusic" src="fon.mp3" loop></audio>

<div class="start-overlay" id="startOverlay">
    <h1 style="color:var(--gold); font-size: 2.5rem; margin-bottom: 10px;">ВІНОК</h1>
    <p style="opacity: 0.8;">Українська AR-магія</p>
    <button class="start-btn" id="startBtn">Почати ✨</button>
</div>

<div class="app">
    <div class="camera-box">
        <video id="videoElement" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <div class="overlay-ui">
        <div class="counter" id="flowerCounter">Оберіть 7 квітів</div>
        
        <div class="flower-panel">
            <div class="flower-strip" id="flowerStrip"></div>
        </div>

        <div class="controls">
            <button class="btn-round" id="resetBtn" title="Скинути">↺</button>
            <button id="takePhotoBtn"></button>
            <button class="btn-round" id="shareBtn" title="Поділитися">↗</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const MAX_FLOWERS = 7;
    const FLOWER_SET = ["🌻","🌼","🌸","🌺","🌷","🌹","💐","🏵️","🌿","🍀"];
    
    let state = {
        selected: [],
        faceLandmarks: null,
        faceMesh: null,
        camera: null,
        isCapturing: false
    };

    const dom = {
        video: document.getElementById('videoElement'),
        canvas: document.getElementById('outputCanvas'),
        strip: document.getElementById('flowerStrip'),
        counter: document.getElementById('flowerCounter'),
        photoBtn: document.getElementById('takePhotoBtn'),
        music: document.getElementById('bgMusic')
    };

    const ctx = dom.canvas.getContext('2d');

    // Ініціалізація квіток
    function initFlowers() {
        FLOWER_SET.forEach(emoji => {
            const el = document.createElement('div');
            el.className = 'flower-card';
            el.textContent = emoji;
            el.onclick = () => {
                if(state.selected.length < MAX_FLOWERS) {
                    state.selected.push({emoji, scale: 0}); // Додаємо з нульовим масштабом для анімації
                    if(navigator.vibrate) navigator.vibrate(50);
                    updateUI();
                }
            };
            dom.strip.appendChild(el);
        });
    }

    function updateUI() {
        const count = state.selected.length;
        dom.counter.textContent = count === MAX_FLOWERS ? "Вінок готовий!" : `Зібрано: ${count} з ${MAX_FLOWERS}`;
        dom.photoBtn.classList.toggle('active', count === MAX_FLOWERS);
    }

    // AR Малювання
    function drawWreath(landmarks) {
        if(!landmarks || state.selected.length === 0) return;

        const left = landmarks[234];
        const right = landmarks[454];
        const top = landmarks[10];

        const p0 = { x: left.x * dom.canvas.width, y: left.y * dom.canvas.height };
        const p2 = { x: right.x * dom.canvas.width, y: right.y * dom.canvas.height };
        
        const width = Math.abs(p2.x - p0.x);
        const arcHeight = width * 0.4;
        const centerX = (p0.x + p2.x) / 2;
        const p1 = { x: centerX, y: (Math.min(p0.y, p2.y)) - arcHeight };

        state.selected.forEach((item, i) => {
            const t = state.selected.length === 1 ? 0.5 : i / (state.selected.length - 1);
            
            // Плавна анімація появи
            if(item.scale < 1) item.scale += 0.1;

            const mt = 1 - t;
            const x = mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x;
            const y = mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y;

            const size = (width * 0.15) * item.scale;

            ctx.save();
            ctx.translate(x, y);
            ctx.font = `${size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Тінь для реалістичності
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.fillText(item.emoji, 0, 0);
            ctx.restore();
        });
    }

    async function setupCamera() {
        state.faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        state.faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        state.faceMesh.onResults(results => {
            ctx.clearRect(0, 0, dom.canvas.width, dom.canvas.height);
            ctx.drawImage(dom.video, 0, 0, dom.canvas.width, dom.canvas.height);
            
            if (results.multiFaceLandmarks?.[0]) {
                state.faceLandmarks = results.multiFaceLandmarks[0];
                drawWreath(state.faceLandmarks);
            }
        });

        state.camera = new Camera(dom.video, {
            onFrame: async () => {
                dom.canvas.width = dom.video.videoWidth;
                dom.canvas.height = dom.video.videoHeight;
                await state.faceMesh.send({image: dom.video});
            },
            width: 640,
            height: 480
        });
        state.camera.start();
    }

    // Кнопки
    document.getElementById('startBtn').onclick = () => {
        document.getElementById('startOverlay').classList.add('hidden');
        dom.music.play();
        setupCamera();
    };

    document.getElementById('resetBtn').onclick = () => {
        state.selected = [];
        updateUI();
    };

    dom.photoBtn.onclick = () => {
        const dataUrl = dom.canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'vinok.png';
        link.href = dataUrl;
        link.click();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    };

    document.getElementById('shareBtn').onclick = async () => {
        const blob = await (await fetch(dom.canvas.toDataURL())).blob();
        const file = new File([blob], 'vinok.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Мій вінок',
                text: 'Подивіться, який вінок я сплела!'
            });
        } else {
            alert("Ваш браузер не підтримує прямий репост, фото збережено!");
            dom.photoBtn.click();
        }
    };

    initFlowers();
</script>
</body>
</html>
