<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartLessa · AR Quest 2026</title>
    <style>
        :root { --gold: #c9a23d; --dark: #0a0f0a; --glass: rgba(10,15,10,0.85); --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); font-family: system-ui, sans-serif; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%) scaleX(-1); }

        .welcome-screen { position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle, #1a251a, #050805); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .welcome-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        
        .smart-lessa-typo { font-size: 2.5rem; font-weight: 200; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; min-height: 1.2em; }

        .ui-overlay { position: absolute; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        .bottom-panel { pointer-events: auto; background: var(--glass); border-radius: 30px; padding: 15px; border: 1px solid rgba(201,162,61,0.3); backdrop-filter: blur(15px); margin-bottom: env(safe-area-inset-bottom); }
        
        .flower-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .flower-scroll::-webkit-scrollbar { display: none; }
        
        .item-card { min-width: 70px; height: 70px; background: rgba(255,255,255,0.05); border-radius: 18px; border: 1px dashed var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .item-card.found { border-style: solid; background: rgba(201,162,61,0.2); transform: scale(1.05); }
        .item-card img { width: 45px; height: 45px; filter: grayscale(1) opacity(0.3); }
        .item-card.found img { filter: none; opacity: 1; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; gap: 10px; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 1px solid var(--gold); background: rgba(0,0,0,0.3); color: var(--gold); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn-main { background: var(--gold); color: #000; flex: 1; border: none; padding: 15px; border-radius: 30px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        #counter { position: fixed; top: 40px; right: 20px; background: var(--glass); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: 800; z-index: 150; }
    </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
    <div class="smart-lessa-typo" id="glitchLogo">SMARTLESSA</div>
    <p style="color: var(--gold); opacity: 0.7; letter-spacing: 2px;">AR QUEST · FLORAL CODE</p>
    <button class="btn-main" id="startBtn" style="margin-top: 40px; max-width: 260px;">АКТИВУВАТИ ПОРТАЛ</button>
</div>

<div id="counter">0 / 12</div>

<div class="ar-viewport">
    <video id="videoElement" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
    
    <div class="ui-overlay">
        <div class="bottom-panel">
            <div class="flower-scroll" id="flowerScroll"></div>
            <div class="controls">
                <button class="btn-circle" onclick="resetAll()">✕</button>
                <button class="btn-main" onclick="capturePhoto()">ЗБЕРЕГТИ ФОТО</button>
                <button class="btn-circle" onclick="location.reload()">🔄</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const FLOWERS = [
        { id: 1, name: 'Шафран' }, { id: 2, name: 'Нарцис' }, { id: 3, name: 'Тюльпан' },
        { id: 4, name: 'Горицвіт' }, { id: 5, name: 'Півники' }, { id: 6, name: 'Сон-трава' },
        { id: 7, name: 'Дзвоники' }, { id: 8, name: 'Тирлич' }, { id: 9, name: 'Айстра' },
        { id: 10, name: 'Фіалка' }, { id: 11, name: 'Підсніжник' }, { id: 12, name: 'Черевички' }
    ];

    let state = {
        found: JSON.parse(localStorage.getItem('smartlessa_found') || '[]'),
        smile: 0,
        imgs: {}
    };

    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoElement');

    // Завантаження картинок
    FLOWERS.forEach(f => {
        const img = new Image();
        img.src = `flower_${f.id}.png`;
        state.imgs[f.id] = img;
    });

    // Ефект Scrambler
    function runGlitch() {
        const el = document.getElementById('glitchLogo');
        const txt = "SMARTLESSA";
        const chars = "ᛋᛗᚨᚱᛏᛚᛖᛋᛋᚨ◈✙";
        let iter = 0;
        const int = setInterval(() => {
            el.innerText = txt.split("").map((l, i) => i < iter ? txt[i] : chars[Math.floor(Math.random()*chars.length)]).join("");
            if(iter >= txt.length) clearInterval(int);
            iter += 1/3;
        }, 50);
    }
    setInterval(runGlitch, 4000);

    function updateUI() {
        const scroll = document.getElementById('flowerScroll');
        scroll.innerHTML = '';
        FLOWERS.forEach(f => {
            const isFound = state.found.includes(f.id);
            const card = document.createElement('div');
            card.className = `item-card ${isFound ? 'found' : ''}`;
            card.innerHTML = `<img src="flower_${f.id}.png">`;
            // Для тесту: клік на картку "знаходить" квітку
            card.onclick = () => {
                if(!state.found.includes(f.id)) {
                    state.found.push(f.id);
                    localStorage.setItem('smartlessa_found', JSON.stringify(state.found));
                    updateUI();
                }
            };
            scroll.appendChild(card);
        });
        document.getElementById('counter').innerText = `${state.found.length} / 12`;
    }

    window.resetAll = () => {
        if(confirm("Очистити гербарій?")) {
            state.found = [];
            localStorage.removeItem('smartlessa_found');
            updateUI();
        }
    };

    async function startAR() {
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
        faceMesh.onResults(onResults);

        new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                await faceMesh.send({image: video});
            },
            width: 1280, height: 720
        }).start();
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiFaceLandmarks?.[0]) {
            const l = results.multiFaceLandmarks[0];
            
            // Розрахунок посмішки
            const dist = Math.hypot(l[61].x - l[291].x, l[61].y - l[291].y);
            state.smile = Math.max(0, (dist - 0.07) * 12);

            // Малюємо стрічки, якщо є квіти + посмішка
            if(state.found.length > 0 && state.smile > 0.5) {
                drawRibbons(l);
            }
            drawWreath(l);
        }
        ctx.restore();
    }

    function drawRibbons(l) {
        const left = l[234], right = l[454];
        const wave = Math.sin(Date.now()/200)*30;
        ctx.save();
        ctx.lineWidth = canvas.width * 0.04;
        ctx.lineCap = 'round';
        ctx.globalAlpha = Math.min(state.smile, 0.8);

        const drawSide = (p, side) => {
            const sx = p.x * canvas.width, sy = p.y * canvas.height + 40;
            const ex = side === 'l' ? canvas.width * 0.1 : canvas.width * 0.9;
            ctx.strokeStyle = side === 'l' ? '#0057b7' : '#ffd700';
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.bezierCurveTo(sx + wave, sy + 200, ex - wave, canvas.height, ex, canvas.height);
            ctx.stroke();
        };
        drawSide(left, 'l'); drawSide(right, 'r');
        ctx.restore();
    }

    function drawWreath(l) {
        const p0 = { x: l[103].x * canvas.width, y: l[103].y * canvas.height };
        const p2 = { x: l[332].x * canvas.width, y: l[332].y * canvas.height };
        const headW = Math.abs(p2.x - p0.x);
        const p1 = { x: (p0.x + p2.x)/2, y: (l[10].y * canvas.height) - (headW * 0.7) };

        state.found.forEach((id, i) => {
            const t = state.found.length === 1 ? 0.5 : i / (state.found.length - 1);
            const mt = 1-t;
            const x = mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x;
            const y = mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y;
            
            const s = (headW * 0.3) * (1 + state.smile * 0.2);
            const img = state.imgs[id];
            if(img && img.complete) {
                ctx.save();
                ctx.translate(x, y);
                ctx.drawImage(img, -s/2, -s/2, s, s);
                ctx.restore();
            }
        });
    }

    window.capturePhoto = () => {
        const link = document.createElement('a');
        link.download = 'smartlessa_ar.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    document.getElementById('startBtn').onclick = () => {
        document.getElementById('welcome').classList.add('hidden');
        startAR();
    };

    updateUI();
</script>
</body>
</html>
