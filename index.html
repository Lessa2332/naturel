<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartLessa · AR Quest 2026</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { 
      --gold: #c9a23d; --dark: #0a0f0a; --glass: rgba(10,15,10,0.85);
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }
    body { background: var(--dark); font-family: system-ui, sans-serif; color: #fff; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }

    .welcome-screen { 
      position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle, #1a251a, #050805);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s;
    }
    .welcome-screen.hidden { opacity: 0; pointer-events: none; }
    .welcome-card { background: var(--glass); border: 1px solid var(--gold); padding: 30px; border-radius: 40px; backdrop-filter: blur(20px); text-align: center; max-width: 400px; }
    
    .ar-viewport { position: relative; width: 100%; height: 100%; }
    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); }

    .ui-overlay { position: absolute; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: var(--safe-top) 15px var(--safe-bottom); }
    .top-bar, .controls { pointer-events: auto; display: flex; justify-content: space-between; align-items: center; }
    
    .bottom-panel { pointer-events: auto; background: var(--glass); border-radius: 35px; padding: 20px; border: 1px solid rgba(201,162,61,0.3); }
    .scroll-area { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; }
    .flower-slot { min-width: 55px; height: 55px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px dashed var(--gold); display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .flower-slot.found { border-style: solid; background: rgba(201,162,61,0.2); }

    .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); background: none; color: var(--gold); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
    .btn-main { background: var(--gold); color: #000; flex: 1; border: none; padding: 15px; border-radius: 30px; font-weight: 800; margin: 0 10px; }

    #toast { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 3000; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
  <div class="welcome-card">
    <h1 style="color:var(--gold); margin-bottom:15px;">SMARTLESSA</h1>
    <p>Знайди 12 квіток через QR-коди та приміряй магічний вінок!</p>
    <button class="btn-main" id="startBtn" style="margin: 20px 0 0 0; width: 100%;">ПОЧАТИ КВЕСТ</button>
  </div>
</div>

<div id="toast">Повідомлення</div>

<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div class="ui-overlay">
    <div class="top-bar">
      <button class="btn-circle" id="resetBtn">🔄</button>
      <div style="background:var(--glass); padding: 8px 20px; border-radius: 20px; border: 1px solid var(--gold); font-weight:800;" id="flowerCounter">0 / 12</div>
      <button class="btn-circle" id="toggleMirror">🤳</button>
    </div>
    <div class="bottom-panel">
      <div class="scroll-area" id="flowerScroll"></div>
      <div class="controls">
        <button class="btn-circle" onclick="alert('Шукай QR з кодом SMARTLESSA_FLOWER_1...12')">❓</button>
        <button class="btn-main" id="wreathBtn">ПРИМІРЯТИ ВІНОК</button>
        <button class="btn-circle" id="captureBtn">📸</button>
      </div>
    </div>
  </div>
</div>

<audio id="foundSfx" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="bgMusic" loop src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3"></audio>

<script type="module">
  import * as THREE from 'three';
  import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

  const video = document.getElementById('videoElement');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d');
  
  let foundFlowers = JSON.parse(localStorage.getItem('smartlessa_found') || '[]');
  let faceLandmarker, renderer, scene, camera3D, wreathGroup;
  let lastQRTime = 0;

  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function updateUI() {
    const scroll = document.getElementById('flowerScroll');
    scroll.innerHTML = '';
    for(let i=1; i<=12; i++) {
      const slot = document.createElement('div');
      slot.className = `flower-slot ${foundFlowers.includes(i) ? 'found' : ''}`;
      slot.innerHTML = foundFlowers.includes(i) ? '🌸' : '🌱';
      scroll.appendChild(slot);
    }
    document.getElementById('flowerCounter').textContent = `${foundFlowers.length} / 12`;
  }

  async function startCam(mode) {
    if (window.stream) window.stream.getTracks().forEach(t => t.stop());
    const constraints = { video: { facingMode: mode, width: 640, height: 480 } };
    window.stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = window.stream;
    video.setAttribute('data-mode', mode);
  }

  function init3D() {
    if (renderer) return;
    renderer = new THREE.WebGLRenderer({ alpha: true, canvas: document.createElement('canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0'; renderer.domElement.style.pointerEvents = 'none'; renderer.domElement.style.zIndex = '20';
    document.querySelector('.ar-viewport').appendChild(renderer.domElement);
    
    scene = new THREE.Scene();
    camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    wreathGroup = new THREE.Group();
    
    // Квіти
    foundFlowers.forEach((_, i) => {
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
        map: new THREE.CanvasTexture(drawEmoji('🌸')) 
      }));
      const angle = (i / foundFlowers.length) * Math.PI * 2;
      sprite.position.set(Math.cos(angle) * 0.7, Math.sin(angle) * 0.2 + 0.3, 0);
      sprite.scale.set(0.4, 0.4, 1);
      wreathGroup.add(sprite);
    });

    // Стрічки
    const ribbon = new THREE.Sprite(new THREE.SpriteMaterial({ 
      map: new THREE.CanvasTexture(drawRibbon()), transparent: true, opacity: 0 
    }));
    ribbon.name = "ribbon"; ribbon.scale.set(0.6, 1.5, 1); ribbon.position.set(0, -0.8, -0.1);
    wreathGroup.add(ribbon);

    scene.add(wreathGroup);
  }

  function drawEmoji(e) {
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const cx = c.getContext('2d'); cx.font = '100px serif'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(e, 64, 64); return c;
  }

  function drawRibbon() {
    const c = document.createElement('canvas'); c.width = 64; c.height = 256;
    const cx = c.getContext('2d');
    const g = cx.createLinearGradient(0,0,0,256);
    g.addColorStop(0,'#0057b7'); g.addColorStop(0.5,'#0057b7'); g.addColorStop(0.5,'#ffd700'); g.addColorStop(1,'#ffd700');
    cx.fillStyle = g; cx.fillRect(0,0,64,256); return c;
  }

  function loop(time) {
    if (video.readyState >= 2) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      const mode = video.getAttribute('data-mode');

      // QR Logic
      if (mode === 'environment' && time - lastQRTime > 300) {
        const code = window.jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
        if (code?.data.includes('SMARTLESSA_FLOWER_')) {
          const id = parseInt(code.data.split('_')[2]);
          if (id && !foundFlowers.includes(id)) {
            foundFlowers.push(id); localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers));
            document.getElementById('foundSfx').play(); showToast("Квітка знайдена! 🌸"); updateUI();
          }
        }
        lastQRTime = time;
      }

      // Face Logic
      if (mode === 'user' && faceLandmarker) {
        const res = faceLandmarker.detectForVideo(video, time);
        if (res.faceLandmarks?.[0]) {
          const p = res.faceLandmarks[0][10];
          wreathGroup.position.set((p.x - 0.5) * -4, -(p.y - 0.4) * 4, -p.z * 5);
          
          if (res.faceBlendshapes?.[0]) {
            const smile = res.faceBlendshapes[0].categories.find(s => s.categoryName.includes('smile'))?.score || 0;
            wreathGroup.getObjectByName("ribbon").material.opacity = smile > 0.3 ? 1 : 0;
          }
        }
      }
      if (renderer) renderer.render(scene, camera3D);
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('startBtn').onclick = async () => {
    document.getElementById('welcome').classList.add('hidden');
    await startCam('environment');
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
      outputFaceBlendshapes: true, runningMode: "VIDEO"
    });
    updateUI(); requestAnimationFrame(loop);
  };

  document.getElementById('wreathBtn').onclick = async () => {
    if(foundFlowers.length === 0) return alert("Знайди хоча б одну квітку!");
    await startCam('user'); init3D(); 
    document.getElementById('bgMusic').play();
  };

  document.getElementById('captureBtn').onclick = () => {
    const link = document.createElement('a');
    link.download = 'quest_photo.png';
    link.href = canvas.toDataURL();
    link.click();
  };

  document.getElementById('resetBtn').onclick = () => { if(confirm("Скинути?")) { localStorage.clear(); location.reload(); } };
  document.getElementById('toggleMirror').onclick = () => startCam(video.getAttribute('data-mode') === 'user' ? 'environment' : 'user');
</script>
</body>
</html>
