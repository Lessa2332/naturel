<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a2f1f">
    <title>🌺 Мавка Crown • Чарівний Вінок</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-[#0f1a14] text-white overflow-hidden">

    <!-- Старт -->
    <div id="startScreen" class="fixed inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-[#1a2f1f] to-[#0f1a14] z-50">
        <div class="text-center px-8">
            <div class="text-7xl mb-6 animate-bounce">🌺</div>
            <h1 class="text-5xl font-bold tracking-tighter mb-2">Мавка Crown</h1>
            <p class="text-xl text-[#d4e8c8] mb-10">Створи свій чарівний лісовий вінок ✨</p>
            <button onclick="startApp()" 
                    class="px-10 py-6 bg-gradient-to-r from-[#c9a95a] to-[#f0d38a] text-[#1a2f1f] font-semibold text-2xl rounded-3xl shadow-2xl shadow-[#c9a95a]/50 hover:scale-105 transition-all">
                Почати магію
            </button>
            <p class="text-xs text-[#a8c8a0] mt-8">Для справжніх лісових фей 12+ 🌿</p>
        </div>
    </div>

    <!-- Основний додаток -->
    <div id="app" class="hidden flex flex-col h-screen max-w-[500px] mx-auto bg-[#1a2f1f] rounded-3xl overflow-hidden shadow-2xl border border-[#c9a95a]/30">
        
        <!-- Камера -->
        <div class="relative flex-1 bg-black">
            <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover scale-x-[-1]"></video>
            <canvas id="canvas" class="absolute inset-0 w-full h-full"></canvas>
            
            <!-- Стрічки -->
            <div class="absolute inset-0 pointer-events-none">
                <div class="absolute left-1/3 top-0 h-[130%] w-2 bg-gradient-to-b from-[#5ab0ff] to-[#a3d4ff] rotate-[-12deg] animate-[wave_4s_ease-in-out_infinite]"></div>
                <div class="absolute right-1/3 top-0 h-[130%] w-2 bg-gradient-to-b from-[#ffe766] to-[#fff8b8] rotate-[12deg] animate-[wave_4s_ease-in-out_infinite_1s]"></div>
            </div>
        </div>

        <!-- Панель квітів -->
        <div class="glass p-4 border-t border-[#c9a95a]/20">
            <div id="flowerStrip" class="flex gap-4 overflow-x-auto pb-2 snap-x"></div>
        </div>

        <!-- Вибрані квіти -->
        <div id="selectedList" class="flex gap-2 px-4 py-3 flex-wrap min-h-[68px] glass border-t border-[#c9a95a]/20"></div>

        <!-- Кнопки -->
        <div class="flex items-center justify-between px-6 py-4 border-t border-[#c9a95a]/20 bg-[#1a2f1f]">
            <button onclick="resetWreath()" 
                    class="flex items-center gap-2 px-6 py-3 rounded-2xl bg-[#3a2a18] hover:bg-[#4a3a28] transition-colors">
                <span class="text-2xl">🔄</span>
                <span class="font-medium">Скинути</span>
            </button>
            
            <button onclick="takePhoto()" 
                    class="flex-1 mx-4 py-4 text-2xl font-semibold rounded-3xl bg-gradient-to-r from-[#c9a95a] to-[#f0d38a] text-[#1a2f1f] shadow-xl shadow-[#c9a95a]/50 active:scale-95 transition-all">
                📸 Зберегти селфі
            </button>
            
            <button onclick="toggleMute()" id="muteBtn" class="text-3xl w-12 h-12 flex items-center justify-center">🔊</button>
        </div>
    </div>

<script>
// Tailwind init
tailwind.config = { content: ["./**/*.{html,js}"] }

// === ОСНОВНІ ЗМІННІ ===
let selectedFlowers = []
const maxFlowers = 7
let faceLandmarks = null
let video, canvas, ctx, faceMesh, camera
let isMuted = false
let audioContext
let particles = []
let globalTime = 0

const flowersList = ["🌻","🌼","🌸","🌺","🌷","🪻","🏵️","🌹","💐","🌿","🍀","🪷","🌾","💮"]

// Запуск додатку
function startApp() {
    document.getElementById('startScreen').classList.add('hidden')
    document.getElementById('app').classList.remove('hidden')
    initApp()
}

// Ініціалізація
async function initApp() {
    video = document.getElementById('video')
    canvas = document.getElementById('canvas')
    ctx = canvas.getContext('2d')
    
    // Створюємо картки квітів
    const strip = document.getElementById('flowerStrip')
    flowersList.forEach(f => {
        const div = document.createElement('div')
        div.className = "flex-shrink-0 w-16 h-16 bg-gradient-to-br from-[#fef3da] to-[#f9e7b8] rounded-2xl flex items-center justify-center text-4xl shadow-inner cursor-pointer active:scale-110 transition-all border-2 border-transparent hover:border-[#c9a95a]"
        div.textContent = f
        div.onclick = () => addFlower(f)
        strip.appendChild(div)
    })
    
    // MediaPipe
    faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` })
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 })
    faceMesh.onResults(results => { faceLandmarks = results.multiFaceLandmarks?.[0] || null })
    
    camera = new Camera(video, {
        onFrame: async () => { if (faceLandmarks !== null) await faceMesh.send({ image: video }) },
        width: 720, height: 960
    })
    
    await camera.start()
    requestAnimationFrame(renderLoop)
    
    // Аудіо
    audioContext = new (window.AudioContext || window.webkitAudioContext)()
}

// Додавання квітки
function addFlower(f) {
    if (selectedFlowers.length >= maxFlowers) return alert("Максимум 7 квітів у вінку ✨")
    if (selectedFlowers.includes(f)) return
    selectedFlowers.push(f)
    updateSelectedUI()
}

// Оновлення вибраних
function updateSelectedUI() {
    const container = document.getElementById('selectedList')
    container.innerHTML = ''
    selectedFlowers.forEach((f, i) => {
        const chip = document.createElement('div')
        chip.className = "flex items-center gap-2 bg-white/10 backdrop-blur-md px-4 py-2 rounded-3xl text-xl cursor-pointer"
        chip.innerHTML = `${f} <span onclick="event.stopImmediatePropagation();removeFlower(${i});" class="text-xs">✕</span>`
        container.appendChild(chip)
    })
}

function removeFlower(i) {
    selectedFlowers.splice(i, 1)
    updateSelectedUI()
}

function resetWreath() {
    selectedFlowers = []
    updateSelectedUI()
}

// Магічні частинки
function createParticles(x, y) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: x + (Math.random() - 0.5) * 80,
            y: y + (Math.random() - 0.5) * 40,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3 - 1,
            life: 45,
            color: ['#fff8c4', '#a3f0ff', '#f0c4ff', '#c9ff9e'][Math.floor(Math.random()*4)]
        })
    }
}

// Рендер вінка
function drawWreath() {
    if (!faceLandmarks || selectedFlowers.length === 0) return
    
    const anchor = getAnchor()
    if (!anchor) return
    
    const cx = anchor.x * canvas.width
    const cy = anchor.y * canvas.height
    const scale = anchor.scale
    
    // Лоза
    ctx.save()
    ctx.shadowBlur = 25
    ctx.shadowColor = "#4ade80"
    ctx.strokeStyle = "#1e4a22"
    ctx.lineWidth = 18 * scale
    ctx.lineJoin = "round"
    ctx.beginPath()
    const start = 0.35 * Math.PI
    const end = 1.65 * Math.PI
    for (let i = 0; i <= 40; i++) {
        const t = i / 40
        const ang = start + t * (end - start)
        const x = cx + 165 * scale * Math.cos(ang)
        const y = cy - 48 * scale + 88 * scale * Math.sin(ang)
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
    }
    ctx.stroke()
    ctx.restore()
    
    // Квіти
    const time = globalTime
    selectedFlowers.forEach((flower, i) => {
        const t = i / (selectedFlowers.length - 1 || 1)
        const angle = 0.35 * Math.PI + t * 1.3 * Math.PI
        let x = cx + 165 * scale * Math.cos(angle)
        let y = cy - 48 * scale + 88 * scale * Math.sin(angle)
        
        x += Math.cos(angle) * 12 * scale
        y += Math.sin(angle) * 8 * scale + Math.sin(time * 4 + i) * 6 * scale
        
        const rot = angle * 0.6 + Math.sin(time * 3 + i) * 0.2
        
        ctx.save()
        ctx.translate(x, y)
        ctx.rotate(rot)
        ctx.font = `bold ${42 * scale}px system-ui`
        ctx.textAlign = "center"
        ctx.textBaseline = "middle"
        ctx.shadowBlur = 18
        ctx.shadowColor = "#fff8c4"
        ctx.fillText(flower, 0, 0)
        ctx.restore()
    })
    
    // Частинки
    if (Math.random() < 0.4) createParticles(cx, cy - 40 * scale)
}

function getAnchor() {
    const f = faceLandmarks
    if (!f) return null
    const forehead = f[10]
    const leftBrow = f[70]
    const rightBrow = f[300]
    const leftEye = f[33]
    const rightEye = f[263]
    
    const eyeDist = Math.hypot(leftEye.x - rightEye.x, leftEye.y - rightEye.y)
    const scale = Math.min(1.95, Math.max(0.75, eyeDist / 0.05))
    
    const avgBrow = (leftBrow.y + rightBrow.y) / 2
    const yOffset = (avgBrow - forehead.y) * 0.8
    
    return { x: forehead.x, y: forehead.y + yOffset, scale }
}

function renderLoop(ts) {
    globalTime = ts / 600
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height)
    
    if (video.videoWidth && canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth
        canvas.height = video.videoHeight
    }
    
    drawWreath()
    
    // Малюємо частинки
    ctx.shadowBlur = 8
    particles = particles.filter(p => {
        p.x += p.vx
        p.y += p.vy
        p.vy += 0.08
        p.life--
        ctx.globalAlpha = p.life / 45
        ctx.fillStyle = p.color
        ctx.fillRect(p.x, p.y, 4, 4)
        return p.life > 0
    })
    ctx.globalAlpha = 1
    
    requestAnimationFrame(renderLoop)
}

function takePhoto() {
    const link = document.createElement('a')
    link.download = `mavka-crown-${Date.now()}.png`
    link.href = canvas.toDataURL('image/png')
    link.click()
    createParticles(canvas.width/2, canvas.height/3) // святкування
}

function toggleMute() {
    isMuted = !isMuted
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊'
}

// Запуск
</script>
</body>
</html>
