<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Піввінок з емодзі – AR face tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a1f1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        /* Головний контейнер – мобільний first */
        .app-container {
            max-width: 500px;
            width: 100%;
            background: #1e2a2a;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid #ffdfa5;
        }

        /* Камера + canvas для AR */
        .camera-box {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 3 / 4; /* портретний формат */
            overflow: hidden;
            border-radius: 32px 32px 24px 24px;
            margin: 12px;
            width: calc(100% - 24px);
        }

        #videoElement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* дзеркально для зручності */
        }

        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* панель квітів (горизонтальний скрол) */
        .flower-panel {
            background: rgba(30, 25, 20, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            margin: 16px 12px 12px 12px;
            padding: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            border: 1px solid #ffda99;
        }

        .flower-strip {
            display: inline-flex;
            gap: 14px;
            padding: 0 16px;
        }

        .flower-emojii {
            font-size: 2.8rem;
            background: #fff6e5;
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 70px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            transition: 0.07s linear;
            cursor: pointer;
            border: 2px solid #ffc285;
        }
        .flower-emojii:active {
            transform: scale(0.92);
            background: #ffe0b5;
        }

        /* Статус та кнопки */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #1f2e28;
            color: #ffefcf;
            font-weight: bold;
        }
        .counter-badge {
            background: #ff914d;
            padding: 5px 15px;
            border-radius: 50px;
            color: #2d1f0c;
        }
        .reset-btn, .photo-btn {
            background: #2d3e36;
            border: none;
            padding: 6px 15px;
            border-radius: 40px;
            color: #ffefb9;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.85rem;
        }
        .photo-btn {
            background: #5f3b1c;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .reset-btn:active, .photo-btn:active {
            transform: scale(0.96);
        }

        .selected-mini-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 18px;
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            margin: 8px 12px 16px;
            justify-content: center;
            min-height: 58px;
        }
        .mini-flower {
            background: #fff2dd;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 1.6rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 1px 4px black;
        }
        .mini-flower span {
            font-size: 1rem;
            font-weight: bold;
            color: #8b5a2b;
        }
        .instruction {
            text-align: center;
            font-size: 0.7rem;
            padding: 6px;
            color: #ddcca5;
        }
        @media (max-width: 550px) {
            .flower-emojii { width: 60px; height: 60px; font-size: 2.2rem; }
            .mini-flower { font-size: 1.3rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="camera-box">
        <video id="videoElement" autoplay playsinline muted></video>
        <canvas id="outputCanvas" width="720" height="960"></canvas>
    </div>

    <div class="info-bar">
        <span>🌼 ВІНОК</span>
        <span class="counter-badge" id="flowerCounter">0/7</span>
        <button class="reset-btn" id="resetBtn">Очистити</button>
    </div>

    <div class="flower-panel">
        <div class="flower-strip" id="flowerStrip">
            <!-- Емодзі квітів (багато варіантів) -->
            <div class="flower-emojii" data-flower="🌻">🌻</div>
            <div class="flower-emojii" data-flower="🌼">🌼</div>
            <div class="flower-emojii" data-flower="🌸">🌸</div>
            <div class="flower-emojii" data-flower="🌺">🌺</div>
            <div class="flower-emojii" data-flower="🌷">🌷</div>
            <div class="flower-emojii" data-flower="🌹">🌹</div>
            <div class="flower-emojii" data-flower="💐">💐</div>
            <div class="flower-emojii" data-flower="🏵️">🏵️</div>
            <div class="flower-emojii" data-flower="🥀">🥀</div>
            <div class="flower-emojii" data-flower="🌸">🌸</div>
        </div>
    </div>

    <div class="selected-mini-list" id="selectedMiniList"></div>

    <div style="display: flex; gap: 12px; padding: 0 20px 20px;">
        <button class="photo-btn" id="takePhotoBtn" style="flex:1;">📸 Зробити фото</button>
        <button class="reset-btn" id="downloadHintBtn" style="flex:0.5;">⬇️</button>
    </div>
    <div class="instruction">
        👆 Обери до 7 квітів → вони з'являться на піввінку над тобою.<br>
        🗑️ Натисни на квітку в списку або на ній у вінку — видали.
    </div>
</div>

<!-- MediaPipe FaceMesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    // ---------- ГЛОБАЛЬНІ ЗМІННІ ----------
    let selectedFlowers = [];         // масив емодзі
    const MAX_FLOWERS = 7;

    // DOM елементи
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const flowerCounterSpan = document.getElementById('flowerCounter');
    const resetBtn = document.getElementById('resetBtn');
    const takePhotoBtn = document.getElementById('takePhotoBtn');
    const selectedMiniListDiv = document.getElementById('selectedMiniList');

    // Для face tracking
    let faceMesh = null;
    let camera = null;
    let animationId = null;
    let faceLandmarks = null;          // останній масив точок обличчя
    let videoWidth = 0, videoHeight = 0;

    // Налаштування розміру canvas під відео
    function resizeCanvasToVideo() {
        if (video.videoWidth && video.videoHeight) {
            videoWidth = video.videoWidth;
            videoHeight = video.videoHeight;
            canvas.width = videoWidth;
            canvas.height = videoHeight;
        } else {
            // тимчасові пропорції
            canvas.width = 720;
            canvas.height = 960;
        }
    }

    // ========== МАЛЮВАННЯ ПІВВІНКА НА ОБЛИЧЧІ ==========
    function drawWreathOnFace() {
        if (!faceLandmarks || faceLandmarks.length === 0) {
            // Якщо обличчя не знайдено, малюємо повідомлення
            ctx.font = "20px system-ui";
            ctx.fillStyle = "#ffdd99";
            ctx.shadowBlur = 0;
            ctx.fillText("🔍 Покажи обличчя", canvas.width/2-100, canvas.height/2);
            return;
        }

        // Знаходимо верхню частину голови (орієнтир: точка 10 (верх чола) або середнє між точками 10, 151, 337)
        // Для стабільності використаємо точку індексу 10 (верхній край чола)
        let topPoint = faceLandmarks[10];
        if (!topPoint) return;
        
        const centerX = topPoint.x * canvas.width;
        const centerY = topPoint.y * canvas.height;
        
        // Параметри піввінка (еліпс над головою)
        const radiusX = 110;
        const radiusY = 70;
        // зсув вгору, щоб вінок був над чолом, а не на очах
        const offsetY = -25;
        
        // 1. Малюємо основу піввінка (зелену дугу)
        ctx.beginPath();
        ctx.ellipse(centerX, centerY + offsetY, radiusX, radiusY, 0, 0, Math.PI, true);
        ctx.strokeStyle = "#3fa63f";
        ctx.lineWidth = 9;
        ctx.stroke();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#c2f0a2";
        ctx.stroke();
        
        // 2. Листочки декор
        for (let ang = 0; ang <= 180; ang += 18) {
            let rad = ang * Math.PI / 180;
            let x = centerX + radiusX * Math.cos(rad);
            let y = centerY + offsetY + radiusY * Math.sin(rad);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + (Math.sin(rad)*8), y - 7 + Math.cos(rad)*5);
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "#6ab04c";
            ctx.stroke();
        }
        
        // 3. Розміщення обраних квітів вздовж дуги (кути від 20° до 160°)
        const flowerCount = selectedFlowers.length;
        if (flowerCount === 0) {
            ctx.font = "bold 18px system-ui";
            ctx.fillStyle = "#fff1b5";
            ctx.shadowBlur = 4;
            ctx.fillText("➕ обери квіти знизу", centerX-80, centerY+offsetY-20);
            return;
        }
        
        const startDeg = 25;
        const endDeg = 155;
        for (let i = 0; i < flowerCount; i++) {
            const t = i / (flowerCount - 1 || 1);
            const deg = startDeg + t * (endDeg - startDeg);
            const rad = deg * Math.PI / 180;
            let x = centerX + radiusX * Math.cos(rad);
            let y = centerY + offsetY + radiusY * Math.sin(rad);
            // зсув назовні
            x += Math.cos(rad) * 12;
            y += Math.sin(rad) * 8;
            
            // фонова підложка
            ctx.beginPath();
            ctx.arc(x, y, 19, 0, 2*Math.PI);
            ctx.fillStyle = "#fff8e7";
            ctx.fill();
            ctx.shadowBlur = 6;
            ctx.font = `32px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#000";
            ctx.fillText(selectedFlowers[i], x, y);
            ctx.shadowBlur = 0;
            
            // Хрестик видалення
            const delX = x + 16;
            const delY = y - 16;
            ctx.beginPath();
            ctx.arc(delX, delY, 11, 0, 2*Math.PI);
            ctx.fillStyle = "#8b3c1c";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 16px sans-serif";
            ctx.fillText("✕", delX, delY+1);
            
            // Зберігаємо зону кліку (для видалення)
            if (!window._flowerHitAreas) window._flowerHitAreas = [];
            window._flowerHitAreas.push({ x, y, delX, delY, flower: selectedFlowers[i] });
        }
    }
    
    // Функція, яка оновлює UI (лічильник + мініатюри)
    function updateUIAndDraw() {
        flowerCounterSpan.innerText = `${selectedFlowers.length}/${MAX_FLOWERS}`;
        // Оновити список мініатюр знизу
        selectedMiniListDiv.innerHTML = '';
        if (selectedFlowers.length === 0) {
            let emptyHint = document.createElement('div');
            emptyHint.innerText = '✨ торкнись квітки, щоб додати ✨';
            emptyHint.style.fontSize = '0.75rem';
            emptyHint.style.opacity = '0.8';
            selectedMiniListDiv.appendChild(emptyHint);
        } else {
            selectedFlowers.forEach((fl, idx) => {
                let chip = document.createElement('div');
                chip.className = 'mini-flower';
                chip.innerHTML = `${fl} <span>✕</span>`;
                chip.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFlowerAtIndex(idx);
                });
                selectedMiniListDiv.appendChild(chip);
            });
        }
        // малювання буде викликане з анімаційного циклу
    }
    
    function removeFlowerAtIndex(idx) {
        if (idx >= 0 && idx < selectedFlowers.length) {
            selectedFlowers.splice(idx, 1);
            updateUIAndDraw();
        }
    }
    
    function addFlower(emoji) {
        if (selectedFlowers.length >= MAX_FLOWERS) {
            alert("Максимум 7 квітів у вінку!");
            return false;
        }
        if (selectedFlowers.includes(emoji)) {
            alert("Ця квітка вже є!");
            return false;
        }
        selectedFlowers.push(emoji);
        updateUIAndDraw();
        return true;
    }
    
    function resetAll() {
        selectedFlowers = [];
        updateUIAndDraw();
    }
    
    // Обробка кліків на canvas (видалення квітки)
    function setupCanvasClick() {
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clickX = (e.clientX - rect.left) * scaleX;
            let clickY = (e.clientY - rect.top) * scaleY;
            if (window._flowerHitAreas && window._flowerHitAreas.length) {
                for (let area of window._flowerHitAreas) {
                    // перевірка на хрестик
                    const dxDel = clickX - area.delX;
                    const dyDel = clickY - area.delY;
                    if (Math.hypot(dxDel, dyDel) < 16) {
                        const idx = selectedFlowers.indexOf(area.flower);
                        if (idx !== -1) removeFlowerAtIndex(idx);
                        break;
                    }
                    const dxFl = clickX - area.x;
                    const dyFl = clickY - area.y;
                    if (Math.hypot(dxFl, dyFl) < 24) {
                        const idx = selectedFlowers.indexOf(area.flower);
                        if (idx !== -1) removeFlowerAtIndex(idx);
                        break;
                    }
                }
            }
        });
    }
    
    // ========== АНІМАЦІЙНИЙ ЦИКЛ ==========
    function drawLoop() {
        if (!ctx || !canvas) return;
        // Очищаємо canvas і малюємо відеокадр (фон)
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }
        // Скидаємо зони перед малюванням
        window._flowerHitAreas = [];
        // Якщо є landmarks, малюємо вінок поверх
        if (faceLandmarks) {
            drawWreathOnFace();
        } else {
            ctx.font = "18px system-ui";
            ctx.fillStyle = "#ffeca2";
            ctx.fillText("⏳ Шукаю обличчя...", canvas.width/2-90, 60);
        }
        requestAnimationFrame(drawLoop);
    }
    
    // ========== MEDIAPIPE FACE MESH ==========
    function initFaceMesh() {
        faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onFaceMeshResults);
        
        // Запуск камери
        camera = new Camera(video, {
            onFrame: async () => {
                await faceMesh.send({ image: video });
            },
            width: 720,
            height: 960
        });
        camera.start().then(() => {
            resizeCanvasToVideo();
            video.addEventListener('loadedmetadata', () => {
                resizeCanvasToVideo();
            });
        });
    }
    
    function onFaceMeshResults(results) {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            faceLandmarks = results.multiFaceLandmarks[0];
        } else {
            faceLandmarks = null;
        }
        // Оновлюємо розміри canvas, якщо змінилось відео
        if (video.videoWidth && video.videoWidth !== canvas.width) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
    }
    
    // ФОТО: робимо знімок з canvas (відео + AR) і завантажуємо
    function takeSnapshot() {
        try {
            const snapshotCanvas = document.createElement('canvas');
            snapshotCanvas.width = canvas.width;
            snapshotCanvas.height = canvas.height;
            const snapCtx = snapshotCanvas.getContext('2d');
            snapCtx.drawImage(canvas, 0, 0);
            const link = document.createElement('a');
            link.download = `vinok_${Date.now()}.png`;
            link.href = snapshotCanvas.toDataURL('image/png');
            link.click();
        } catch(e) {
            alert("Не вдалося зберегти фото :(");
        }
    }
    
    // Ініціалізація квіткового вибору з емодзі панелі
    function bindFlowerPicker() {
        const flowers = document.querySelectorAll('.flower-emojii');
        flowers.forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const flower = el.getAttribute('data-flower');
                if (flower) addFlower(flower);
            });
        });
    }
    
    // Головний старт
    function startApp() {
        bindFlowerPicker();
        resetBtn.addEventListener('click', resetAll);
        takePhotoBtn.addEventListener('click', takeSnapshot);
        document.getElementById('downloadHintBtn').addEventListener('click', () => {
            alert("Натисни 'Зробити фото' для знімка з вінком");
        });
        setupCanvasClick();
        initFaceMesh();
        updateUIAndDraw();
        drawLoop();
    }
    
    startApp();
</script>
</body>
</html>
