<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌾 Вінок Мавки · Лісова Стрічка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a2f1f;
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .app-container {
            max-width: 500px;
            width: 100%;
            background: #2d3e2b;
            background-image: radial-gradient(circle at 10% 20%, rgba(80,60,30,0.3) 2%, transparent 2.5%);
            background-size: 32px 32px;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,245,200,0.2);
            overflow: hidden;
            border: 1px solid #dbb87c;
            position: relative;
        }
        .camera-box {
            position: relative;
            background: #1e2a1c;
            width: calc(100% - 24px);
            margin: 12px;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.4), inset 0 0 0 3px #b68b40;
        }
        #videoElement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            pointer-events: none;   /* кліки передаються відео */
        }
        .flower-panel {
            background: #3b2a1fcc;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            margin: 16px 12px 12px 12px;
            padding: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            border: 1px solid #e7c27d;
        }
        .flower-strip {
            display: inline-flex;
            gap: 14px;
            padding: 0 16px;
        }
        .flower-card {
            font-size: 2.8rem;
            background: #fef3da;
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 70px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3), inset 0 1px 3px #fff8e7;
            transition: transform 0.1s, filter 0.1s;
            cursor: pointer;
            border: 2px solid #c9a04b;
        }
        .flower-card:active {
            transform: scale(0.92);
            filter: brightness(0.95);
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #2c4227;
            color: #f7f0c3;
            font-weight: bold;
            text-shadow: 0 1px 2px #1f3a1a;
        }
        .counter-badge {
            background: #c27e3a;
            padding: 5px 15px;
            border-radius: 50px;
            color: #2c1a0c;
            font-weight: bold;
            box-shadow: inset 0 1px 2px #ffdfa0, 0 2px 5px black;
        }
        .reset-btn, .photo-btn, .mute-btn {
            background: #5c3e24;
            border: none;
            padding: 6px 15px;
            border-radius: 40px;
            color: #ffefcf;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 2px 6px black;
            transition: 0.05s linear;
            border: 1px solid #e7b45a;
        }
        .photo-btn {
            background: #8b5a2b;
            color: #fff2c9;
        }
        .mute-btn {
            background: #3d5a3b;
            padding: 6px 12px;
            font-size: 1.2rem;
            line-height: 1;
        }
        .reset-btn:active, .photo-btn:active, .mute-btn:active {
            transform: scale(0.96);
        }
        .selected-mini-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            margin: 8px 12px 12px;
            justify-content: center;
            min-height: 54px;
        }
        .mini-flower {
            background: #fef0cf;
            border-radius: 50px;
            padding: 4px 12px;
            font-size: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 1px 3px black;
            transition: 0.05s linear;
            border: 1px solid #b4913b;
        }
        .mini-flower:active {
            transform: scale(0.94);
            background: #ffda99;
        }
        .mini-flower span {
            font-size: 1rem;
            font-weight: bold;
            color: #6b3f1c;
        }
        .instruction {
            text-align: center;
            font-size: 0.7rem;
            padding: 8px 12px 18px;
            color: #dcd09e;
            text-shadow: 0 1px 1px #1f3a1a;
        }
        @media (max-width: 550px) {
            .flower-card { width: 60px; height: 60px; font-size: 2.2rem; }
            .mini-flower { font-size: 1.3rem; padding: 3px 10px; }
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c2b1fdd;
            backdrop-filter: blur(8px);
            color: #ffefb0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 200;
            pointer-events: none;
            font-weight: bold;
            border: 1px solid #e7b45a;
        }
        /* Стартове повідомлення */
        .start-message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -30%);
            background: #1f3a1ae0;
            backdrop-filter: blur(8px);
            color: #f9eec1;
            padding: 18px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 2px solid #e7c27d;
            box-shadow: 0 10px 20px #00000055;
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.5s;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Повідомлення перед AR -->
    <div class="start-message" id="startMessage">🌼 Обери квіти для віночка та зроби фото 🌼</div>

    <div class="camera-box">
        <video id="videoElement" autoplay playsinline muted></video>
        <canvas id="outputCanvas" width="720" height="960"></canvas>
    </div>

    <div class="info-bar">
        <span>🍃 ВІНОК МАВКИ</span>
        <span class="counter-badge" id="flowerCounter">0/7</span>
        <div style="display: flex; gap: 6px;">
            <button class="mute-btn" id="muteToggleBtn" title="Вимкнути/увімкнути музику">🔊</button>
            <button class="reset-btn" id="resetBtn">🧹 Скинути</button>
        </div>
    </div>

    <!-- Вибір квітів (20 варіантів) -->
    <div class="flower-panel">
        <div class="flower-strip" id="flowerStrip">
            <div class="flower-card" data-flower="🌻">🌻</div>
            <div class="flower-card" data-flower="🌼">🌼</div>
            <div class="flower-card" data-flower="🌸">🌸</div>
            <div class="flower-card" data-flower="🌺">🌺</div>
            <div class="flower-card" data-flower="🌷">🌷</div>
            <div class="flower-card" data-flower="🌹">🌹</div>
            <div class="flower-card" data-flower="💐">💐</div>
            <div class="flower-card" data-flower="🏵️">🏵️</div>
            <div class="flower-card" data-flower="🥀">🥀</div>
            <div class="flower-card" data-flower="🌿">🌿</div>
            <div class="flower-card" data-flower="🍀">🍀</div>
            <div class="flower-card" data-flower="🌸">🌸</div>
            <div class="flower-card" data-flower="🌻">🌻</div>
            <div class="flower-card" data-flower="🌺">🌺</div>
            <div class="flower-card" data-flower="🌷">🌷</div>
            <div class="flower-card" data-flower="🌹">🌹</div>
            <div class="flower-card" data-flower="🏵️">🏵️</div>
            <div class="flower-card" data-flower="💮">💮</div>
            <div class="flower-card" data-flower="🌼">🌼</div>
            <div class="flower-card" data-flower="🌸">🌸</div>
        </div>
    </div>

    <div class="selected-mini-list" id="selectedMiniList"></div>

    <div style="display: flex; gap: 12px; padding: 0 20px 20px;">
        <button class="photo-btn" id="takePhotoBtn" style="flex:1;">📸 Зробити фото</button>
        <button class="reset-btn" id="downloadHintBtn" style="flex:0.5;" title="Натисни 'Зробити фото'">⬇️</button>
    </div>
    <div class="instruction">
        🌟 Обери до 7 квітів. Клікни по мініатюрі, щоб прибрати.<br>
        🎗️ Синьо‑жовті стрічки оживають у русі.
    </div>
</div>

<!-- Аудіо -->
<audio id="bgMusic" loop preload="auto" src="fon.mp3"></audio>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    (function(){
        "use strict";

        // ---------- НАЛАШТУВАННЯ ----------
        const MAX_FLOWERS = 7;
        let selectedFlowers = [];
        let faceLandmarks = null;
        let faceMesh = null;
        let camera = null;
        let animationFrame = null;
        let ribbonTime = 0;

        // DOM елементи
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const flowerCounterSpan = document.getElementById('flowerCounter');
        const resetBtn = document.getElementById('resetBtn');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const selectedMiniListDiv = document.getElementById('selectedMiniList');
        const muteToggleBtn = document.getElementById('muteToggleBtn');
        const bgMusic = document.getElementById('bgMusic');
        const startMsg = document.getElementById('startMessage');

        // Аудіо контекст для коротких звуків
        let audioCtx = null;

        // ---------- ФУНКЦІЇ ЗВУКУ ----------
        function initAudio() {
            if (!bgMusic) return;
            bgMusic.volume = 0.35;
            bgMusic.muted = false;
            // Автовідтворення після першої взаємодії (користувач клікне)
        }

        function tryPlayMusic() {
            if (!bgMusic) return;
            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    // Блокування автовідтворення – спробуємо пізніше
                });
            }
        }

        function toggleMute() {
            if (!bgMusic) return;
            bgMusic.muted = !bgMusic.muted;
            muteToggleBtn.textContent = bgMusic.muted ? '🔇' : '🔊';
            if (!bgMusic.muted && bgMusic.paused) {
                tryPlayMusic();
            }
        }

        // Короткий звук додавання
        function playClickSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.2;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) { /* ігноруємо */ }
        }

        // ---------- UI ----------
        function updateUI() {
            flowerCounterSpan.innerText = `${selectedFlowers.length}/${MAX_FLOWERS}`;
            selectedMiniListDiv.innerHTML = '';
            if (selectedFlowers.length === 0) {
                let emptyHint = document.createElement('div');
                emptyHint.innerText = '✨ обери квітку лісу ✨';
                emptyHint.style.fontSize = '0.75rem';
                emptyHint.style.opacity = '0.8';
                selectedMiniListDiv.appendChild(emptyHint);
            } else {
                selectedFlowers.forEach((fl, idx) => {
                    let chip = document.createElement('div');
                    chip.className = 'mini-flower';
                    chip.innerHTML = `${fl} <span>✕</span>`;
                    chip.addEventListener('click', (e) => {
                        e.stopPropagation();
                        removeAtIndex(idx);
                    });
                    selectedMiniListDiv.appendChild(chip);
                });
            }
        }

        function removeAtIndex(idx) {
            if (idx >= 0 && idx < selectedFlowers.length) {
                selectedFlowers.splice(idx, 1);
                updateUI();
                tryPlayMusic(); // активуємо аудіо при взаємодії
            }
        }

        function addFlower(emoji) {
            if (selectedFlowers.length >= MAX_FLOWERS) {
                showToast("🌿 Вінок уже повний! Прибери квітку, щоб додати іншу.");
                return false;
            }
            selectedFlowers.push(emoji);
            updateUI();
            playClickSound();
            tryPlayMusic();
            return true;
        }

        function resetAll() {
            selectedFlowers = [];
            updateUI();
            showToast("🍂 Вінок очищено. Обери нові квіти.");
            tryPlayMusic();
        }

        // Спливаюче повідомлення
        let toastTimeout;
        function showToast(msg) {
            let existing = document.querySelector('.toast-msg');
            if(existing) existing.remove();
            let div = document.createElement('div');
            div.className = 'toast-msg';
            div.innerText = msg;
            document.body.appendChild(div);
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => div.remove(), 2000);
        }

        // Приховати стартове повідомлення через 3 сек або після першої дії
        function hideStartMessage() {
            if (startMsg) {
                startMsg.style.opacity = '0';
                setTimeout(() => { if(startMsg) startMsg.style.display = 'none'; }, 600);
            }
        }
        setTimeout(hideStartMessage, 3500);

        // ---------- МАЛЮВАННЯ СТРІЧОК (синя + жовта, анімовані) ----------
        function drawRibbons(landmarks, time) {
            if (!landmarks) return;

            // Використовуємо точки за вухами та скронями для природного початку стрічок
            const leftEar = landmarks[234];   // приблизно ліве вухо
            const rightEar = landmarks[454];  // праве вухо
            const leftTemple = landmarks[162];
            const rightTemple = landmarks[389];
            const chin = landmarks[152];

            if (!leftEar || !rightEar) return;

            const canvasW = canvas.width, canvasH = canvas.height;
            const leftX = (leftEar.x + leftTemple.x) / 2 * canvasW;
            const leftY = (leftEar.y + leftTemple.y) / 2 * canvasH;
            const rightX = (rightEar.x + rightTemple.x) / 2 * canvasW;
            const rightY = (rightEar.y + rightTemple.y) / 2 * canvasH;

            const chinY = chin.y * canvasH;

            // Хвилястий ефект
            const wave1 = Math.sin(time * 3) * 12;
            const wave2 = Math.cos(time * 2.5) * 15;

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#c9a03d";
            ctx.lineWidth = 22;
            ctx.lineCap = 'round';

            // ----- СИНЯ СТРІЧКА (ліворуч) -----
            ctx.beginPath();
            ctx.moveTo(leftX, leftY);
            const cp1x = leftX - 70 + wave1;
            const cp1y = leftY + 50 + wave2;
            const cp2x = leftX - 120 + wave2;
            const cp2y = chinY - 30 + wave1;
            const endX = leftX - 160 + Math.sin(time*2)*10;
            const endY = chinY + 40 + Math.cos(time*1.7)*12;
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
            ctx.strokeStyle = "#3a7ca5";
            ctx.shadowColor = "#1e4f6b";
            ctx.stroke();
            // світліша смуга
            ctx.lineWidth = 8;
            ctx.strokeStyle = "#aad0f5";
            ctx.shadowBlur = 12;
            ctx.stroke();

            // ----- ЖОВТА СТРІЧКА (праворуч) -----
            ctx.beginPath();
            ctx.moveTo(rightX, rightY);
            const rcp1x = rightX + 70 + wave2;
            const rcp1y = rightY + 40 + wave1;
            const rcp2x = rightX + 130 + wave1;
            const rcp2y = chinY - 20 + wave2;
            const rendX = rightX + 170 + Math.cos(time*2.3)*10;
            const rendY = chinY + 30 + Math.sin(time*1.9)*14;
            ctx.bezierCurveTo(rcp1x, rcp1y, rcp2x, rcp2y, rendX, rendY);
            ctx.strokeStyle = "#e6b422";
            ctx.shadowColor = "#b57f1a";
            ctx.stroke();
            ctx.lineWidth = 8;
            ctx.strokeStyle = "#fce38a";
            ctx.stroke();

            ctx.restore();
        }

        // ---------- ВІНОК (БЕЗ ХРЕСТИКІВ) ----------
        function getScaleFromFace() {
            if (!faceLandmarks) return 1.0;
            const leftEye = faceLandmarks[33];
            const rightEye = faceLandmarks[263];
            if (!leftEye || !rightEye) return 1.0;
            const dx = leftEye.x - rightEye.x;
            const dy = leftEye.y - rightEye.y;
            const currentDist = Math.hypot(dx, dy);
            const baseDist = 0.065;
            let scale = currentDist / baseDist;
            return Math.min(1.8, Math.max(0.7, scale));
        }

        function drawWreath() {
            if (!faceLandmarks || faceLandmarks.length === 0) {
                ctx.font = "bold 18px system-ui";
                ctx.fillStyle = "#ebdfa3";
                ctx.shadowBlur = 4;
                ctx.fillText("🍃 Покажи обличчя", canvas.width/2-100, canvas.height/2);
                return;
            }

            // Орієнтир – середина між очима + бровами
            const leftEye = faceLandmarks[33];
            const rightEye = faceLandmarks[263];
            const leftBrow = faceLandmarks[70];
            const rightBrow = faceLandmarks[300];
            const forehead = faceLandmarks[10];

            if (!leftEye || !rightEye) return;

            let centerX = (leftEye.x + rightEye.x) / 2 * canvas.width;
            let centerY = ((leftEye.y + rightEye.y) / 2) * canvas.height - 12; // трохи вище очей

            const scale = getScaleFromFace();
            const baseRadiusX = 160;
            const baseRadiusY = 100;
            const radiusX = baseRadiusX * scale;
            const radiusY = baseRadiusY * scale;
            const offsetY = -25 * scale;

            const flowerCount = selectedFlowers.length;
            if (flowerCount === 0) {
                ctx.font = `bold ${Math.floor(18 * scale)}px system-ui`;
                ctx.fillStyle = "#ebdfa3";
                ctx.fillText("➕ обери квіти знизу", centerX-80*scale, centerY+offsetY-10*scale);
                return;
            }

            const startDeg = 15;
            const endDeg = 165;
            for (let i = 0; i < flowerCount; i++) {
                const t = i / (flowerCount - 1 || 1);
                const deg = startDeg + t * (endDeg - startDeg);
                const rad = deg * Math.PI / 180;
                let x = centerX + radiusX * Math.cos(rad);
                let y = centerY + offsetY + radiusY * Math.sin(rad);
                x += Math.cos(rad) * (12 * scale);
                y += Math.sin(rad) * (8 * scale);

                ctx.shadowBlur = 10 * scale;
                ctx.shadowColor = "#2b1e0e";
                ctx.font = `${Math.floor(44 * scale)}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#3a2a1a";
                ctx.fillText(selectedFlowers[i], x+1, y+1);
                ctx.fillStyle = "#fef7e0";
                ctx.fillText(selectedFlowers[i], x, y);
            }
            ctx.shadowBlur = 0;
        }

        // ---------- ЦИКЛ МАЛЮВАННЯ ----------
        function drawLoop() {
            if (!ctx || !canvas) return;
            if (video.readyState >= video.HAVE_CURRENT_DATA && video.videoWidth) {
                if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                }
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }

            if (faceLandmarks) {
                drawWreath();
                drawRibbons(faceLandmarks, ribbonTime);
                ribbonTime += 0.02;
            } else {
                ctx.font = "18px system-ui";
                ctx.fillStyle = "#f3e7b0";
                ctx.fillText("⏳ Шукаю обличчя...", canvas.width/2-90, 60);
            }
            animationFrame = requestAnimationFrame(drawLoop);
        }

        // ---------- MEDIAPIPE ----------
        function initFaceMesh() {
            faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            faceMesh.onResults(results => {
                if (results.multiFaceLandmarks?.length) {
                    faceLandmarks = results.multiFaceLandmarks[0];
                } else {
                    faceLandmarks = null;
                }
            });

            camera = new Camera(video, {
                onFrame: async () => {
                    await faceMesh.send({ image: video });
                },
                width: 720,
                height: 960
            });
            camera.start().catch(err => showToast("❌ Доступ до камери відхилено"));
        }

        // ---------- ФОТО ----------
        function takeSnapshot() {
            if (!canvas.width) {
                showToast("📷 Камера ще не готова");
                return;
            }
            try {
                const snapCanvas = document.createElement('canvas');
                snapCanvas.width = canvas.width;
                snapCanvas.height = canvas.height;
                const snapCtx = snapCanvas.getContext('2d');
                snapCtx.drawImage(canvas, 0, 0);
                const link = document.createElement('a');
                link.download = `vinok_${Date.now()}.png`;
                link.href = snapCanvas.toDataURL('image/png');
                link.click();
                showToast("📸 Фото збережено!");
                tryPlayMusic();
            } catch (e) {
                showToast("❌ Помилка збереження");
            }
        }

        // ---------- ПРИВ'ЯЗКА ПОДІЙ ----------
        function bindEvents() {
            document.querySelectorAll('.flower-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const flower = card.getAttribute('data-flower');
                    if (flower) {
                        addFlower(flower);
                        hideStartMessage();
                    }
                });
            });

            resetBtn.addEventListener('click', () => { resetAll(); hideStartMessage(); });
            takePhotoBtn.addEventListener('click', takeSnapshot);
            document.getElementById('downloadHintBtn').addEventListener('click', () => {
                showToast("📸 Натисни 'Зробити фото' — кадр з вінком");
                hideStartMessage();
            });
            muteToggleBtn.addEventListener('click', toggleMute);

            // Показати, що музика спробує заграти при першому дотику
            document.body.addEventListener('touchstart', () => { tryPlayMusic(); }, { once: true });
            document.body.addEventListener('click', () => { tryPlayMusic(); }, { once: true });
        }

        // ---------- СТАРТ ----------
        function start() {
            initAudio();
            bindEvents();
            initFaceMesh();
            updateUI();
            drawLoop();
            // Спроба відтворити музику одразу (може бути заблоковано)
            tryPlayMusic();
            // Повідомлення зникає після кліку по будь-якій кнопці
        }

        start();
    })();
</script>
</body>
</html>
