<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1a0d">
    <title>Vinok AR 2050 · SmartLessa</title>
    <style>
        :root {
            --gold: #f3cf8a; --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.65); --blur: blur(25px);
            --neon: #00ff88; --deep-green: #0d1a0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000; font-family: 'Segoe UI', sans-serif;
            color: var(--white); height: 100vh; overflow: hidden;
            position: fixed; width: 100%;
        }

        #videoElement, #outputCanvas {
            position: absolute; top: 50%; left: 50%;
            width: 100%; height: 100%; object-fit: cover;
            transform: translate(-50%, -50%) scaleX(-1); z-index: 10;
        }

        /* Авторський бейдж */
        .author-badge {
            position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px;
            z-index: 1000; display: flex; align-items: center; gap: 10px;
            background: var(--glass); backdrop-filter: var(--blur);
            padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .author-badge span { color: var(--gold); font-size: 11px; letter-spacing: 2px; font-weight: bold; }

        /* Splash Screen з Гліч-ефектом 2050 */
        .welcome-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: radial-gradient(circle at center, #0a1f0a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .welcome-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .brand-container { text-align: center; }
        .smart-lessa-typo {
            font-size: 2.8rem; font-weight: 200; letter-spacing: 12px;
            color: var(--gold); text-transform: uppercase;
            min-height: 4rem; display: flex; align-items: center; justify-content: center;
        }
        .digital-line {
            font-family: monospace; font-size: 10px; color: var(--neon);
            opacity: 0.4; letter-spacing: 4px; margin-top: 15px;
        }

        .start-btn {
            background: linear-gradient(45deg, var(--gold), #fff); color: #000;
            border: none; padding: 20px 60px; border-radius: 50px;
            font-weight: 800; margin-top: 50px; cursor: pointer; letter-spacing: 2px;
            text-transform: uppercase; box-shadow: 0 10px 40px rgba(243, 207, 138, 0.3);
        }

        /* UI Навігація */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(40px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, #000 70%, transparent); z-index: 1000;
        }
        .flower-scroll { 
            display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .flower-scroll::-webkit-scrollbar { display: none; }
        
        .item-card {
            min-width: 85px; height: 100px; background: rgba(255,255,255,0.06);
            border-radius: 22px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .item-card:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }
        .item-card img { width: 45px; height: 45px; object-fit: contain; }
        .item-card span { font-size: 8px; color: var(--gold); margin-top: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        .shutter { width: 72px; height: 72px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
        .shutter-inner { width: 85%; height: 85%; background: #fff; border-radius: 50%; }
        .btn-utility { width: 55px; height: 55px; border-radius: 20px; background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.15); font-size: 1.2rem; }
    </style>
</head>
<body>

<a href="#" class="author-badge"><span>SMARTLESSA 2050</span></a>

<div class="welcome-screen" id="welcome">
    <div class="brand-container">
        <div class="smart-lessa-typo">SMARTLESSA</div>
        <div class="digital-line" id="binaryCode">01010101 11001100</div>
        <div style="margin-top: 40px;">
            <h2 style="letter-spacing: 5px; font-weight: 200; color: #fff;">SACRED CODE</h2>
            <p style="font-size: 10px; color: var(--gold); opacity: 0.6; margin-top: 8px;">UKRAINIAN BIOMETRIC AR</p>
        </div>
    </div>
    <button class="start-btn" id="startBtn">АКТИВУВАТИ ПОРТАЛ</button>
</div>

<video id="videoElement" autoplay playsinline muted></video>
<canvas id="outputCanvas"></canvas>

<div class="bottom-nav">
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
        <button class="btn-utility" onclick="state.selected=[]">✕</button>
        <div class="shutter" onclick="capture()"><div class="shutter-inner"></div></div>
        <button class="btn-utility" id="shareBtn">↗</button>
    </div>
</div>

<audio id="fonMusic" src="fon.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    // ПОВНИЙ СПИСОК 15 РОСЛИН
    const flowers = [
        { id: 1, src: 'flower_1.png', name: 'Шафран' },
        { id: 2, src: 'flower_2.png', name: 'Нарцис' },
        { id: 3, src: 'flower_3.png', name: 'Тюльпан' },
        { id: 4, src: 'flower_4.png', name: 'Горицвіт' },
        { id: 5, src: 'flower_5.png', name: 'Півники' },
        { id: 6, src: 'flower_6.png', name: 'Мак' },
        { id: 7, src: 'flower_7.png', name: 'Волошка' },
        { id: 8, src: 'flower_8.png', name: 'Ромашка' },
        { id: 9, src: 'flower_9.png', name: 'Мальва' },
        { id: 10, src: 'flower_10.png', name: 'Чорнобривець' },
        { id: 11, src: 'flower_11.png', name: 'Барвінок' },
        { id: 12, src: 'flower_12.png', name: 'Калина' },
        { id: 13, src: 'flower_13.png', name: 'Соняшник' },
        { id: 14, src: 'flower_14.png', name: 'Любисток' },
        { id: 15, src: 'flower_15.png', name: 'М\'ята' }
    ];

    const state = { selected: [], smileScore: 0 };
    const loadedImgs = {};
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoElement');

    // Налаштування Гліч-ефекту бренду
    const brandText = "SMARTLESSA";
    const ancientSymbols = "ᛋᛗᚨᚱᛏᛚᛖᛋᛋᚨ◈✙ⴲ✧꠵◈";
    const brandElement = document.querySelector('.smart-lessa-typo');

    flowers.forEach(f => { const img = new Image(); img.src = f.src; loadedImgs[f.id] = img; });

    function runGlitch() {
        let iteration = 0;
        const interval = setInterval(() => {
            brandElement.innerText = brandText.split("").map((letter, index) => {
                if(index < iteration) return brandText[index];
                return ancientSymbols[Math.floor(Math.random() * ancientSymbols.length)];
            }).join("");
            if(iteration >= brandText.length) clearInterval(interval);
            iteration += 1 / 3;
        }, 40);
    }
    setInterval(() => { if (Math.random() > 0.7) runGlitch(); }, 4000);

    function initUI() {
        const scroll = document.getElementById('flowerScroll');
        flowers.forEach(f => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="${f.src}"><span>${f.name}</span>`;
            card.onclick = () => { 
                if(state.selected.length < 15) {
                    state.selected.push({id: f.id, scale: 0, rot: (Math.random()-0.5)*0.4});
                }
            };
            scroll.appendChild(card);
        });
    }

    async function startAR() {
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6});
        faceMesh.onResults(onResults);
        new Camera(video, { onFrame: async () => { 
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            await faceMesh.send({image: video}); 
        }, width: 1280, height: 720 }).start();
    }

    function onResults(results) {
        ctx.save(); ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(results.image, 0,0,canvas.width,canvas.height);
        if (results.multiFaceLandmarks?.[0]) {
            const l = results.multiFaceLandmarks[0];
            const mouthWidth = Math.hypot(l[61].x - l[291].x, l[61].y - l[291].y);
            const faceWidth = Math.hypot(l[234].x - l[454].x, l[234].y - l[454].y);
            state.smileScore = Math.max(0, (mouthWidth / faceWidth - 0.35) * 12);

            drawRibbons(l);
            drawWreath(l);
        }
        ctx.restore();
    }

    function drawRibbons(l) {
        if(state.smileScore < 0.3) return;
        const headW = Math.abs(l[454].x - l[234].x) * canvas.width;
        const lift = headW * 0.25; // Радикальний підйом стрічок разом з вінком

        const left = { x: l[234].x * canvas.width, y: l[234].y * canvas.height - lift };
        const right = { x: l[454].x * canvas.width, y: l[454].y * canvas.height - lift };
        
        const wave = Math.sin(Date.now()/250)*30;
        ctx.save(); ctx.lineWidth = canvas.width*0.04; ctx.lineCap='round';
        
        const drawS = (p, side) => {
            const ex = side==='l' ? canvas.width*0.15 : canvas.width*0.85;
            const ey = canvas.height * 0.85;
            ctx.strokeStyle = side==='l' ? 'rgba(0,87,183,0.8)' : 'rgba(255,215,0,0.8)';
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
            ctx.bezierCurveTo(p.x+(side==='l'?-100:100)+wave, p.y+200, ex, ey-100, ex, ey);
            ctx.stroke();
        };
        drawS(left, 'l'); drawS(right, 'r');
        ctx.restore();
    }

    function drawWreath(l) {
        const rawP0 = { x: l[234].x * canvas.width, y: l[234].y * canvas.height };
        const rawP2 = { x: l[454].x * canvas.width, y: l[454].y * canvas.height };
        const headW = Math.abs(rawP2.x - rawP0.x);
        
        const verticalLift = headW * 0.25; // ПІДЙОМ ВІД ВУХ ДО ВОЛОССЯ

        const p0 = { x: rawP0.x, y: rawP0.y - verticalLift };
        const p2 = { x: rawP2.x, y: rawP2.y - verticalLift };
        
        const p1 = { 
            x: (p0.x + p2.x) / 2, 
            y: (l[10].y * canvas.height) - (headW * 0.2) // ДУГА 0.2
        };

        state.selected.forEach((f, i) => {
            const t = state.selected.length === 1 ? 0.5 : i / (state.selected.length - 1);
            const mt = 1-t;
            const x = mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x;
            const y = mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y;
            
            if(f.scale < 1) f.scale += 0.08;
            const s = (headW*0.32) * f.scale * (1 + state.smileScore*0.2);
            
            const img = loadedImgs[f.id];
            if(img?.complete) {
                ctx.save(); ctx.translate(x,y); ctx.rotate(f.rot);
                ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.drawImage(img, -s/2, -s/2, s, s); ctx.restore();
            }
        });
    }

    // Текстовий бінарний код
    setInterval(() => {
        const el = document.getElementById('binaryCode');
        if(el) el.textContent = Math.random().toString(2).substring(2,18);
    }, 200);

    document.getElementById('startBtn').onclick = () => {
        document.getElementById('welcome').classList.add('hidden');
        const audio = document.getElementById('fonMusic');
        audio.play().catch(() => console.log("Audio waiting for interaction"));
        startAR();
    };

    function capture() {
        const link = document.createElement('a');
        link.download = 'smartlessa-ar-2050.png';
        link.href = canvas.toDataURL(); link.click();
    }

    initUI();
</script>
</body>
</html>
