<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a3a1a">
    <title>Вінок · 7 квітів</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0f1f0f;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .app {
            width: 100%;
            max-width: 500px;
            background: #1a2a1a;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }

        .camera-box {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #000;
            overflow: hidden;
        }

        #videoElement, #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #outputCanvas {
            pointer-events: none;
        }

        .flower-panel {
            background: #2c3a28cc;
            backdrop-filter: blur(8px);
            padding: 12px 0;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            border-top: 1px solid #e9c47e66;
            border-bottom: 1px solid #e9c47e66;
        }

        .flower-strip {
            display: inline-flex;
            gap: 12px;
            padding: 0 16px;
        }

        .flower-card {
            font-size: 2.4rem;
            background: #fff2df;
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.07s linear;
            border: 2px solid transparent;
        }

        .flower-card:active {
            transform: scale(0.94);
        }

        .flower-card.selected {
            border-color: #f5b042;
            box-shadow: 0 0 0 3px #ffd966;
            transform: scale(1.02);
        }

        .selected-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 16px;
            background: #1f2e1acc;
            justify-content: center;
            min-height: 70px;
        }

        .mini-flower {
            background: #fff0cf;
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 1.6rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 2px 6px black;
            transition: 0.05s linear;
        }

        .mini-flower:active {
            transform: scale(0.94);
            background: #ffe0b5;
        }

        .mini-flower span {
            font-size: 1rem;
            font-weight: bold;
            color: #b45f2b;
        }

        .counter {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px;
            background: #2b4225;
            color: #ffecb3;
            border-radius: 40px;
            margin: 8px 16px;
        }

        .photo-button-container {
            padding: 16px;
            text-align: center;
        }

        #takePhotoBtn {
            background: linear-gradient(145deg, #c47d3a, #e09d52);
            border: none;
            width: 90%;
            padding: 16px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px black;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
            transition: 0.08s linear;
            opacity: 0.5;
            transform: scale(0.96);
            pointer-events: none;
        }

        #takePhotoBtn.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            background: linear-gradient(145deg, #e6963c, #ffb86b);
        }

        #takePhotoBtn:active {
            transform: scale(0.97);
        }

        .reset-btn {
            background: #3a5233;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: #fff0cf;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 4px 16px 12px auto;
            cursor: pointer;
            width: fit-content;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a1ae6;
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            color: #ffefb9;
            font-weight: 600;
            z-index: 200;
            pointer-events: none;
            font-size: 0.9rem;
            border: 1px solid #eabd6a;
        }

        .start-overlay {
            position: fixed;
            inset: 0;
            background: #0f1e0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            text-align: center;
            padding: 24px;
        }

        .start-btn {
            background: #e2b45c;
            border: none;
            padding: 16px 32px;
            border-radius: 80px;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 500px) {
            .flower-card {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            .mini-flower {
                font-size: 1.3rem;
                padding: 4px 10px;
            }
            #takePhotoBtn {
                font-size: 1.2rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

<div class="start-overlay" id="startOverlay">
    <h2 style="color:#ffefb0;">🌾 Лісовий вінок</h2>
    <p style="color:#e6dc9e; margin:12px 0;">Оберіть 7 квітів і зробіть магічне фото</p>
    <button class="start-btn" id="startBtn">Почати ✨</button>
    <div style="margin-top:20px; font-size:12px; opacity:0.7;">🎵 Дозвольте доступ до камери</div>
</div>

<div class="app hidden" id="appContainer">
    <div class="camera-box">
        <video id="videoElement" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <div class="counter" id="flowerCounter">🌸 0 / 7 квітів</div>

    <div class="flower-panel">
        <div class="flower-strip" id="flowerStrip"></div>
    </div>

    <div class="selected-list" id="selectedList"></div>

    <div style="display: flex; justify-content: flex-end; padding: 0 16px;">
        <button class="reset-btn" id="resetBtn">🍂 Скинути всі</button>
    </div>

    <div class="photo-button-container">
        <button id="takePhotoBtn">📸 Зробити фото</button>
    </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    (function(){
        // ---------- КОНФІГУРАЦІЯ ----------
        const MAX_FLOWERS = 7;
        const FLOWER_SET = ["🌻","🌼","🌸","🌺","🌷","🌹","💐","🏵️","🌿","🍀","🌸","🌻","🌼","💮","🌺","🌷","🌹","🌼","🌸","🌻"];
        
        // Точки для верхньої дуги голови (лоб, скроні, верхівка)
        // Використовуємо індекси з facemesh, які окреслюють верхню частину обличчя
        const TOP_HEAD_POINTS = [
            10,  // верх лоба
            338, // ліва скроня (верх)
            297, // ліва брова
            332, // ліва скроня
            284, // ліве око (зовнішній кут)
            251, // ліва щока верх
            389, // права щока верх
            356, // праве око (зовнішній кут)
            454, // права скроня
            323, // права скроня верх
            0    // центральна точка чола
        ];
        
        // Стан програми
        let state = {
            selected: [],
            faceLandmarks: null,
            isARSession: false,
            cameraFacing: 'user',
            faceMesh: null,
            camera: null,
        };
        
        // DOM
        const dom = {
            startOverlay: document.getElementById('startOverlay'),
            appContainer: document.getElementById('appContainer'),
            startBtn: document.getElementById('startBtn'),
            video: document.getElementById('videoElement'),
            canvas: document.getElementById('outputCanvas'),
            flowerCounter: document.getElementById('flowerCounter'),
            resetBtn: document.getElementById('resetBtn'),
            takePhotoBtn: document.getElementById('takePhotoBtn'),
            selectedList: document.getElementById('selectedList'),
            flowerStrip: document.getElementById('flowerStrip'),
        };
        
        let canvasCtx = null;
        let animationFrame = null;
        
        // ---------- UI ----------
        function showToast(msg, duration = 2000) {
            let old = document.querySelector('.toast');
            if(old) old.remove();
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, duration);
        }
        
        function updateUI() {
            const count = state.selected.length;
            dom.flowerCounter.textContent = `🌸 ${count} / ${MAX_FLOWERS} квітів`;
            
            if(count === MAX_FLOWERS) {
                dom.takePhotoBtn.classList.add('active');
            } else {
                dom.takePhotoBtn.classList.remove('active');
            }
            
            dom.selectedList.innerHTML = '';
            if(state.selected.length === 0) {
                let placeholder = document.createElement('div');
                placeholder.textContent = '✨ торкніться квітки, щоб додати ✨';
                placeholder.style.cssText = 'font-size:0.8rem; opacity:0.7; color:#e6dbaa; padding:8px';
                dom.selectedList.appendChild(placeholder);
            } else {
                state.selected.forEach((flower, idx) => {
                    const chip = document.createElement('div');
                    chip.className = 'mini-flower';
                    chip.innerHTML = `${flower} <span>✕</span>`;
                    chip.addEventListener('click', (e) => {
                        e.stopPropagation();
                        state.selected.splice(idx, 1);
                        updateUI();
                        highlightSelectedFlowers();
                        playSoftBeep();
                    });
                    dom.selectedList.appendChild(chip);
                });
            }
            highlightSelectedFlowers();
        }
        
        function highlightSelectedFlowers() {
            document.querySelectorAll('.flower-card').forEach(card => {
                const flower = card.dataset.flower;
                if(state.selected.includes(flower)) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }
        
        function addFlower(flower) {
            if(state.selected.length >= MAX_FLOWERS) {
                showToast(`🌿 Вінок вже має ${MAX_FLOWERS} квітів!`);
                return false;
            }
            if(state.selected.includes(flower)) {
                showToast('🍃 Ця квітка вже у вінку');
                return false;
            }
            state.selected.push(flower);
            updateUI();
            playSoftBeep();
            return true;
        }
        
        function resetAll() {
            if(state.selected.length === 0) return;
            state.selected = [];
            updateUI();
            showToast('🍂 Вінок очищено');
            playSoftBeep();
        }
        
        // ---------- ЗВУК ----------
        let audioCtx = null;
        function initAudioContext() {
            if(audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
        }
        function playSoftBeep() {
            if(!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 780;
                gain.gain.value = 0.08;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
                if(audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {}
        }
        
        // ---------- ОСНОВНА ЛОГІКА ВІНКА (ДУГА НА ГОЛОВІ) ----------
        // Обчислюємо опорні точки для дуги: ліва скроня, права скроня, верх чола.
        function getHeadArc(landmarks, canvasW, canvasH) {
            if(!landmarks) return null;
            let points = [];
            for(let idx of TOP_HEAD_POINTS) {
                if(landmarks[idx]) {
                    points.push({
                        x: landmarks[idx].x * canvasW,
                        y: landmarks[idx].y * canvasH
                    });
                }
            }
            if(points.length < 5) return null;
            
            // Знаходимо крайні ліву та праву точки, а також найвищу (верхівка)
            let leftMost = points[0], rightMost = points[0], topMost = points[0];
            for(let p of points) {
                if(p.x < leftMost.x) leftMost = p;
                if(p.x > rightMost.x) rightMost = p;
                if(p.y < topMost.y) topMost = p;
            }
            const leftX = leftMost.x;
            const rightX = rightMost.x;
            const topY = topMost.y;
            const centerX = (leftX + rightX) / 2;
            // Висота дуги (як сильно вона піднімається)
            const arcHeight = Math.max(20, (topY - (leftMost.y + rightMost.y)/2) * 1.2);
            // Ширина дуги
            const width = rightX - leftX;
            return { leftX, rightX, topY, centerX, arcHeight, width };
        }
        
        function drawWreath(ctx, canvasW, canvasH, landmarks, flowers) {
            if(!landmarks || flowers.length === 0) return;
            const arc = getHeadArc(landmarks, canvasW, canvasH);
            if(!arc) return;
            
            const count = flowers.length;
            // Малюємо квіти вздовж дуги (крива Безьє або просто парабола)
            for(let i = 0; i < count; i++) {
                let t = (count === 1) ? 0.5 : i / (count - 1);
                // X: лінійна інтерполяція між лівою та правою скронею
                let x = arc.leftX * (1 - t) + arc.rightX * t;
                // Y: параболічна дуга (вершина в центрі)
                let yOffset = Math.sin(t * Math.PI) * arc.arcHeight * 0.9;
                let y = (arc.leftY || arc.topY) + yOffset - 10;
                // Якщо не зберегли середню Y, обчислюємо приблизно
                if(!arc.leftY) {
                    const midY = (landmarks[10]?.y * canvasH + landmarks[338]?.y * canvasH)/2;
                    y = midY + yOffset - 12;
                } else {
                    y = arc.leftY * (1 - t) + arc.rightY * t + yOffset - 12;
                }
                // Додаткова корекція, щоб вінок сидів на лобі
                if(t < 0.2) y = arc.topY + (y - arc.topY) * (t/0.2);
                if(t > 0.8) y = arc.topY + (y - arc.topY) * ((1-t)/0.2);
                
                const size = 40 + arc.arcHeight * 0.12;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "rgba(0,0,0,0.45)";
                ctx.font = `${Math.floor(size)}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = "rgba(0,0,0,0.45)";
                ctx.fillText(flowers[i], x + 2, y + 2);
                ctx.fillStyle = "#fffcf0";
                ctx.fillText(flowers[i], x, y);
            }
            ctx.shadowBlur = 0;
        }
        
        // Отримуємо додаткові Y координати для лівої та правої точок дуги
        function enhanceArc(landmarks, canvasW, canvasH) {
            if(!landmarks) return null;
            const leftIdx = 338;  // ліва скроня
            const rightIdx = 454; // права скроня
            const topIdx = 10;    // верх чола
            if(!landmarks[leftIdx] || !landmarks[rightIdx] || !landmarks[topIdx]) return null;
            return {
                leftX: landmarks[leftIdx].x * canvasW,
                leftY: landmarks[leftIdx].y * canvasH,
                rightX: landmarks[rightIdx].x * canvasW,
                rightY: landmarks[rightIdx].y * canvasH,
                topY: landmarks[topIdx].y * canvasH,
                arcHeight: (landmarks[topIdx].y * canvasH - (landmarks[leftIdx].y + landmarks[rightIdx].y)/2 * canvasH) * 1.1
            };
        }
        
        // Перевизначимо drawWreath більш точно, використовуючи точки скронь
        function drawWreathFinal(ctx, canvasW, canvasH, landmarks, flowers) {
            if(!landmarks || flowers.length === 0) return;
            const arcData = enhanceArc(landmarks, canvasW, canvasH);
            if(!arcData) return;
            const { leftX, leftY, rightX, rightY, topY, arcHeight } = arcData;
            const count = flowers.length;
            for(let i = 0; i < count; i++) {
                let t = (count === 1) ? 0.5 : i / (count - 1);
                let x = leftX * (1 - t) + rightX * t;
                let yBase = leftY * (1 - t) + rightY * t;
                let yOffset = Math.sin(t * Math.PI) * arcHeight * 0.85;
                let y = yBase + yOffset - 12;
                // Коригуємо, щоб вінок був на лобі, а не на очах
                if(t < 0.15) y = topY + (y - topY) * (t/0.15);
                if(t > 0.85) y = topY + (y - topY) * ((1-t)/0.15);
                const size = 40 + arcHeight * 0.1;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.font = `${Math.floor(size)}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = "rgba(0,0,0,0.45)";
                ctx.fillText(flowers[i], x + 2, y + 2);
                ctx.fillStyle = "#fffcf0";
                ctx.fillText(flowers[i], x, y);
            }
            ctx.shadowBlur = 0;
        }
        
        // ---------- РЕНДЕР ----------
        function renderLoop() {
            if(!canvasCtx || !dom.canvas || !dom.video.videoWidth) {
                animationFrame = requestAnimationFrame(renderLoop);
                return;
            }
            const w = dom.video.videoWidth;
            const h = dom.video.videoHeight;
            if(dom.canvas.width !== w || dom.canvas.height !== h) {
                dom.canvas.width = w;
                dom.canvas.height = h;
            }
            canvasCtx.drawImage(dom.video, 0, 0, w, h);
            if(state.faceLandmarks && state.selected.length > 0) {
                drawWreathFinal(canvasCtx, w, h, state.faceLandmarks, state.selected);
            }
            animationFrame = requestAnimationFrame(renderLoop);
        }
        
        // ---------- MEDIAPIPE + КАМЕРА ----------
        async function initCameraAndMesh() {
            if(state.faceMesh) {
                try { await state.faceMesh.close(); } catch(e) {}
            }
            if(state.camera) {
                try { await state.camera.stop(); } catch(e) {}
            }
            
            state.faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            state.faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.65,
                minTrackingConfidence: 0.65
            });
            state.faceMesh.onResults((results) => {
                if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    state.faceLandmarks = results.multiFaceLandmarks[0];
                } else {
                    state.faceLandmarks = null;
                }
            });
            
            const cameraUtils = Camera;
            state.camera = new cameraUtils(dom.video, {
                onFrame: async () => {
                    if(state.isARSession && state.faceMesh) {
                        await state.faceMesh.send({ image: dom.video });
                    }
                },
                width: 640,
                height: 480,
                facingMode: state.cameraFacing
            });
            await state.camera.start();
        }
        
        // ---------- ФОТО ----------
        function takePhoto() {
            if(state.selected.length !== MAX_FLOWERS) {
                showToast(`🌼 Додайте ще ${MAX_FLOWERS - state.selected.length} квітів`);
                return;
            }
            if(!dom.canvas.width) {
                showToast("⏳ Камера не готова");
                return;
            }
            const w = dom.canvas.width, h = dom.canvas.height;
            canvasCtx.drawImage(dom.video, 0, 0, w, h);
            if(state.faceLandmarks) {
                drawWreathFinal(canvasCtx, w, h, state.faceLandmarks, state.selected);
            } else {
                showToast("👤 Не вдалося розпізнати обличчя, спробуйте ще раз");
                return;
            }
            try {
                let link = document.createElement('a');
                link.download = `vinok_${Date.now()}.png`;
                link.href = dom.canvas.toDataURL('image/png');
                link.click();
                showToast("📸 Фото збережено! 🌸");
                playSoftBeep();
            } catch(e) {
                showToast("❌ Помилка збереження");
            }
        }
        
        // ---------- ПОБУДОВА ПАНЕЛІ КВІТІВ ----------
        function buildFlowerPanel() {
            dom.flowerStrip.innerHTML = '';
            FLOWER_SET.forEach(emoji => {
                const card = document.createElement('div');
                card.className = 'flower-card';
                card.textContent = emoji;
                card.dataset.flower = emoji;
                card.addEventListener('click', () => addFlower(emoji));
                dom.flowerStrip.appendChild(card);
            });
        }
        
        // ---------- ЗАПУСК ----------
        async function startApp() {
            dom.startOverlay.classList.add('hidden');
            dom.appContainer.classList.remove('hidden');
            state.isARSession = true;
            initAudioContext();
            try {
                await initCameraAndMesh();
                canvasCtx = dom.canvas.getContext('2d');
                renderLoop();
                showToast("✨ Оберіть 7 квітів для віночка ✨");
            } catch(err) {
                console.error(err);
                showToast("❌ Помилка доступу до камери. Перевірте дозволи.");
                dom.startOverlay.classList.remove('hidden');
                dom.appContainer.classList.add('hidden');
            }
        }
        
        function bindEvents() {
            dom.startBtn.addEventListener('click', startApp);
            dom.resetBtn.addEventListener('click', resetAll);
            dom.takePhotoBtn.addEventListener('click', takePhoto);
        }
        
        function init() {
            buildFlowerPanel();
            updateUI();
            bindEvents();
        }
        
        init();
        
        document.addEventListener('visibilitychange', () => {
            if(document.hidden && animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            } else if(!document.hidden && state.isARSession && canvasCtx) {
                if(!animationFrame) renderLoop();
            }
        });
    })();
</script>
</body>
