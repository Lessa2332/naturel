<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartLessa · AR Quest 2026</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { 
      --gold: #c9a23d; --dark: #0a0f0a; --glass: rgba(10,15,10,0.8);
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }
    body { background: var(--dark); font-family: -apple-system, system-ui, sans-serif; color: #fff; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }

    /* Екран привітання */
    .welcome-screen { 
      position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle, #1a251a, #050805);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .welcome-screen.hidden { opacity: 0; pointer-events: none; transition: 0.6s; }
    .welcome-card { background: var(--glass); border: 1px solid var(--gold); padding: 30px; border-radius: 35px; backdrop-filter: blur(20px); text-align: center; max-width: 90%; }
    .start-btn { background: var(--gold); color: #000; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 800; font-size: 1.2rem; margin-top: 20px; box-shadow: 0 10px 30px rgba(201,162,61,0.4); }

    /* AR Viewport */
    .ar-viewport { position: relative; width: 100%; height: 100%; }
    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); }
    
    /* UI Layout */
    .ui-overlay { position: absolute; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: var(--safe-top) 15px var(--safe-bottom); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
    .bottom-panel { pointer-events: auto; background: var(--glass); border-radius: 35px; padding: 15px; border: 1px solid rgba(201,162,61,0.2); backdrop-filter: blur(15px); }
    
    .counter { background: rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 20px; font-weight: 800; border: 1px solid var(--gold); }
    .scroll-area { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
    .scroll-area::-webkit-scrollbar { display: none; }
    
    .flower-slot { min-width: 60px; height: 60px; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px dashed var(--gold); display: flex; align-items: center; justify-content: center; }
    .flower-slot.found { border-style: solid; background: rgba(201,162,61,0.1); }
    .flower-slot span { font-size: 30px; opacity: 0.2; }
    .flower-slot.found span { opacity: 1; }

    .controls { display: flex; gap: 10px; align-items: center; }
    .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); background: none; color: var(--gold); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
    .btn-main { background: var(--gold); color: #000; flex: 1; border: none; padding: 15px; border-radius: 30px; font-weight: 800; text-transform: uppercase; }

    #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 3000; }
    #toast.show { opacity: 1; top: 18%; }
  </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
  <div class="welcome-card">
    <h1 style="color:var(--gold); margin-bottom:10px;">SMARTLESSA</h1>
    <p>Допоможи зібрати 12 магічних квітів та отримай свій цифровий віночок!</p>
    <button class="start-btn" id="startBtn">ГРАТИ</button>
  </div>
</div>

<div id="toast">Знайдено!</div>

<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div class="ui-overlay">
    <div class="top-bar">
      <button class="btn-circle" id="resetBtn">🔄</button>
      <div class="counter" id="flowerCounter">0 / 12</div>
      <button class="btn-circle" id="toggleMirror">🤳</button>
    </div>
    <div class="bottom-panel">
      <div class="scroll-area" id="flowerScroll"></div>
      <div class="controls">
        <button class="btn-circle" onclick="alert('Шукай QR-коди з квітами навколо!')">❓</button>
        <button class="btn-main" id="wreathBtn">ВІНОЧОК</button>
        <button class="btn-circle" id="captureBtn">📸</button>
      </div>
    </div>
  </div>
</div>

<audio id="foundSfx" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="bgMusic" loop src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3"></audio>

<script type="module">
  import * as THREE from 'three';
  import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

  const video = document.getElementById('videoElement');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d');
  const bgMusic = document.getElementById('bgMusic');
  const foundSfx = document.getElementById('foundSfx');
  
  let foundFlowers = JSON.parse(localStorage.getItem('smartlessa_found') || '[]');
  let faceLandmarker, renderer, scene, camera3D, wreathGroup;
  let lastProcessingTime = 0;

  function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function updateUI() {
    const scroll = document.getElementById('flowerScroll');
    scroll.innerHTML = '';
    for(let i=1; i<=12; i++) {
      const slot = document.createElement('div');
      slot.className = `flower-slot ${foundFlowers.includes(i) ? 'found' : ''}`;
      slot.innerHTML = `<span>🌸</span>`;
      scroll.appendChild(slot);
    }
    document.getElementById('flowerCounter').textContent = `${foundFlowers.length} / 12`;
  }

  // Оптимізована камера
  async function setupCamera(mode) {
    if (window.stream) window.stream.getTracks().forEach(t => t.stop());
    const constraints = { 
      video: { facingMode: mode, width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 30 } } 
    };
    window.stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = window.stream;
    return new Promise(r => video.onloadedmetadata = r);
  }

  // 3D Моделювання вінка
  function init3D() {
    if (!renderer) {
      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.domElement.style.position = 'absolute';
      renderer.domElement.style.top = '0'; renderer.domElement.style.zIndex = '15';
      renderer.domElement.style.pointerEvents = 'none';
      document.querySelector('.ar-viewport').appendChild(renderer.domElement);
      scene = new THREE.Scene();
      camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    }
    if (wreathGroup) scene.remove(wreathGroup);
    wreathGroup = new THREE.Group();
    
    // Додаємо квіти у вінок (кількість залежить від знайдених)
    const count = Math.max(foundFlowers.length, 1);
    for(let i=0; i<count; i++) {
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ 
        map: new THREE.CanvasTexture(createFlowerTex()), transparent: true 
      }));
      const angle = (i / count) * Math.PI * 2;
      sprite.position.set(Math.cos(angle) * 0.7, Math.sin(angle) * 0.2 + 0.3, 0);
      sprite.scale.set(0.5, 0.5, 1);
      wreathGroup.add(sprite);
    }
    scene.add(wreathGroup);
  }

  function createFlowerTex() {
    const c = document.createElement('canvas'); c.width = 64; c.height = 64;
    const ctx = c.getContext('2d'); ctx.font = '50px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🌸', 32, 32); return c;
  }

  function loop(time) {
    if (video.readyState >= 2) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      // QR Сканування (тільки у режимі environment)
      if (video.getAttribute('facingMode') !== 'user' && time - lastProcessingTime > 300) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(imageData.data, canvas.width, canvas.height);
        if (code && code.data.includes('FLOWER_')) {
          const id = parseInt(code.data.split('_')[1]);
          if (id && !foundFlowers.includes(id)) {
            foundFlowers.push(id);
            localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers));
            foundSfx.play(); showToast("Квітку додано! 🌼"); updateUI();
          }
        }
        lastProcessingTime = time;
      }

      // Face Tracking (тільки якщо запущено вінок)
      if (faceLandmarker && video.srcObject && video.getAttribute('facingMode') === 'user') {
        const results = faceLandmarker.detectForVideo(video, time);
        if (results.faceLandmarks?.[0]) {
          const p = results.faceLandmarks[0][10]; // Лоб
          wreathGroup.position.set((p.x - 0.5) * -4, -(p.y - 0.35) * 4, -p.z * 5);
        }
      }
      if (renderer) renderer.render(scene, camera3D);
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('startBtn').onclick = async () => {
    document.getElementById('welcome').classList.add('hidden');
    await setupCamera('environment');
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
      runningMode: "VIDEO"
    });
    updateUI(); requestAnimationFrame(loop);
  };

  document.getElementById('wreathBtn').onclick = async () => {
    video.setAttribute('facingMode', 'user');
    await setupCamera('user');
    init3D();
    bgMusic.volume = 0.3; bgMusic.play(); // Вмикаємо музику тільки тут
    showToast("Твій магічний вінок! ✨");
  };

  document.getElementById('captureBtn').onclick = () => {
    const link = document.createElement('a');
    link.download = 'smartlessa_ar.png';
    link.href = canvas.toDataURL();
    link.click();
    showToast("Фото збережено! 📸");
  };

  document.getElementById('resetBtn').onclick = () => {
    if(confirm("Скинути прогрес?")) {
      foundFlowers = []; localStorage.clear(); updateUI(); location.reload();
    }
  };
</script>
</body>
</html>
