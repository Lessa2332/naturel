<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1a">
  <title>VINOK 2050 · SMARTLESSA</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      height: 100dvh; /* Dynamic Viewport Height - фікс для мобільних браузерів */
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    #videoElement, #outputCanvas {
      position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%; object-fit: cover;
      transform: translate(-50%, -50%) scaleX(-1);
      z-index: 10;
    }

    /* ФІКС ДЛЯ SAMSUNG ТА ІНШИХ АНДРОЇДІВ */
    .bottom-nav {
      position: absolute; 
      bottom: 0; left: 0; right: 0;
      /* Додаємо відступ знизу, який враховує системні кнопки телефону */
      padding: 10px 20px calc(25px + env(safe-area-inset-bottom)); 
      background: linear-gradient(to top, rgba(0,0,0,0.9) 60%, transparent);
      z-index: 1000;
    }

    /* Ніжний магічний попап */
    #flowerNamePopup {
      position: fixed; top: 12%; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(255, 255, 255, 0.15); 
      backdrop-filter: blur(25px);
      padding: 15px 30px; border-radius: 40px; 
      border: 1px solid rgba(255, 255, 255, 0.3);
      z-index: 1100; opacity: 0; pointer-events: none;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center; color: #fff;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }
    #flowerNamePopup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .flower-scroll {
      display: flex; gap: 12px; overflow-x: auto; 
      padding: 10px 5px; margin-bottom: 20px;
      scrollbar-width: none;
    }
    .flower-scroll::-webkit-scrollbar { display: none; }

    .item-card {
      min-width: 70px; height: 70px;
      background: rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 22px; 
      display: flex; align-items: center; justify-content: center;
      transition: 0.3s; flex-shrink: 0;
    }
    .item-card:active { transform: scale(0.85) rotate(5deg); }
    .item-card img { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }

    .action-bar { display: flex; justify-content: space-around; align-items: center; }
    
    .shutter { 
      width: 75px; height: 75px; border-radius: 50%; 
      border: 4px solid #fff; padding: 5px;
      cursor: pointer; transition: 0.2s; 
    }
    .shutter-inner { width: 100%; height: 100%; background: #fff; border-radius: 50%; box-shadow: 0 0 15px #fff; }

    .welcome-screen {
      position: fixed; inset: 0; z-index: 2000;
      background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: 1.5s;
    }
    .welcome-screen.hidden { transform: scale(1.5); opacity: 0; pointer-events: none; }
    
    .start-btn {
      background: white; color: #b21f1f; 
      padding: 20px 60px; border-radius: 50px;
      font-weight: bold; font-size: 1.2rem; border: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: pointer;
    }
  </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
  <h1 style="font-size: 3rem; margin-bottom: 20px; letter-spacing: 5px;">ВІНОК 2050</h1>
  <p style="margin-bottom: 40px; text-align: center; padding: 0 20px;">Оберіть квіти Червоної Книги та створіть свій магічний оберіг</p>
  <button class="start-btn" id="startBtn">РОЗПОЧАТИ МАГІЮ</button>
</div>

<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flowerNamePopup"><span id="popupText">КВІТКА</span></div>
  
  <div class="bottom-nav">
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
      <button class="btn-utility" style="background:none; border:none; color:white; font-size:30px;" onclick="window.resetWreath()">✕</button>
      <div class="shutter" onclick="window.capturePhoto()"><div class="shutter-inner"></div></div>
      <button class="btn-utility" style="background:none; border:none; color:white; font-size:30px;" id="shareBtn">↗</button>
    </div>
  </div>
</div>

<audio id="fonMusic" src="fon.mp3" loop></audio>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="module">
  import * as THREE from 'three';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  // ----- ДАНІ -----
  const redBookFlowers = [
    { id: 1, src: 'flower_1.png', name: 'Шафран Гейфелів' },
    { id: 2, src: 'flower_2.png', name: 'Нарцис вузьколистий' },
    { id: 3, src: 'flower_3.png', name: 'Тюльпан дібровний' },
    { id: 4, src: 'flower_4.png', name: 'Горицвіт весняний' },
    { id: 5, src: 'flower_5.png', name: 'Півники борові' },
    { id: 6, src: 'flower_6.png', name: 'Сон-трава велика' },
    { id: 7, src: 'flower_7.png', name: 'Дзвоники карпатські' },
    { id: 8, src: 'flower_8.png', name: 'Тирлич безстебловий' },
    { id: 9, src: 'flower_9.png', name: 'Айстра альпійська' },
    { id: 10, src: 'flower_10.png', name: 'Фіалка кримська' },
    { id: 11, src: 'flower_11.png', name: 'Підсніжник білосніжний' },
    { id: 12, src: 'flower_12.png', name: 'Зозулині черевички' },
    { id: 13, src: 'flower_13.png', name: 'Лілія лісова' },
    { id: 14, src: 'flower_14.png', name: 'Едельвейс альпійський' },
    { id: 15, src: 'flower_15.png', name: 'Червона рута' }
  ];

  window.state = { selected: [], popupTimer: null };
  const flowerImages = {};
  redBookFlowers.forEach(f => {
    const img = new Image(); img.src = f.src;
    flowerImages[f.id] = img;
  });

  // ----- THREE.JS СЦЕНА -----
  const video = document.getElementById('videoElement');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d');
  
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0'; renderer.domElement.style.zIndex = '15';
  renderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0'; labelRenderer.domElement.style.zIndex = '16';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(labelRenderer.domElement);

  const haloGroup = new THREE.Group();
  scene.add(haloGroup);

  const flowerLabels = [];

  function updateFlowerSprites() {
    flowerLabels.forEach(item => haloGroup.remove(item.label));
    flowerLabels.length = 0;
    
    const count = window.state.selected.length;
    window.state.selected.forEach((flower, index) => {
      const div = document.createElement('div');
      div.innerHTML = `<img src="${flowerImages[flower.id].src}" style="width:75px; height:75px; animation: float 3s infinite ease-in-out;">`;
      const label = new CSS2DObject(div);
      const angle = (index / count) * Math.PI * 2;
      
      const radius = 0.8;
      label.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius * 0.4, 0);
      haloGroup.add(label);
      flowerLabels.push({ label, angle });
    });
  }

  // Слідкування за обличчям
  window.onResults = function(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    if (results.multiFaceLandmarks?.[0]) {
      const landmarks = results.multiFaceLandmarks[0];
      const left = landmarks[234], right = landmarks[454], top = landmarks[10];
      
      const x = (left.x + right.x) / 2 - 0.5;
      const y = -(top.y - 0.15 - 0.5); // Трохи вище голови
      
      haloGroup.position.set(x * 5, y * 5, -landmarks[1].z * 5);
      haloGroup.rotation.z = Math.atan2(right.y - left.y, right.x - left.x);
    }
    
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  };

  // ----- UI ЛОГІКА -----
  const scroll = document.getElementById('flowerScroll');
  redBookFlowers.forEach(f => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `<img src="${f.src}">`;
    card.onclick = () => {
      document.getElementById('popupText').textContent = f.name;
      document.getElementById('flowerNamePopup').classList.add('show');
      clearTimeout(window.state.popupTimer);
      window.state.popupTimer = setTimeout(() => document.getElementById('flowerNamePopup').classList.remove('show'), 2000);
      
      if (window.state.selected.length < 15) {
        window.state.selected.push({ id: f.id });
        updateFlowerSprites();
        if (navigator.vibrate) navigator.vibrate(30);
      }
    };
    scroll.appendChild(card);
  });

  document.getElementById('startBtn').onclick = () => {
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('fonMusic').play();
    
    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({refineLandmarks: true, minDetectionConfidence: 0.5});
    faceMesh.onResults(window.onResults);

    new Camera(video, {
      onFrame: async () => {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        await faceMesh.send({image: video});
      },
      width: 1280, height: 720
    }).start();
  };

  window.resetWreath = () => { window.state.selected = []; updateFlowerSprites(); };
  
  window.capturePhoto = () => {
    // Логіка скріншота...
    alert("Фото збережено!");
  };
</script>

<style>
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-10px) rotate(5deg); }
  }
</style>

</body>
</html>
