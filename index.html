
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f1f0f">
    <title>Vinok AR · Червона Книга України</title>
    <style>
        :root {
            --gold: #f3cf8a;
            --white: #ffffff;
            --ua-blue: #0057b7;
            --ua-yellow: #ffd700;
            --glass: rgba(255, 255, 255, 0.15);
            --blur: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #000;
            font-family: 'SF Pro Display', system-ui, sans-serif;
            color: var(--white);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .ar-viewport { position: relative; width: 100vw; height: 100vh; background: #000; }

        #videoElement, #outputCanvas {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%) scaleX(-1);
        }

        /* Поп-ап з назвою квітки */
        #flowerNamePopup {
            position: fixed;
            top: 15%; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 40px;
            border: 1px solid var(--gold);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        #flowerNamePopup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Навігація для Samsung */
        .bottom-nav {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(60px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.9) 60%, transparent);
            z-index: 100;
        }

        .flower-scroll {
            display: flex; gap: 12px;
            overflow-x: auto; padding: 10px 5px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .flower-scroll::-webkit-scrollbar { display: none; }

        .item-card {
            min-width: 75px; height: 85px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .item-card:active { transform: scale(0.9); background: var(--ua-yellow); }
        .item-card img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; }
        .item-card span { font-size: 8px; text-align: center; color: var(--gold); padding: 0 4px; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .shutter { width: 70px; height: 70px; border-radius: 50%; border: 4px solid var(--white); display: flex; align-items: center; justify-content: center; }
        .shutter-inner { width: 85%; height: 85%; background: var(--white); border-radius: 50%; }
        .btn-utility { width: 50px; height: 50px; border-radius: 15px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .welcome-screen { position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle at center, #1a3a1a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .welcome-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; transition: 0.8s ease-in; }
        .start-btn { background: var(--white); color: #000; border: none; padding: 18px 40px; border-radius: 40px; font-weight: 600; font-size: 1.1rem; margin-top: 30px; }
    </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
    <h1 style="color:var(--gold); letter-spacing: 2px;">МАГІЧНИЙ ВІНОК</h1>
    <p style="margin-top:15px; opacity:0.8;">Квіти Червоної Книги України 🇺🇦</p>
    <button class="start-btn" id="startBtn">ПОЧАТИ ✨</button>
</div>

<div class="ar-viewport">
    <video id="videoElement" autoplay playsinline muted></video>
    <canvas id="outputCanvas"></canvas>
    
    <div id="flowerNamePopup"><span id="popupText">Назва квітки</span></div>

    <div class="bottom-nav">
        <div class="flower-scroll" id="flowerScroll"></div>
        <div class="action-bar">
            <button class="btn-utility" onclick="resetWreath()">✕</button>
            <div class="shutter" onclick="capturePhoto()"><div class="shutter-inner"></div></div>
            <button class="btn-utility" id="shareBtn">↗</button>
        </div>
    </div>
</div>

<audio id="fonMusic" src="fon.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const redBookFlowers = [
        { id: 1, src: 'flower_1.png', name: 'Підсніжник білосніжний' },
        { id: 2, src: 'flower_2.png', name: 'Шафран Гейфелів' },
        { id: 3, src: 'flower_3.png', name: 'Сон-трава велика' },
        { id: 4, src: 'flower_4.png', name: 'Зозулині черевички' },
        { id: 5, src: 'flower_5.png', name: 'Лілія лісова' },
        { id: 6, src: 'flower_6.png', name: 'Любка дволиста' },
        { id: 7, src: 'flower_7.png', name: 'Едельвейс (Білотка)' },
        { id: 8, src: 'flower_8.png', name: 'Нарцис вузьколистий' },
        { id: 9, src: 'flower_9.png', name: 'Тюльпан дібровний' },
        { id: 10, src: 'flower_10.png', name: 'Горицвіт весняний' },
        { id: 11, src: 'flower_11.png', name: 'Півники борові' },
        { id: 12, src: 'flower_12.png', name: 'Дзвоники карпатські' },
        { id: 13, src: 'flower_13.png', name: 'Тирлич безстебловий' },
        { id: 14, src: 'flower_14.png', name: 'Айстра альпійська' },
        { id: 15, src: 'flower_15.png', name: 'Червона рута' }
    ];

    const state = { selected: [], smileScore: 0, popupTimer: null };
    const loadedImages = {};
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoElement');

    // Попереднє завантаження
    redBookFlowers.forEach(f => {
        const img = new Image();
        img.src = f.src;
        loadedImages[f.id] = img;
    });

    function initUI() {
        const scroll = document.getElementById('flowerScroll');
        redBookFlowers.forEach(f => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="${f.src}"><span>${f.name.split(' ')[0]}</span>`;
            card.onclick = () => {
                showName(f.name);
                if(state.selected.length < 8) {
                    state.selected.push({ id: f.id, scale: 0, rot: (Math.random()-0.5)*0.4 });
                    if(navigator.vibrate) navigator.vibrate(30);
                }
            };
            scroll.appendChild(card);
        });
    }

    function showName(name) {
        const p = document.getElementById('flowerNamePopup');
        document.getElementById('popupText').textContent = name;
        p.classList.add('show');
        clearTimeout(state.popupTimer);
        state.popupTimer = setTimeout(() => p.classList.remove('show'), 3000);
    }

    async function startAR() {
        const faceMesh = new FaceMesh({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults(onResults);
        const camera = new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                await faceMesh.send({image: video});
            },
            width: 1280, height: 720
        });
        camera.start();
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiFaceLandmarks?.[0]) {
            const landmarks = results.multiFaceLandmarks[0];
            const dist = Math.hypot(landmarks[61].x - landmarks[291].x, landmarks[61].y - landmarks[291].y);
            state.smileScore = Math.max(0, (dist - 0.07) * 12);

            if(state.smileScore > 1.5) drawRibbons(landmarks);
            drawWreath(landmarks);
        }
        ctx.restore();
    }

    function drawRibbons(landmarks) {
        const left = landmarks[103], right = landmarks[332];
        const time = Date.now() / 200;
        const wave = Math.sin(time) * 25;

        ctx.save();
        ctx.lineWidth = canvas.width * 0.035;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.3)';

        // Синя стрічка
        ctx.strokeStyle = '#0057b7';
        ctx.beginPath();
        ctx.moveTo(left.x * canvas.width, left.y * canvas.height);
        ctx.bezierCurveTo(left.x * canvas.width - 80 + wave, left.y * canvas.height + 150, canvas.width * 0.1, canvas.height * 0.7, canvas.width * 0.05, canvas.height);
        ctx.stroke();

        // Жовта стрічка
        ctx.strokeStyle = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(right.x * canvas.width, right.y * canvas.height);
        ctx.bezierCurveTo(right.x * canvas.width + 80 - wave, right.y * canvas.height + 150, canvas.width * 0.9, canvas.height * 0.7, canvas.width * 0.95, canvas.height);
        ctx.stroke();
        ctx.restore();
    }

    function drawWreath(landmarks) {
        const p0_raw = landmarks[103], p2_raw = landmarks[332], top = landmarks[10];
        const p0 = { x: p0_raw.x * canvas.width, y: p0_raw.y * canvas.height };
        const p2 = { x: p2_raw.x * canvas.width, y: p2_raw.y * canvas.height };
        const headW = Math.abs(p2.x - p0.x);
        const p1 = { x: (p0.x + p2.x)/2, y: (top.y * canvas.height) - (headW * 0.75) };
        p0.y -= headW * 0.2; p2.y -= headW * 0.2;

        state.selected.forEach((f, i) => {
            const t = state.selected.length === 1 ? 0.5 : i / (state.selected.length - 1);
            const mt = 1 - t;
            const x = mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x;
            const y = mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y;

            if(f.scale < 1) f.scale += 0.08;
            const size = (headW * 0.35) * f.scale * (1 + state.smileScore * 0.25);
            const img = loadedImages[f.id];

            if(img?.complete) {
                ctx.save();
                ctx.translate(x, y); ctx.rotate(f.rot);
                ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.drawImage(img, -size/2, -size/2, size, size);
                ctx.restore();
            }
        });
    }

    window.resetWreath = () => state.selected = [];
    window.capturePhoto = () => {
        const link = document.createElement('a');
        link.download = 'vinok-red-book.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    document.getElementById('shareBtn').onclick = async () => {
        const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
        const file = new File([blob], 'vinok.png', {type: 'image/png'});
        if (navigator.canShare && navigator.canShare({files: [file]})) {
            navigator.share({files: [file], title: 'Мій вінок 🇺🇦', text: 'Бережімо квіти Червоної Книги!'});
        } else { capturePhoto(); }
    };

    document.getElementById('startBtn').onclick = () => {
        document.getElementById('welcome').classList.add('hidden');
        document.getElementById('fonMusic').play();
        startAR();
    };
    initUI();
</script>
</body>
</html>
