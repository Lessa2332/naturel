  <style>
    /* Всі твої оригінальні стилі залишаються без змін */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%) scaleX(-1); z-index: 10; }
    .author-badge { position: absolute; top: calc(20px + env(safe-area-inset-top)); right: 20px; z-index: 1000; display: flex; align-items: center; gap: 10px; background: rgba(0, 255, 255, 0.1); backdrop-filter: blur(15px); padding: 10px 18px; border-radius: 50px; border: 1px solid rgba(0, 255, 255, 0.4); text-decoration: none; box-shadow: 0 0 20px rgba(0, 255, 200, 0.3); }

    #flowerNamePopup { position: fixed; top: 15%; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(0, 20, 30, 0.8); backdrop-filter: blur(20px); padding: 18px 35px; border-radius: 40px; border: 1px solid #0ff; z-index: 1100; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; box-shadow: 0 0 30px #0ff8; }
    #flowerNamePopup.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 20px calc(20px + env(safe-area-inset-bottom)); background: linear-gradient(to top, #000 70%, transparent); z-index: 1000; }
    .flower-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 8px 5px; margin-bottom: 15px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .flower-scroll::-webkit-scrollbar { display: none; }
    .item-card { min-width: 65px; height: 65px; background: rgba(0, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 200, 0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
    .item-card:active { transform: scale(0.9); background: #0ff3; }
    .item-card img { width: 45px; height: 45px; object-fit: contain; }
    .action-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
    .shutter { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
    .shutter-inner { width: 80%; height: 80%; background: #fff; border-radius: 50%; }
    .btn-utility { width: 50px; height: 50px; border-radius: 18px; background: rgba(0, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid #0ff8; color: #fff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
    .welcome-screen { position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle at 30% 40%, #021218, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 1.2s cubic-bezier(0.7,0,0.3,1); }
    .welcome-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    .logo-2050 { font-size: 4.8rem; font-weight: 900; letter-spacing: 12px; background: linear-gradient(45deg, #a0f0ff, #b3ffd9, #b3b3ff); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 40px cyan; }
    .start-btn { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 18px 50px; border-radius: 60px; font-weight: 800; margin-top: 60px; letter-spacing: 6px; cursor: pointer; }

    #loader { display: none; margin-top: 20px; color: #0ff; font-size: 12px; letter-spacing: 2px; }

<script>
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  // Data-Driven UX: Функція для "аналітики"
  function trackEvent(eventName, detail) {
    console.log(`[Analytics] ${eventName}:`, detail);
    // Тут можна було б відправляти дані на сервер
  }

  document.getElementById('startBtn').onclick = async function() {
    const btn = this;
    const loader = document.getElementById('loader');
    btn.style.display = 'none';
    loader.style.display = 'block';

    try {
      // Завантажуємо важкі бібліотеки тільки при натисканні (Lazy Loading)
      await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js");
      await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js");
      
      document.getElementById('welcome').classList.add('hidden');
      document.getElementById('fonMusic').play().catch(() => {});
      
      // Ініціалізація AR (код з твого модуля перенесений сюди)
      initAR();
      trackEvent('AppStart', { time: new Date().toISOString() });
    } catch (e) {
      alert("Помилка доступу до технологій 2050. Перевірте інтернет та камеру.");
      btn.style.display = 'block';
      loader.style.display = 'none';
    }
  };
</script>

<script type="module">
  import * as THREE from 'three';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  // Весь твій Three.js код залишається тут...
  // (Я скоротив для зручності, але ти вставляєш свій оригінальний блок)
  
  window.initAR = function() {
    // Встав сюди всю логіку з твого <script type="module">
    // Включаючи створення сцени, haloGroup та FaceMesh
    console.log("AR System Online");
    startARProcess(); 
  };

  async function startARProcess() {
    const video = document.getElementById('videoElement');
    const faceMesh = new window.FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceMesh.onResults(window.onResults);

    const camera = new window.Camera(video, {
      onFrame: async () => { await faceMesh.send({image: video}); },
      width: 1280, height: 720
    });
    camera.start();
  }
</script>
