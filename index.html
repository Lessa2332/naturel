<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f0a">
  <title>SmartLessa · Квест-гра (фінал)</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm"
      }
    }
  </script>
  <!-- jsQR підключаємо як звичайний скрипт, бо він не ESM -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --gold: #c9a23d; --gold-light: #e2c47c; --dark-bg: #0a0f0a; --glass: rgba(20,30,20,0.65); --blur: blur(20px); --safe-bottom: env(safe-area-inset-bottom,0px); }
    body { background: #0a0f0a; font-family: system-ui; color: #fff; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
    .ar-viewport { position: relative; width: 100%; height: 100dvh; overflow: hidden; }
    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%); z-index: 10; }
    .welcome-screen { position: fixed; inset: 0; z-index: 2000; background: #050805; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; opacity: 1; visibility: visible; transition: opacity 0.5s; }
    .welcome-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .welcome-logo { font-size: clamp(2rem,10vw,4.5rem); font-weight: 700; letter-spacing: 6px; color: var(--gold); text-shadow: 0 0 15px rgba(201,162,61,0.4); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { text-shadow: 0 0 5px rgba(201,162,61,0.3); } 50% { text-shadow: 0 0 25px rgba(201,162,61,0.7); } }
    .start-btn { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 14px 40px; border-radius: 60px; font-weight: 600; font-size: 1.2rem; cursor: pointer; margin-top: 20px; }
    .herbarium-panel { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 20px; right: 20px; z-index: 1200; padding: 24px 20px; max-height: calc(100dvh - 100px); overflow-y: auto; display: none; backdrop-filter: blur(30px); background: rgba(10,20,10,0.85); border: 1px solid rgba(201,162,61,0.4); border-radius: 36px; }
    .herbarium-panel.show { display: block; }
    .herbarium-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 16px; margin-top: 20px; }
    .herb-item { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 12px 8px; text-align: center; border: 1px solid rgba(201,162,61,0.2); cursor: pointer; }
    .herb-item.found { border-color: var(--gold); background: rgba(201,162,61,0.15); }
    .herb-item img { width: 60px; height: 60px; object-fit: contain; filter: grayscale(0.7); }
    .herb-item.found img { filter: none; }
    .close-btn { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--gold); font-size: 32px; cursor: pointer; }
    .hologram-panel { position: absolute; bottom: 16px; left: 16px; right: 16px; padding: 20px 16px calc(20px + var(--safe-bottom)); background: rgba(10,18,10,0.55); backdrop-filter: blur(30px); border: 1px solid rgba(201,162,61,0.4); border-radius: 48px 48px 32px 32px; z-index: 1000; }
    .mission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .flower-counter { background: rgba(201,162,61,0.2); padding: 6px 16px; border-radius: 40px; border: 1px solid var(--gold); }
    .flower-scroll { display: flex; gap: 14px; overflow-x: auto; padding: 8px 4px 16px; }
    .item-card { min-width: 80px; height: 80px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(201,162,61,0.3); border-radius: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .item-card:active { transform: scale(0.94); }
    .item-card img { width: 55px; height: 55px; }
    .action-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px 0; }
    .gold-btn { background: none; border: 1.5px solid var(--gold); color: var(--gold); width: 64px; height: 64px; border-radius: 40px; font-size: 30px; cursor: pointer; }
    .gold-btn:active { transform: scale(0.92); background: var(--gold); color: #000; }
    .shutter { width: 80px; height: 80px; border-radius: 60px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .shutter-inner { width: 70%; height: 70%; background: var(--gold); border-radius: 50%; }
    #flowerNamePopup { position: fixed; top: 18%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 24px; border-radius: 60px; border: 1px solid var(--gold); opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; }
    #flowerNamePopup.show { opacity: 1; }
    .herbarium-toggle { position: absolute; top: calc(20px + env(safe-area-inset-top)); left: 20px; z-index: 1050; width: 56px; height: 56px; border-radius: 30px; background: rgba(20,30,20,0.6); backdrop-filter: blur(15px); border: 1px solid var(--gold); color: var(--gold); font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .error-toast, .info-toast { position: fixed; bottom: 120px; left: 20px; right: 20px; background: rgba(180,40,40,0.95); color: white; padding: 14px; border-radius: 40px; text-align: center; display: none; z-index: 1300; }
    .info-toast { background: rgba(0,100,0,0.9); }
    #leaderboard { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 12px; margin-top: 20px; font-size: 13px; }
  </style>
</head>
<body>
<div class="welcome-screen" id="welcome">
  <div class="welcome-logo">SMARTLESSA</div>
  <div class="welcome-desc">Таємна локація · Шкільний портал</div>
  <div class="welcome-desc" style="font-size:14px;">Знайди 12 QR-кодів, щоб зібрати рідкісні квіти</div>
  <button class="start-btn" id="startBtn">АКТИВУВАТИ</button>
  <p style="margin-top: 30px; color: #888; font-size: 12px;">піднеси долоню до камери</p>
</div>

<div class="herbarium-toggle" id="toggleHerbarium">🌿</div>
<div class="herbarium-panel" id="herbariumPanel">
  <button class="close-btn" id="closeHerbarium">✕</button>
  <h2 style="color:var(--gold);">Гербарій</h2>
  <div class="herbarium-grid" id="herbariumGrid"></div>
  <div style="margin-top: 20px; text-align: center; display: flex; gap: 12px; justify-content: center;">
    <button id="useHerbariumBtn" style="background:var(--gold); border:none; color:#000; padding: 12px 20px; border-radius: 40px; font-weight:600;">Сплести вінок</button>
    <button id="resetProgressBtn" style="background:transparent; border:1px solid red; color:red; padding: 12px 20px; border-radius: 40px;">Скинути прогрес</button>
  </div>
  <div id="leaderboard">🏆 Лідерборд (увімкніть Supabase)</div>
</div>

<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flowerNamePopup"><span id="popupText">Квітка</span></div>
  <div class="hologram-panel">
    <div class="mission-header">
      <span class="mission-title">Місія: Хранителі</span>
      <span class="flower-counter" id="flowerCounter">0/12</span>
    </div>
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
      <button class="gold-btn" id="switchCameraBtn">🔄</button>
      <div class="shutter" id="captureBtn"><div class="shutter-inner"></div></div>
      <button class="gold-btn" id="shareBtn">↗</button>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>
<div class="info-toast" id="infoToast"></div>
<audio id="addSound" src="data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f38="></audio>

<script type="module">
  import * as THREE from 'three';
  import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';
  
  // jsQR підключений глобально через script tag
  const jsQR = window.jsQR;
  if (!jsQR) console.error('jsQR не завантажився!');
  
  // ---------- КОНФІГУРАЦІЯ ----------
  const FLOWERS = [
    { id: 1, name: 'Шафран Гейфелів', img: 'flower_1.png' }, { id: 2, name: 'Нарцис', img: 'flower_2.png' },
    { id: 3, name: 'Тюльпан', img: 'flower_3.png' }, { id: 4, name: 'Горицвіт', img: 'flower_4.png' },
    { id: 5, name: 'Півники', img: 'flower_5.png' }, { id: 6, name: 'Сон-трава', img: 'flower_6.png' },
    { id: 7, name: 'Дзвоники', img: 'flower_7.png' }, { id: 8, name: 'Тирлич', img: 'flower_8.png' },
    { id: 9, name: 'Айстра', img: 'flower_9.png' }, { id: 10, name: 'Фіалка', img: 'flower_10.png' },
    { id: 11, name: 'Підсніжник', img: 'flower_11.png' }, { id: 12, name: 'Черевички', img: 'flower_12.png' },
    { id: 13, name: 'Лілія', img: 'flower_13.png' }, { id: 14, name: 'Едельвейс', img: 'flower_14.png' },
    { id: 15, name: 'Червона рута', img: 'flower_15.png' }
  ];
  const QR_MAP = {
    "SMARTLESSA_FLOWER_1":1,"SMARTLESSA_FLOWER_2":2,"SMARTLESSA_FLOWER_3":3,"SMARTLESSA_FLOWER_4":4,
    "SMARTLESSA_FLOWER_5":5,"SMARTLESSA_FLOWER_6":6,"SMARTLESSA_FLOWER_7":7,"SMARTLESSA_FLOWER_8":8,
    "SMARTLESSA_FLOWER_9":9,"SMARTLESSA_FLOWER_10":10,"SMARTLESSA_FLOWER_11":11,"SMARTLESSA_FLOWER_12":12
  };
  let foundFlowers = [];
  let wreathFlowers = [];
  let currentFacingMode = 'environment'; // 'user' або 'environment'
  let currentStream = null;
  let faceLandmarker = null;
  let video, canvas2d, ctx2d;
  let renderer, scene, camera3D, wreathGroup;
  let failedQRattempts = 0;

  function loadLocal() {
    const stored = localStorage.getItem('smartlessa_found');
    foundFlowers = stored ? JSON.parse(stored) : [];
    const wreath = localStorage.getItem('smartlessa_wreath');
    wreathFlowers = wreath ? JSON.parse(wreath) : [];
  }
  function saveLocal() {
    localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers));
    localStorage.setItem('smartlessa_wreath', JSON.stringify(wreathFlowers));
  }
  loadLocal();

  // UI Helpers
  function showPopup(msg, duration=2000) {
    const popup = document.getElementById('flowerNamePopup');
    document.getElementById('popupText').textContent = msg;
    popup.classList.add('show');
    setTimeout(() => popup.classList.remove('show'), duration);
  }
  function playSound() { document.getElementById('addSound').play().catch(()=>{}); }
  function showError(msg) {
    const toast = document.getElementById('errorToast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);
  }
  function showInfo(msg) {
    const toast = document.getElementById('infoToast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  function addFlower(flowerId) {
    if (!foundFlowers.includes(flowerId)) {
      foundFlowers.push(flowerId);
      saveLocal();
      updateUI();
      const flower = FLOWERS.find(f => f.id === flowerId);
      showPopup(`🌼 ${flower.name} знайдено!`, 2500);
      playSound();
      if (navigator.vibrate) navigator.vibrate(50);
      const herbItem = document.querySelector(`.herb-item[data-id='${flowerId}']`);
      if (herbItem) herbItem.classList.add('found');
    }
  }

  function updateUI() {
    document.getElementById('flowerCounter').textContent = `${foundFlowers.length}/12`;
    const grid = document.getElementById('herbariumGrid');
    grid.innerHTML = '';
    FLOWERS.forEach(f => {
      const div = document.createElement('div');
      div.className = `herb-item ${foundFlowers.includes(f.id) ? 'found' : ''}`;
      div.setAttribute('data-id', f.id);
      div.innerHTML = `<img src="${f.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23c9a23d%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2255%22%20text-anchor%3D%22middle%22%20fill%3D%22black%22%3E${f.name[0]}%3C%2Ftext%3E%3C%2Fsvg%3E'"><span>${f.name.split(' ')[0]}</span>`;
      grid.appendChild(div);
    });
    updateWreath3D();
  }

  // Three.js
  function initThree() {
    renderer = new THREE.WebGLRenderer({ alpha: true, preserveDrawingBuffer: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    renderer.domElement.style.zIndex = '15';
    renderer.domElement.style.pointerEvents = 'none';
    document.querySelector('.ar-viewport').appendChild(renderer.domElement);
    scene = new THREE.Scene();
    camera3D = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera3D.position.z = 5;
    wreathGroup = new THREE.Group();
    scene.add(wreathGroup);
    animate3D();
  }
  function updateWreath3D() {
    if (!wreathGroup) return;
    while(wreathGroup.children.length) wreathGroup.remove(wreathGroup.children[0]);
    const count = wreathFlowers.length;
    if (count === 0) return;
    wreathFlowers.forEach((id, i) => {
      const flower = FLOWERS.find(f => f.id === id);
      if (!flower) return;
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#c9a23d';
      ctx.fillRect(0,0,128,128);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px system-ui';
      ctx.fillText(flower.name[0], 50, 75);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
      const sprite = new THREE.Sprite(material);
      const angle = (i / count) * Math.PI * 2;
      const radius = 0.85;
      sprite.position.set(Math.cos(angle) * radius, Math.sin(angle) * 0.35 + 0.15, 0);
      sprite.scale.set(0.55, 0.55, 1);
      wreathGroup.add(sprite);
    });
  }
  function animate3D() { requestAnimationFrame(animate3D); if(renderer && scene && camera3D) renderer.render(scene, camera3D); }

  // Динамічне дзеркалювання
  function updateMirror() {
    const mirror = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    const transformValue = `translate(-50%, -50%) ${mirror}`;
    video.style.transform = transformValue;
    canvas2d.style.transform = transformValue;
  }

  // Встановлення розміру canvas
  function setCanvasSize() {
    if (video.videoWidth && video.videoHeight) {
      canvas2d.width = video.videoWidth;
      canvas2d.height = video.videoHeight;
      console.log(`Canvas size set to ${canvas2d.width}x${canvas2d.height}`);
    } else {
      // fallback
      canvas2d.width = 640;
      canvas2d.height = 480;
    }
  }

  // Камера та AR
  async function switchCamera() {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    if (currentStream) {
      currentStream.getTracks().forEach(track => track.stop());
    }
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: currentFacingMode }, width: { ideal: 640 }, height: { ideal: 480 } }
    });
    currentStream = stream;
    video.srcObject = stream;
    await video.play();
    setCanvasSize();
    updateMirror();
  }

  async function initFaceLandmarker() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      outputFaceBlendshapes: false,
      runningMode: "VIDEO",
      numFaces: 1
    });
    console.log("FaceLandmarker ініціалізовано");
  }

  function processVideo() {
    if (!faceLandmarker || video.readyState < 2) {
      requestAnimationFrame(processVideo);
      return;
    }
    const now = performance.now();
    const results = faceLandmarker.detectForVideo(video, now);
    ctx2d.save();
    ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
    ctx2d.drawImage(video, 0, 0, canvas2d.width, canvas2d.height);
    
    // QR сканування
    if (jsQR && canvas2d.width > 0 && canvas2d.height > 0) {
      const imageData = ctx2d.getImageData(0, 0, canvas2d.width, canvas2d.height);
      const code = jsQR(imageData.data, canvas2d.width, canvas2d.height);
      if (code && QR_MAP[code.data]) {
        addFlower(QR_MAP[code.data]);
        failedQRattempts = 0;
      } else {
        failedQRattempts++;
        if (failedQRattempts > 30 && currentFacingMode === 'environment') {
          showInfo('📸 Спробуй піднести телефон ближче до світла');
          failedQRattempts = 0;
        }
      }
    }
    
    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      const lm = results.faceLandmarks[0];
      const topForehead = lm[10];
      const nose = lm[1];
      const yOffset = (topForehead.y - nose.y) * 0.3;
      wreathGroup.position.set(
        (topForehead.x - 0.5) * 5,
        -(topForehead.y - yOffset - 0.45) * 5,
        -topForehead.z * 4
      );
      const leftEye = lm[33];
      const rightEye = lm[263];
      wreathGroup.rotation.z = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);
    }
    ctx2d.restore();
    requestAnimationFrame(processVideo);
  }

  async function startAR() {
    await initFaceLandmarker();
    processVideo();
  }

  // Ініціалізація UI
  function initUI() {
    video = document.getElementById('videoElement');
    canvas2d = document.getElementById('outputCanvas');
    ctx2d = canvas2d.getContext('2d');
    
    video.addEventListener('loadedmetadata', () => {
      setCanvasSize();
      updateMirror();
    });
    
    initThree();
    
    const scroll = document.getElementById('flowerScroll');
    FLOWERS.forEach(f => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `<img src="${f.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2240%22%20fill%3D%22%23c9a23d%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2265%22%20text-anchor%3D%22middle%22%20fill%3D%22black%22%20font-size%3D%2240%22%3E${f.name[0]}%3C%2Ftext%3E%3C%2Fsvg%3E'">`;
      card.onclick = () => {
        if (!wreathFlowers.includes(f.id)) {
          wreathFlowers.push(f.id);
          saveLocal();
          updateWreath3D();
          showPopup(`🌺 ${f.name} додано до вінка`, 1500);
          playSound();
        } else showPopup(`🌸 ${f.name} вже у вінку`, 1000);
      };
      scroll.appendChild(card);
    });

    document.getElementById('captureBtn').onclick = () => {
      const finalCanvas = document.createElement('canvas');
      finalCanvas.width = canvas2d.width;
      finalCanvas.height = canvas2d.height;
      const fCtx = finalCanvas.getContext('2d');
      fCtx.drawImage(canvas2d, 0, 0);
      if (renderer && renderer.domElement) {
        fCtx.drawImage(renderer.domElement, 0, 0);
      }
      const link = document.createElement('a');
      link.download = `lessa-${Date.now()}.png`;
      link.href = finalCanvas.toDataURL('image/png');
      link.click();
    };
    document.getElementById('shareBtn').onclick = async () => {
      document.getElementById('captureBtn').click();
      if (navigator.share) await navigator.share({ title: 'Мій гербарій', text: `Я знайшов ${foundFlowers.length} квітів!` }).catch(()=>{});
    };
    document.getElementById('switchCameraBtn').onclick = switchCamera;
    document.getElementById('toggleHerbarium').onclick = () => document.getElementById('herbariumPanel').classList.add('show');
    document.getElementById('closeHerbarium').onclick = () => document.getElementById('herbariumPanel').classList.remove('show');
    document.getElementById('useHerbariumBtn').onclick = async () => {
      if (foundFlowers.length === 0) { showError('Спочатку знайди квіти через QR!'); return; }
      if (currentFacingMode !== 'user') await switchCamera();
      wreathFlowers = [...foundFlowers];
      saveLocal();
      updateWreath3D();
      document.getElementById('herbariumPanel').classList.remove('show');
      showInfo(`Вінок зібрано з ${wreathFlowers.length} квітів!`);
    };
    document.getElementById('resetProgressBtn').onclick = () => {
      if (confirm('Скинути весь прогрес?')) {
        foundFlowers = [];
        wreathFlowers = [];
        saveLocal();
        updateUI();
        updateWreath3D();
        showInfo('Прогрес скинуто');
      }
    };
  }

  // Старт
  document.getElementById('startBtn').onclick = async () => {
    console.log("Кнопка натиснута");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: currentFacingMode }, width: { ideal: 640 }, height: { ideal: 480 } }
      });
      currentStream = stream;
      video.srcObject = stream;
      await video.play();
      document.getElementById('welcome').classList.add('hidden');
      startAR();
    } catch (err) {
      showError('Помилка доступу до камери. Перевірте дозволи та запуск через HTTPS.');
      console.error(err);
    }
  };
  window.addEventListener('resize', () => {
    if (camera3D) {
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  });
  initUI();
  updateUI();
</script>
</body>
</html>
