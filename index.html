<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f1a">
  <title>ШКІЛЬНИЙ ПОРТАЛ · SMARTLESSA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }

    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%) scaleX(-1); z-index: 10; }

    /* Гербарій (колекція) */
    .herbarium-panel {
      position: absolute; top: 20px; left: 20px; right: 20px; z-index: 1200;
      background: rgba(0, 30, 20, 0.8); backdrop-filter: blur(20px);
      border: 2px solid #0f8; border-radius: 30px; padding: 15px;
      display: none; /* приховано за замовчуванням */
      max-height: 70vh; overflow-y: auto;
      box-shadow: 0 0 40px #0f8;
    }
    .herbarium-panel.show { display: block; }

    .herbarium-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .herb-item {
      background: rgba(0,40,30,0.6); border-radius: 15px; padding: 8px;
      text-align: center; border: 1px solid #0f8;
    }
    .herb-item img { width: 50px; height: 50px; object-fit: contain; filter: grayscale(0.8); }
    .herb-item.found img { filter: none; }
    .herb-item.found { border-color: gold; box-shadow: 0 0 15px gold; }

    .close-herbarium {
      position: absolute; top: 5px; right: 15px; font-size: 30px; color: #0f8; cursor: pointer;
    }

    /* Голограма на руці */
    .hologram-panel {
      position: absolute; bottom: 20px; left: 20px; right: 20px;
      padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
      background: rgba(0, 30, 40, 0.4); backdrop-filter: blur(20px);
      border: 1.5px solid #0ff; border-radius: 40px 40px 20px 20px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
      z-index: 1000;
    }
    .mission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .flower-counter { background: rgba(0,255,255,0.2); padding: 5px 15px; border-radius: 30px; border: 1px solid #0ff; }

    .flower-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px; margin-bottom: 10px; scrollbar-width: none; }
    .flower-scroll::-webkit-scrollbar { display: none; }

    .item-card {
      min-width: 65px; height: 65px; background: rgba(0, 40, 50, 0.6); backdrop-filter: blur(10px);
      border: 1.5px solid #0ff; border-radius: 20px; display: flex; align-items: center; justify-content: center;
      transition: 0.2s; flex-shrink: 0; cursor: pointer;
    }
    .item-card img { width: 45px; height: 45px; object-fit: contain; }

    .action-bar { display: flex; justify-content: space-around; align-items: center; }
    .hologram-btn {
      background: none; border: 2px solid #0ff; color: #0ff; font-size: 24px;
      width: 55px; height: 55px; border-radius: 30px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(5px); cursor: pointer;
    }
    .shutter { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #0ff; display: flex; align-items: center; justify-content: center; }
    .shutter-inner { width: 80%; height: 80%; background: #fff; border-radius: 50%; }

    #flowerNamePopup {
      position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
      background: rgba(0, 20, 30, 0.9); backdrop-filter: blur(20px);
      padding: 12px 25px; border-radius: 30px; border: 1px solid #0ff;
      z-index: 1100; opacity: 0; transition: 0.3s; pointer-events: none;
    }
    #flowerNamePopup.show { opacity: 1; }

    .welcome-screen {
      position: fixed; inset: 0; z-index: 2000; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: 1s; text-align: center; padding: 20px;
    }
    .welcome-screen.hidden { transform: translateY(-100%); pointer-events: none; }
    .start-btn {
      background: none; border: 3px solid #0ff; color: #0ff; padding: 18px 45px;
      border-radius: 50px; font-weight: bold; cursor: pointer; letter-spacing: 5px;
    }

    /* Кнопка гербарію */
    .herbarium-toggle {
      position: absolute; top: 20px; left: 20px; z-index: 1050;
      background: rgba(0,40,30,0.6); border: 2px solid #0f8; color: #0f8;
      width: 50px; height: 50px; border-radius: 25px; display: flex;
      align-items: center; justify-content: center; font-size: 28px;
      backdrop-filter: blur(10px); cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ВІТАЛЬНИЙ ЕКРАН -->
<div class="welcome-screen" id="welcome">
  <h1 style="color:#0ff;">🌿 SMARTLESSA</h1>
  <p style="margin:20px;">Знайди 12 QR-кодів у школі, щоб зібрати рідкісні квіти</p>
  <button class="start-btn" id="startBtn">РОЗПОЧАТИ КВЕСТ</button>
</div>

<!-- Кнопка відкриття гербарію -->
<div class="herbarium-toggle" id="toggleHerbarium">📖</div>

<!-- Панель гербарію -->
<div class="herbarium-panel" id="herbariumPanel">
  <div class="close-herbarium" id="closeHerbarium">&times;</div>
  <h3 style="color:#0f8; margin-bottom:15px;">ТВІЙ ГЕРБАРІЙ</h3>
  <div class="herbarium-grid" id="herbariumGrid"></div>
  <p style="margin-top:15px; text-align:center;">
    <button id="useHerbariumBtn" style="background:#0f8; color:#000; border:none; padding:12px 25px; border-radius:30px; font-weight:bold;">СПЛЕСТИ ВІНОК ІЗ ЗНАЙДЕНОГО</button>
  </p>
</div>

<!-- AR VIEW -->
<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flowerNamePopup"><span id="popupText">КВІТКА</span></div>
  
  <div class="hologram-panel">
    <div class="mission-header">
      <span>🌱 МІСІЯ: ХРАНИТЕЛІ</span>
      <span class="flower-counter" id="flowerCounter">0/12</span>
    </div>
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
      <button class="hologram-btn" onclick="window.resetWreath()">✕</button>
      <div class="shutter" onclick="window.capturePhoto()"><div class="shutter-inner"></div></div>
      <button class="hologram-btn" id="shareBtn">↗</button>
    </div>
  </div>
</div>

<audio id="fonMusic" src="fon.mp3" loop></audio>
<audio id="addSound" src="data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f38="></audio>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  // ----- ДАНІ КВІТІВ (15) -----
  const flowers = [
    { id: 1, src: 'flower_1.png', name: 'Шафран Гейфелів' }, { id: 2, src: 'flower_2.png', name: 'Нарцис' },
    { id: 3, src: 'flower_3.png', name: 'Тюльпан' }, { id: 4, src: 'flower_4.png', name: 'Горицвіт' },
    { id: 5, src: 'flower_5.png', name: 'Півники' }, { id: 6, src: 'flower_6.png', name: 'Сон-трава' },
    { id: 7, src: 'flower_7.png', name: 'Дзвоники' }, { id: 8, src: 'flower_8.png', name: 'Тирлич' },
    { id: 9, src: 'flower_9.png', name: 'Айстра' }, { id: 10, src: 'flower_10.png', name: 'Фіалка' },
    { id: 11, src: 'flower_11.png', name: 'Підсніжник' }, { id: 12, src: 'flower_12.png', name: 'Черевички' },
    { id: 13, src: 'flower_13.png', name: 'Лілія' }, { id: 14, src: 'flower_14.png', name: 'Едельвейс' },
    { id: 15, src: 'flower_15.png', name: 'Червона рута' }
  ];

  // QR-коди: очікувані рядки (згенеруй QR з такими рядками)
  const QR_FLOWER_MAP = {
    "SMARTLESSA_FLOWER_1": 1,
    "SMARTLESSA_FLOWER_2": 2,
    "SMARTLESSA_FLOWER_3": 3,
    "SMARTLESSA_FLOWER_4": 4,
    "SMARTLESSA_FLOWER_5": 5,
    "SMARTLESSA_FLOWER_6": 6,
    "SMARTLESSA_FLOWER_7": 7,
    "SMARTLESSA_FLOWER_8": 8,
    "SMARTLESSA_FLOWER_9": 9,
    "SMARTLESSA_FLOWER_10": 10,
    "SMARTLESSA_FLOWER_11": 11,
    "SMARTLESSA_FLOWER_12": 12
  };

  // Стан
  window.state = { selected: [] };          // поточний вінок
  let foundFlowers = [];                     // масив id знайдених квітів (з localStorage)
  
  // Завантаження з localStorage
  function loadFoundFlowers() {
    const stored = localStorage.getItem('smartlessa_found');
    if (stored) {
      foundFlowers = JSON.parse(stored);
    } else {
      foundFlowers = [];
    }
  }
  function saveFoundFlowers() {
    localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers));
  }
  loadFoundFlowers();

  const flowerImages = {};
  flowers.forEach(f => { const img = new Image(); img.src = f.src; flowerImages[f.id] = img; });

  const video = document.getElementById('videoElement');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d');
  const addSound = document.getElementById('addSound');
  const counterSpan = document.getElementById('flowerCounter');

  // Three.js ініціалізація
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0'; renderer.domElement.style.left = '0';
  renderer.domElement.style.zIndex = '15';
  renderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0'; labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.zIndex = '16';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(labelRenderer.domElement);

  const haloGroup = new THREE.Group();
  scene.add(haloGroup);

  // Оновлення вінка (з state.selected)
  function updateWreath() {
    while(haloGroup.children.length) haloGroup.remove(haloGroup.children[0]);
    const count = window.state.selected.length;
    counterSpan.textContent = `${count}/12`;
    
    if (count === 0) return;

    window.state.selected.forEach((f, i) => {
      const div = document.createElement('div');
      div.innerHTML = `<img src="${flowerImages[f.id].src}" style="width:65px; height:65px; filter:drop-shadow(0 0 10px cyan);">`;
      const label = new CSS2DObject(div);
      const angle = (i / count) * Math.PI * 2;
      label.position.set(Math.cos(angle) * 0.8, Math.sin(angle) * 0.3, 0); 
      haloGroup.add(label);
    });
  }

  // Стрічки (як раніше)
  function drawRibbons(landmarks) {
    const left = landmarks[234], right = landmarks[454];
    const headW = Math.abs(right.x * canvas.width - left.x * canvas.width);
    const time = Date.now() / 200;
    const wave = Math.sin(time) * 25;

    ctx.save();
    ctx.lineWidth = canvas.width * 0.035;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.4)';

    const drawSide = (point, side) => {
      const sx = point.x * canvas.width;
      const sy = point.y * canvas.height - headW * 0.3;
      const ex = side === 'left' ? canvas.width * 0.2 : canvas.width * 0.8;
      const ey = canvas.height * 0.9;

      ctx.strokeStyle = '#2a6f9c';
      ctx.beginPath();
      ctx.moveTo(sx - (side==='left'? 8 : -8), sy);
      ctx.bezierCurveTo(sx + (side==='left'? -80 : 80) + wave, sy + 150, ex + (side==='left'? 60 : -60) - wave, ey - 120, ex - 8, ey);
      ctx.stroke();

      ctx.strokeStyle = '#e0b044';
      ctx.beginPath();
      ctx.moveTo(sx + (side==='left'? 8 : -8), sy);
      ctx.bezierCurveTo(sx + (side==='left'? -60 : 60) - wave, sy + 150, ex + (side==='left'? 90 : -90) + wave, ey - 120, ex + 8, ey);
      ctx.stroke();
    };
    drawSide(left, 'left'); drawSide(right, 'right');
    ctx.restore();
  }

  // Сканування QR-коду
  function scanQRCode() {
    if (canvas.width === 0 || canvas.height === 0) return;
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);
    if (code && QR_FLOWER_MAP[code.data]) {
      const flowerId = QR_FLOWER_MAP[code.data];
      if (!foundFlowers.includes(flowerId)) {
        foundFlowers.push(flowerId);
        saveFoundFlowers();
        const flower = flowers.find(f => f.id === flowerId);
        document.getElementById('popupText').textContent = `🌼 ${flower.name} знайдено!`;
        document.getElementById('flowerNamePopup').classList.add('show');
        setTimeout(() => document.getElementById('flowerNamePopup').classList.remove('show'), 2500);
        addSound.play().catch(()=>{});
        updateHerbariumUI();
        if (navigator.vibrate) navigator.vibrate(50);
      }
    }
  }

  // Основний цикл результатів FaceMesh
  window.onResults = function(results) {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    // QR-сканування (раз на 10 кадрів для продуктивності)
    if (Math.random() < 0.3) scanQRCode();

    if (results.multiFaceLandmarks?.[0]) {
      const l = results.multiFaceLandmarks[0];
      const centerX = (l[234].x + l[454].x) / 2;
      const centerY = (l[10].y + l[168].y) / 2 - 0.02;
      
      haloGroup.position.set((centerX - 0.5) * 5, -(centerY - 0.5) * 5, -l[1].z * 5);
      haloGroup.rotation.z = Math.atan2(l[454].y - l[234].y, l[454].x - l[234].x);

      const mouthWidth = Math.hypot(l[61].x - l[291].x, l[61].y - l[291].y);
      if (mouthWidth > 0.18) drawRibbons(l);
    }
    ctx.restore();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  };

  // UI: скрол для ручного вибору
  const scroll = document.getElementById('flowerScroll');
  flowers.forEach(f => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `<img src="${f.src}">`;
    card.onclick = () => {
      document.getElementById('popupText').textContent = f.name;
      document.getElementById('flowerNamePopup').classList.add('show');
      setTimeout(() => document.getElementById('flowerNamePopup').classList.remove('show'), 2000);
      
      if (window.state.selected.length < 15) {
        window.state.selected.push({id: f.id});
        updateWreath();
        addSound.play().catch(()=>{});
      }
    };
    scroll.appendChild(card);
  });

  // Гербарій UI
  const herbariumGrid = document.getElementById('herbariumGrid');
  function updateHerbariumUI() {
    herbariumGrid.innerHTML = '';
    flowers.forEach(f => {
      const item = document.createElement('div');
      item.className = `herb-item ${foundFlowers.includes(f.id) ? 'found' : ''}`;
      item.innerHTML = `<img src="${f.src}"><div style="font-size:10px;">${f.name.split(' ')[0]}</div>`;
      herbariumGrid.appendChild(item);
    });
  }
  updateHerbariumUI();

  document.getElementById('toggleHerbarium').onclick = () => {
    document.getElementById('herbariumPanel').classList.add('show');
  };
  document.getElementById('closeHerbarium').onclick = () => {
    document.getElementById('herbariumPanel').classList.remove('show');
  };

  // Кнопка "Сплести вінок із знайденого"
  document.getElementById('useHerbariumBtn').onclick = () => {
    if (foundFlowers.length === 0) {
      alert('Спочатку знайди хоча б одну квітку через QR!');
      return;
    }
    window.state.selected = foundFlowers.map(id => ({ id }));
    updateWreath();
    document.getElementById('herbariumPanel').classList.remove('show');
  };

  // Старт
  document.getElementById('startBtn').onclick = () => {
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('fonMusic').play().catch(()=>{});
    
    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({refineLandmarks: true, minDetectionConfidence: 0.5});
    faceMesh.onResults(window.onResults);
    new Camera(video, {
      onFrame: async () => { 
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        await faceMesh.send({image: video}); 
      },
      width: 1280, height: 720
    }).start();
  };

  // Скріншот
  window.capturePhoto = () => {
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
    const fCtx = finalCanvas.getContext('2d');
    fCtx.drawImage(canvas, 0, 0);
    fCtx.drawImage(renderer.domElement, 0, 0, finalCanvas.width, finalCanvas.height);
    const link = document.createElement('a');
    link.download = `herbarium-${Date.now()}.png`;
    link.href = finalCanvas.toDataURL('image/png');
    link.click();
    if (navigator.vibrate) navigator.vibrate(30);
  };

  window.resetWreath = () => { window.state.selected = []; updateWreath(); };

  document.getElementById('shareBtn').onclick = async () => {
    window.capturePhoto();
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
    const fCtx = finalCanvas.getContext('2d');
    fCtx.drawImage(canvas, 0, 0);
    fCtx.drawImage(renderer.domElement, 0, 0, finalCanvas.width, finalCanvas.height);
    const blob = await new Promise(r => finalCanvas.toBlob(r, 'image/png'));
    const file = new File([blob], 'herbarium.png', { type: 'image/png' });
    if (navigator.canShare?.({files: [file]})) {
      await navigator.share({ files: [file], title: 'Мій гербарій', text: `Я знайшов ${foundFlowers.length} рідкісних квітів у школі! Спробуй і ти: https://lessa2332.github.io/naturel/` });
    } else { alert('Фото збережено!'); }
  };

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
