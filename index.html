<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vinok AR · SmartLessa 2026</title>
    <style>
        :root { --gold: #f3cf8a; --white: #ffffff; --glass: rgba(0, 0, 0, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%) scaleX(-1); }

        /* Заставка */
        .welcome-screen { position: fixed; inset: 0; z-index: 2000; background: radial-gradient(circle, #1a251a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
        .welcome-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .smart-lessa-typo { font-size: 2.2rem; font-weight: 200; letter-spacing: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; text-align: center; }

        /* UI */
        .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 20px calc(40px + env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 1000; pointer-events: none; }
        .flower-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; pointer-events: auto; }
        .flower-scroll::-webkit-scrollbar { display: none; }

        .item-card { min-width: 80px; height: 90px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }
        .item-card:active { transform: scale(0.9); border-color: var(--gold); }
        .item-card img { width: 50px; height: 50px; object-fit: contain; }
        .item-card span { font-size: 9px; color: var(--gold); margin-top: 5px; font-weight: bold; text-transform: uppercase; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; pointer-events: auto; }
        .btn-utility { width: 55px; height: 55px; border-radius: 18px; background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.1); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-capture { background: var(--gold); color: #000; padding: 15px 40px; border-radius: 30px; font-weight: 800; border: none; letter-spacing: 1px; cursor: pointer; }
    </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
    <div class="smart-lessa-typo">SMARTLESSA</div>
    <p style="color: var(--gold); opacity: 0.6; font-size: 11px; letter-spacing: 4px;">ETHNO AR · 2026</p>
    <button onclick="startApp()" style="margin-top: 40px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; border-radius: 40px; cursor: pointer; font-weight: 600;">ВІДКРИТИ ПОРТАЛ</button>
</div>

<video id="videoElement" autoplay playsinline muted style="display:none;"></video>
<canvas id="outputCanvas"></canvas>

<div class="bottom-nav">
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
        <button class="btn-utility" onclick="state.selected = []">✕</button>
        <button class="btn-capture" onclick="capture()">ЗБЕРЕГТИ ОБРАЗ</button>
        <button class="btn-utility" onclick="location.reload()">🔄</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const flowersData = [
        { id: 1, name: 'Шафран', src: 'flower_1.png' },
        { id: 2, name: 'Нарцис', src: 'flower_2.png' },
        { id: 3, name: 'Тюльпан', src: 'flower_3.png' },
        { id: 4, name: 'Горицвіт', src: 'flower_4.png' },
        { id: 5, name: 'Півники', src: 'flower_5.png' },
        { id: 6, name: 'Сон-трава', src: 'flower_6.png' }
    ];

    let state = { selected: [], smile: 0, imgs: {} };
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('videoElement');

    // Передзавантаження
    flowersData.forEach(f => {
        const img = new Image();
        img.src = f.src;
        state.imgs[f.id] = img;
    });

    function initUI() {
        const scroll = document.getElementById('flowerScroll');
        flowersData.forEach(f => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.innerHTML = `<img src="${f.src}"><span>${f.name}</span>`;
            card.onclick = () => {
                if(state.selected.length < 12) {
                    state.selected.push({ id: f.id, scale: 0, rot: (Math.random()-0.5)*0.3 });
                }
            };
            scroll.appendChild(card);
        });
    }

    async function startApp() {
        document.getElementById('welcome').classList.add('hidden');
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
        faceMesh.onResults(onResults);

        const camera = new Camera(video, {
            onFrame: async () => {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                await faceMesh.send({image: video});
            },
            width: 1280, height: 720
        });
        camera.start();
    }

    function onResults(results) {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

        if (results.multiFaceLandmarks?.[0]) {
            const l = results.multiFaceLandmarks[0];
            
            // Посмішка (для динаміки вінка)
            const mouthW = Math.hypot(l[61].x - l[291].x, l[61].y - l[291].y);
            const faceW = Math.hypot(l[234].x - l[454].x, l[234].y - l[454].y);
            state.smile = Math.max(0, (mouthW / faceW - 0.35) * 10);

            drawRibbons(l);
            drawNimbus(l);
        }
        ctx.restore();
    }

    function drawRibbons(l) {
        if(state.selected.length === 0) return;

        // Крайні точки вінка (біля скронь)
        const leftPoint = l[127], rightPoint = l[356];
        const time = Date.now() / 300;
        const wave = Math.sin(time) * 25;

        ctx.save();
        ctx.lineWidth = canvas.width * 0.035;
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.85;

        const renderSide = (p, isLeft) => {
            const sx = p.x * canvas.width;
            const sy = p.y * canvas.height;
            const targetX = isLeft ? sx - 80 : sx + 80;
            const ey = canvas.height * 1.2;

            // Стрічка 1 (Синя)
            ctx.strokeStyle = '#0057b7';
            ctx.beginPath(); ctx.moveTo(sx - 10, sy);
            ctx.bezierCurveTo(sx + wave, sy + 200, targetX - wave, ey - 200, targetX - 10, ey);
            ctx.stroke();

            // Стрічка 2 (Жовта)
            ctx.strokeStyle = '#ffd700';
            ctx.beginPath(); ctx.moveTo(sx + 10, sy);
            ctx.bezierCurveTo(sx - wave, sy + 200, targetX + wave, ey - 200, targetX + 10, ey);
            ctx.stroke();
        };

        renderSide(leftPoint, true);
        renderSide(rightPoint, false);
        ctx.restore();
    }

    function drawNimbus(l) {
        // Точки для "Німба" (широка дуга над головою)
        const p0 = { x: l[127].x * canvas.width, y: l[127].y * canvas.height - 20 }; // Ліворуч за вухом
        const p2 = { x: l[356].x * canvas.width, y: l[356].y * canvas.height - 20 }; // Праворуч за вухом
        const headWidth = Math.abs(p2.x - p0.x);
        
        // Верхівка німба
        const p1 = { 
            x: (p0.x + p2.x) / 2, 
            y: (l[10].y * canvas.height) - (headWidth * 0.75) 
        };

        state.selected.forEach((f, i) => {
            const t = state.selected.length === 1 ? 0.5 : i / (state.selected.length - 1);
            const mt = 1 - t;
            
            // Квадратична крива Безьє для розміщення
            const x = mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x;
            const y = mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y;

            // Анімація появи
            if (f.scale < 1) f.scale += 0.08;
            
            // Розмір квітки (збільшений + реакція на посмішку)
            const size = (headWidth * 0.38) * f.scale * (1 + state.smile * 0.15);
            const img = state.imgs[f.id];

            if (img && img.complete) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(f.rot);
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.drawImage(img, -size/2, -size/2, size, size);
                ctx.restore();
            }
        });
    }

    function capture() {
        const link = document.createElement('a');
        link.download = 'smartlessa-vinok.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    initUI();
</script>
</body>
</html>
