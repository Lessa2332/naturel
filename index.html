<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f0a">
  <title>SmartLessa · Портал Хранителів</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{name:'SmartLessa',short_name:'Lessa',icons:[{src:'icon-192.png',sizes:'192x192',type:'image/png'}],start_url:'.',display:'standalone',background_color:'#0a0f0a',theme_color:'#c9a23d'}">
  
  <!-- CSP (базовий) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net; font-src 'self';">
  
  <style>
    /* ----- GLOBAL PREMIUM STYLES ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --gold: #c9a23d;
      --gold-light: #e2c47c;
      --dark: #0a0f0a;
      --glass: rgba(20, 30, 20, 0.65);
      --blur: blur(20px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: #000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* AR Viewport */
    #videoElement, #outputCanvas {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%) scaleX(-1);
      z-index: 10;
    }

    /* ----- GOLD PREMIUM UI COMPONENTS ----- */
    .glass-panel {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(201, 162, 61, 0.25);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(201,162,61,0.2) inset;
    }

    /* Гербарій (модальне вікно) */
    .herbarium-panel {
      position: absolute;
      top: max(20px, env(safe-area-inset-top));
      left: 20px;
      right: 20px;
      z-index: 1200;
      padding: 24px 20px;
      max-height: calc(100dvh - 100px);
      overflow-y: auto;
      display: none;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      background: rgba(10, 20, 10, 0.8);
      border: 1px solid rgba(201,162,61,0.4);
      border-radius: 36px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
    }
    .herbarium-panel.show { display: block; }

    .herbarium-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .herb-item {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid rgba(201,162,61,0.2);
      transition: all 0.2s ease;
    }
    .herb-item.found {
      border-color: var(--gold);
      background: rgba(201,162,61,0.1);
      box-shadow: 0 0 20px rgba(201,162,61,0.2);
    }
    .herb-item img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: grayscale(0.7);
      transition: filter 0.3s;
    }
    .herb-item.found img { filter: none; }
    .herb-item span {
      display: block;
      font-size: 12px;
      margin-top: 8px;
      color: var(--gold-light);
      font-weight: 400;
    }

    /* Кнопка закриття */
    .close-btn {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: var(--gold);
      font-size: 32px;
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      transition: background 0.2s;
    }
    .close-btn:hover { background: rgba(255,255,255,0.05); }

    /* Нижня голограма (зона великого пальця) */
    .hologram-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      padding: 20px 16px calc(20px + var(--safe-bottom));
      background: rgba(10, 18, 10, 0.5);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(201,162,61,0.3);
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 -5px 30px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(201,162,61,0.2) inset;
      z-index: 1000;
    }

    .mission-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 8px;
    }
    .mission-title {
      color: var(--gold-light);
      font-weight: 500;
      letter-spacing: 1.5px;
      font-size: 14px;
      text-transform: uppercase;
    }
    .flower-counter {
      background: rgba(201,162,61,0.15);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-weight: 600;
      font-size: 16px;
      backdrop-filter: blur(5px);
    }

    /* Скрол квітів */
    .flower-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 8px 4px 16px;
      margin-bottom: 8px;
      scrollbar-width: none;
    }
    .flower-scroll::-webkit-scrollbar { display: none; }

    .item-card {
      min-width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(201,162,61,0.25);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.2,0,0,1);
      flex-shrink: 0;
      cursor: pointer;
    }
    .item-card:active {
      transform: scale(0.92);
      background: rgba(201,162,61,0.2);
      border-color: var(--gold);
    }
    .item-card img {
      width: 55px;
      height: 55px;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    /* Action Bar — великі кнопки для пальця */
    .action-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0 4px;
    }
    .gold-btn {
      background: none;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      width: 64px;
      height: 64px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .gold-btn:active {
      transform: scale(0.9);
      background: var(--gold);
      color: #000;
    }

    .shutter {
      width: 80px;
      height: 80px;
      border-radius: 60px;
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }
    .shutter:active { transform: scale(0.92); }
    .shutter-inner {
      width: 70%;
      height: 70%;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 25px var(--gold);
    }

    /* Спливаюче повідомлення */
    #flowerNamePopup {
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 20, 10, 0.9);
      backdrop-filter: blur(30px);
      padding: 14px 28px;
      border-radius: 60px;
      border: 1px solid var(--gold);
      z-index: 1100;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      color: var(--gold-light);
      font-weight: 500;
    }
    #flowerNamePopup.show { opacity: 1; }

    /* Стартовий екран (мінімалізм) */
    .welcome-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: #050805;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 1s cubic-bezier(0.2,0,0,1);
      text-align: center;
      padding: 20px;
    }
    .welcome-screen.hidden { transform: translateY(-100%); pointer-events: none; }
    .welcome-logo {
      font-size: clamp(2.8rem, 15vw, 5rem);
      font-weight: 600;
      letter-spacing: 8px;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,162,61,0.4);
      margin-bottom: 30px;
    }
    .welcome-desc {
      color: #ccc;
      max-width: 320px;
      margin-bottom: 40px;
      font-size: 16px;
    }
    .start-btn {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 18px 50px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 18px;
      cursor: pointer;
      letter-spacing: 4px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }
    .start-btn:active { background: var(--gold); color: #000; }

    /* Кнопка гербарію (у верхньому лівому куті) */
    .herbarium-toggle {
      position: absolute;
      top: calc(20px + env(safe-area-inset-top));
      left: 20px;
      z-index: 1050;
      width: 56px;
      height: 56px;
      border-radius: 30px;
      background: rgba(20,30,20,0.6);
      backdrop-filter: blur(15px);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Статус помилок */
    .error-toast {
      position: fixed;
      bottom: 120px;
      left: 20px;
      right: 20px;
      background: rgba(180, 40, 40, 0.9);
      color: white;
      padding: 16px;
      border-radius: 40px;
      text-align: center;
      z-index: 1300;
      backdrop-filter: blur(20px);
      display: none;
    }
  </style>
</head>
<body>

<!-- Стартовий екран -->
<div class="welcome-screen" id="welcome">
  <div class="welcome-logo">SMARTLESSA</div>
  <div class="welcome-desc">Таємна локація · Шкільний портал</div>
  <div class="welcome-desc" style="font-size:14px; margin-top:-20px;">Знайди 12 QR-кодів, щоб зібрати рідкісні квіти</div>
  <button class="start-btn" id="startBtn">АКТИВУВАТИ</button>
  <p style="margin-top: 50px; color: #888; font-size: 12px;">піднеси долоню до камери</p>
</div>

<!-- Кнопка гербарію -->
<div class="herbarium-toggle" id="toggleHerbarium">🌿</div>

<!-- Панель гербарію -->
<div class="herbarium-panel" id="herbariumPanel">
  <button class="close-btn" id="closeHerbarium">✕</button>
  <h2 style="color:var(--gold); font-weight:400; letter-spacing:2px;">Гербарій</h2>
  <div class="herbarium-grid" id="herbariumGrid"></div>
  <div style="margin-top: 30px; text-align: center;">
    <button id="useHerbariumBtn" style="background:var(--gold); border:none; color:#000; padding: 16px 30px; border-radius: 50px; font-weight:600; font-size:16px; cursor:pointer;">Сплести вінок із знайденого</button>
  </div>
</div>

<!-- AR Viewport -->
<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flowerNamePopup"><span id="popupText">Квітка</span></div>
  
  <!-- Нижня голограма -->
  <div class="hologram-panel">
    <div class="mission-header">
      <span class="mission-title">Місія: Хранителі</span>
      <span class="flower-counter" id="flowerCounter">0/12</span>
    </div>
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
      <button class="gold-btn" onclick="window.resetWreath()">✕</button>
      <div class="shutter" onclick="window.capturePhoto()"><div class="shutter-inner"></div></div>
      <button class="gold-btn" id="shareBtn">↗</button>
    </div>
  </div>
</div>

<!-- Повідомлення про помилку -->
<div class="error-toast" id="errorToast"></div>

<audio id="fonMusic" src="fon.mp3" loop></audio>
<audio id="addSound" src="data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f38="></audio>

<!-- Service Worker (PWA) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register("data:application/javascript,self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})");
    });
  }
</script>

<!-- Залежності -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  // ----- Конфігурація -----
  const flowers = [
    { id: 1, src: 'flower_1.png', name: 'Шафран Гейфелів' }, { id: 2, src: 'flower_2.png', name: 'Нарцис' },
    { id: 3, src: 'flower_3.png', name: 'Тюльпан' }, { id: 4, src: 'flower_4.png', name: 'Горицвіт' },
    { id: 5, src: 'flower_5.png', name: 'Півники' }, { id: 6, src: 'flower_6.png', name: 'Сон-трава' },
    { id: 7, src: 'flower_7.png', name: 'Дзвоники' }, { id: 8, src: 'flower_8.png', name: 'Тирлич' },
    { id: 9, src: 'flower_9.png', name: 'Айстра' }, { id: 10, src: 'flower_10.png', name: 'Фіалка' },
    { id: 11, src: 'flower_11.png', name: 'Підсніжник' }, { id: 12, src: 'flower_12.png', name: 'Черевички' },
    { id: 13, src: 'flower_13.png', name: 'Лілія' }, { id: 14, src: 'flower_14.png', name: 'Едельвейс' },
    { id: 15, src: 'flower_15.png', name: 'Червона рута' }
  ];

  const QR_FLOWER_MAP = {
    "SMARTLESSA_FLOWER_1": 1, "SMARTLESSA_FLOWER_2": 2, "SMARTLESSA_FLOWER_3": 3,
    "SMARTLESSA_FLOWER_4": 4, "SMARTLESSA_FLOWER_5": 5, "SMARTLESSA_FLOWER_6": 6,
    "SMARTLESSA_FLOWER_7": 7, "SMARTLESSA_FLOWER_8": 8, "SMARTLESSA_FLOWER_9": 9,
    "SMARTLESSA_FLOWER_10": 10, "SMARTLESSA_FLOWER_11": 11, "SMARTLESSA_FLOWER_12": 12
  };

  // Глобальний стан
  window.state = { selected: [] };
  let foundFlowers = [];
  
  function loadFound() {
    const stored = localStorage.getItem('smartlessa_found');
    foundFlowers = stored ? JSON.parse(stored) : [];
  }
  function saveFound() { localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers)); }
  loadFound();

  const flowerImages = {};
  flowers.forEach(f => { const img = new Image(); img.src = f.src; flowerImages[f.id] = img; });

  const video = document.getElementById('videoElement');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d');
  const addSound = document.getElementById('addSound');
  const counterSpan = document.getElementById('flowerCounter');
  const errorToast = document.getElementById('errorToast');

  function showError(msg) {
    errorToast.style.display = 'block';
    errorToast.textContent = msg;
    setTimeout(() => errorToast.style.display = 'none', 4000);
  }

  // Three.js ініціалізація
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0'; renderer.domElement.style.left = '0';
  renderer.domElement.style.zIndex = '15';
  renderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;
  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0'; labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.zIndex = '16';
  labelRenderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(labelRenderer.domElement);

  const haloGroup = new THREE.Group();
  scene.add(haloGroup);

  function updateWreath() {
    while(haloGroup.children.length) haloGroup.remove(haloGroup.children[0]);
    const count = window.state.selected.length;
    counterSpan.textContent = `${count}/12`;
    if (count === 0) return;
    window.state.selected.forEach((f, i) => {
      const div = document.createElement('div');
      div.innerHTML = `<img src="${flowerImages[f.id].src}" style="width:65px; height:65px; filter:drop-shadow(0 0 10px #c9a23d);">`;
      const label = new CSS2DObject(div);
      const angle = (i / count) * Math.PI * 2;
      label.position.set(Math.cos(angle) * 0.8, Math.sin(angle) * 0.3, 0);
      haloGroup.add(label);
    });
  }

  function drawRibbons(landmarks) {
    const left = landmarks[234], right = landmarks[454];
    const headW = Math.abs(right.x * canvas.width - left.x * canvas.width);
    const wave = Math.sin(Date.now() / 200) * 25;
    ctx.save();
    ctx.lineWidth = canvas.width * 0.035;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.4)';
    const drawSide = (point, side) => {
      const sx = point.x * canvas.width;
      const sy = point.y * canvas.height - headW * 0.3;
      const ex = side === 'left' ? canvas.width * 0.2 : canvas.width * 0.8;
      const ey = canvas.height * 0.9;
      ctx.strokeStyle = '#2a6f9c';
      ctx.beginPath();
      ctx.moveTo(sx - (side==='left'? 8 : -8), sy);
      ctx.bezierCurveTo(sx + (side==='left'? -80 : 80) + wave, sy + 150, ex + (side==='left'? 60 : -60) - wave, ey - 120, ex - 8, ey);
      ctx.stroke();
      ctx.strokeStyle = '#e0b044';
      ctx.beginPath();
      ctx.moveTo(sx + (side==='left'? 8 : -8), sy);
      ctx.bezierCurveTo(sx + (side==='left'? -60 : 60) - wave, sy + 150, ex + (side==='left'? 90 : -90) + wave, ey - 120, ex + 8, ey);
      ctx.stroke();
    };
    drawSide(left, 'left'); drawSide(right, 'right');
    ctx.restore();
  }

  function scanQRCode() {
    if (canvas.width === 0) return;
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, canvas.width, canvas.height);
    if (code && QR_FLOWER_MAP[code.data]) {
      const flowerId = QR_FLOWER_MAP[code.data];
      if (!foundFlowers.includes(flowerId)) {
        foundFlowers.push(flowerId);
        saveFound();
        const flower = flowers.find(f => f.id === flowerId);
        document.getElementById('popupText').textContent = `🌼 ${flower.name} знайдено!`;
        document.getElementById('flowerNamePopup').classList.add('show');
        setTimeout(() => document.getElementById('flowerNamePopup').classList.remove('show'), 2500);
        addSound.play().catch(()=>{});
        updateHerbariumUI();
        if (navigator.vibrate) navigator.vibrate(30);
      }
    }
  }

  window.onResults = (results) => {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    if (Math.random() < 0.3) scanQRCode();
    if (results.multiFaceLandmarks?.[0]) {
      const l = results.multiFaceLandmarks[0];
      const centerX = (l[234].x + l[454].x) / 2;
      const centerY = (l[10].y + l[168].y) / 2 - 0.02;
      haloGroup.position.set((centerX - 0.5) * 5, -(centerY - 0.5) * 5, -l[1].z * 5);
      haloGroup.rotation.z = Math.atan2(l[454].y - l[234].y, l[454].x - l[234].x);
      if (Math.hypot(l[61].x - l[291].x, l[61].y - l[291].y) > 0.18) drawRibbons(l);
    }
    ctx.restore();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  };

  // UI: скрол квітів
  const scroll = document.getElementById('flowerScroll');
  flowers.forEach(f => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `<img src="${f.src}">`;
    card.onclick = () => {
      document.getElementById('popupText').textContent = f.name;
      document.getElementById('flowerNamePopup').classList.add('show');
      setTimeout(() => document.getElementById('flowerNamePopup').classList.remove('show'), 2000);
      if (window.state.selected.length < 15) {
        window.state.selected.push({id: f.id});
        updateWreath();
        addSound.play().catch(()=>{});
      }
    };
    scroll.appendChild(card);
  });

  // Гербарій UI
  const herbariumGrid = document.getElementById('herbariumGrid');
  function updateHerbariumUI() {
    herbariumGrid.innerHTML = '';
    flowers.forEach(f => {
      const item = document.createElement('div');
      item.className = `herb-item ${foundFlowers.includes(f.id) ? 'found' : ''}`;
      item.innerHTML = `<img src="${f.src}"><span>${f.name.split(' ')[0]}</span>`;
      herbariumGrid.appendChild(item);
    });
  }
  updateHerbariumUI();

  document.getElementById('toggleHerbarium').onclick = () => document.getElementById('herbariumPanel').classList.add('show');
  document.getElementById('closeHerbarium').onclick = () => document.getElementById('herbariumPanel').classList.remove('show');
  document.getElementById('useHerbariumBtn').onclick = () => {
    if (foundFlowers.length === 0) { showError('Спочатку знайди квіти через QR!'); return; }
    window.state.selected = foundFlowers.map(id => ({ id }));
    updateWreath();
    document.getElementById('herbariumPanel').classList.remove('show');
  };

  // Старт
  document.getElementById('startBtn').onclick = async () => {
    if (!navigator.mediaDevices?.getUserMedia) { showError('Камера недоступна'); return; }
    try {
      await navigator.mediaDevices.getUserMedia({ video: true });
    } catch (e) { showError('Дозвіл на камеру відхилено'); return; }
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('fonMusic').play().catch(()=>{});
    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({refineLandmarks: true, minDetectionConfidence: 0.5});
    faceMesh.onResults(window.onResults);
    new Camera(video, {
      onFrame: async () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; await faceMesh.send({image: video}); },
      width: 1280, height: 720
    }).start();
  };

  window.capturePhoto = () => {
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
    const fCtx = finalCanvas.getContext('2d');
    fCtx.drawImage(canvas, 0, 0);
    fCtx.drawImage(renderer.domElement, 0, 0, finalCanvas.width, finalCanvas.height);
    const link = document.createElement('a');
    link.download = `lessa-${Date.now()}.png`;
    link.href = finalCanvas.toDataURL('image/png');
    link.click();
  };

  window.resetWreath = () => { window.state.selected = []; updateWreath(); };
  document.getElementById('shareBtn').onclick = async () => {
    window.capturePhoto();
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
    const fCtx = finalCanvas.getContext('2d');
    fCtx.drawImage(canvas, 0, 0);
    fCtx.drawImage(renderer.domElement, 0, 0, finalCanvas.width, finalCanvas.height);
    const blob = await new Promise(r => finalCanvas.toBlob(r, 'image/png'));
    const file = new File([blob], 'lessa.png', { type: 'image/png' });
    if (navigator.canShare?.({files: [file]})) {
      await navigator.share({ files: [file], title: 'Мій гербарій', text: `Я знайшов ${foundFlowers.length} рідкісних квітів! Спробуй: https://lessa2332.github.io/naturel/` });
    } else { alert('Фото збережено!'); }
  };

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
