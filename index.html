<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f0a">
  <title>SmartLessa · Портал Хранителів 10/10</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,{
    \"name\":\"SmartLessa\",
    \"short_name\":\"Lessa\",
    \"icons\":[{\"src\":\"icon-192.png\",\"sizes\":\"192x192\",\"type\":\"image/png\"}],
    \"start_url\":\".\",
    \"display\":\"standalone\",
    \"background_color\":\"#0a0f0a\",
    \"theme_color\":\"#c9a23d\"
  }">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --gold: #c9a23d; --gold-light: #e2c47c; --dark: #0a0f0a; --glass: rgba(20,30,20,0.65); --blur: blur(20px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
    body { background: #000; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #fff; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
    #videoElement, #outputCanvas { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; object-fit: cover; transform: translate(-50%, -50%) scaleX(-1); z-index: 10; }
    .glass-panel { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(201,162,61,0.25); border-radius: 32px; }
    .herbarium-panel { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 20px; right: 20px; z-index: 1200; padding: 24px 20px; max-height: calc(100dvh - 100px); overflow-y: auto; display: none; backdrop-filter: blur(30px); background: rgba(10,20,10,0.8); border: 1px solid rgba(201,162,61,0.4); border-radius: 36px; }
    .herbarium-panel.show { display: block; }
    .herbarium-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 16px; margin-top: 20px; }
    .herb-item { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 12px 8px; text-align: center; border: 1px solid rgba(201,162,61,0.2); transition: all 0.2s ease; }
    .herb-item.found { border-color: var(--gold); background: rgba(201,162,61,0.1); box-shadow: 0 0 20px rgba(201,162,61,0.2); animation: pop 0.3s ease; }
    @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .herb-item img { width: 60px; height: 60px; object-fit: contain; filter: grayscale(0.7); transition: filter 0.3s; }
    .herb-item.found img { filter: none; }
    .herb-item span { display: block; font-size: 12px; margin-top: 8px; color: var(--gold-light); }
    .close-btn { position: absolute; top: 16px; right: 20px; background: none; border: none; color: var(--gold); font-size: 32px; cursor: pointer; width: 48px; height: 48px; border-radius: 30px; }
    .hologram-panel { position: absolute; bottom: 16px; left: 16px; right: 16px; padding: 20px 16px calc(20px + var(--safe-bottom)); background: rgba(10,18,10,0.5); backdrop-filter: blur(30px); border: 1px solid rgba(201,162,61,0.3); border-radius: 48px 48px 32px 32px; z-index: 1000; }
    .mission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 8px; }
    .mission-title { color: var(--gold-light); font-weight: 500; letter-spacing: 1.5px; font-size: 14px; text-transform: uppercase; }
    .flower-counter { background: rgba(201,162,61,0.15); padding: 8px 18px; border-radius: 40px; border: 1px solid var(--gold); color: var(--gold); font-weight: 600; font-size: 16px; }
    .flower-scroll { display: flex; gap: 14px; overflow-x: auto; padding: 8px 4px 16px; margin-bottom: 8px; scrollbar-width: none; }
    .flower-scroll::-webkit-scrollbar { display: none; }
    .item-card { min-width: 80px; height: 80px; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(201,162,61,0.25); border-radius: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
    .item-card:active { transform: scale(0.92); background: rgba(201,162,61,0.2); }
    .item-card img { width: 55px; height: 55px; object-fit: contain; }
    .action-bar { display: flex; justify-content: space-around; align-items: center; padding: 8px 0 4px; }
    .gold-btn { background: none; border: 1.5px solid var(--gold); color: var(--gold); width: 64px; height: 64px; border-radius: 40px; font-size: 30px; backdrop-filter: blur(10px); cursor: pointer; transition: 0.2s; }
    .gold-btn:active { transform: scale(0.9); background: var(--gold); color: #000; }
    .shutter { width: 80px; height: 80px; border-radius: 60px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
    .shutter:active { transform: scale(0.92); }
    .shutter-inner { width: 70%; height: 70%; background: var(--gold); border-radius: 50%; box-shadow: 0 0 25px var(--gold); }
    #flowerNamePopup { position: fixed; top: 18%; left: 50%; transform: translateX(-50%); background: rgba(10,20,10,0.9); backdrop-filter: blur(30px); padding: 14px 28px; border-radius: 60px; border: 1px solid var(--gold); z-index: 1100; opacity: 0; transition: opacity 0.4s; pointer-events: none; color: var(--gold-light); }
    #flowerNamePopup.show { opacity: 1; }
    .welcome-screen { position: fixed; inset: 0; z-index: 2000; background: #050805; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 1s cubic-bezier(0.2,0,0,1); text-align: center; padding: 20px; }
    .welcome-screen.hidden { transform: translateY(-100%); pointer-events: none; }
    .welcome-logo { font-size: clamp(2.8rem, 15vw, 5rem); font-weight: 600; letter-spacing: 8px; color: var(--gold); text-shadow: 0 0 30px rgba(201,162,61,0.4); margin-bottom: 30px; }
    .welcome-desc { color: #ccc; max-width: 320px; margin-bottom: 40px; font-size: 16px; }
    .start-btn { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 18px 50px; border-radius: 60px; font-weight: 600; font-size: 18px; cursor: pointer; letter-spacing: 4px; transition: 0.3s; }
    .start-btn:active { background: var(--gold); color: #000; }
    .herbarium-toggle { position: absolute; top: calc(20px + env(safe-area-inset-top)); left: 20px; z-index: 1050; width: 56px; height: 56px; border-radius: 30px; background: rgba(20,30,20,0.6); backdrop-filter: blur(15px); border: 1px solid var(--gold); color: var(--gold); font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .error-toast, .info-toast { position: fixed; bottom: 120px; left: 20px; right: 20px; background: rgba(180,40,40,0.9); color: white; padding: 16px; border-radius: 40px; text-align: center; z-index: 1300; backdrop-filter: blur(20px); display: none; }
    .info-toast { background: rgba(0,100,0,0.9); }
    #leaderboard { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 10px; margin-top: 20px; font-size: 14px; }
    #leaderboard span { color: var(--gold); }
    button { cursor: pointer; }
  </style>
</head>
<body>

<div class="welcome-screen" id="welcome">
  <div class="welcome-logo">SMARTLESSA</div>
  <div class="welcome-desc">Таємна локація · Шкільний портал</div>
  <div class="welcome-desc" style="font-size:14px;">Знайди 12 QR-кодів, щоб зібрати рідкісні квіти</div>
  <button class="start-btn" id="startBtn">АКТИВУВАТИ</button>
  <p style="margin-top: 50px; color: #888; font-size: 12px;">піднеси долоню до камери</p>
</div>

<div class="herbarium-toggle" id="toggleHerbarium">🌿</div>
<div class="herbarium-panel" id="herbariumPanel">
  <button class="close-btn" id="closeHerbarium">✕</button>
  <h2 style="color:var(--gold);">Гербарій</h2>
  <div class="herbarium-grid" id="herbariumGrid"></div>
  <div style="margin-top: 20px; text-align: center;">
    <button id="useHerbariumBtn" style="background:var(--gold); border:none; color:#000; padding: 12px 24px; border-radius: 40px; font-weight:600;">Сплести вінок</button>
    <button id="resetProgressBtn" style="background:transparent; border:1px solid red; color:red; padding: 12px 24px; border-radius: 40px; margin-left: 10px;">Скинути прогрес</button>
  </div>
  <div id="leaderboard"><span>🏆 Лідерборд (топ-10)</span><br>Завантаження...</div>
</div>

<div class="ar-viewport">
  <video id="videoElement" autoplay playsinline muted></video>
  <canvas id="outputCanvas"></canvas>
  <div id="flowerNamePopup"><span id="popupText">Квітка</span></div>
  <div class="hologram-panel">
    <div class="mission-header">
      <span class="mission-title">Місія: Хранителі</span>
      <span class="flower-counter" id="flowerCounter">0/12</span>
    </div>
    <div class="flower-scroll" id="flowerScroll"></div>
    <div class="action-bar">
      <button class="gold-btn" id="resetWreathBtn">✕</button>
      <div class="shutter" id="captureBtn"><div class="shutter-inner"></div></div>
      <button class="gold-btn" id="shareBtn">↗</button>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>
<div class="info-toast" id="infoToast"></div>

<audio id="addSound" src="data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f3+AgICAf39/f39/f38="></audio>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "jsqr": "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import jsQR from 'jsqr';

  // ---------- КОНФІГУРАЦІЯ ----------
  const FLOWERS = [
    { id: 1, name: 'Шафран Гейфелів', img: 'flower_1.png' }, { id: 2, name: 'Нарцис', img: 'flower_2.png' },
    { id: 3, name: 'Тюльпан', img: 'flower_3.png' }, { id: 4, name: 'Горицвіт', img: 'flower_4.png' },
    { id: 5, name: 'Півники', img: 'flower_5.png' }, { id: 6, name: 'Сон-трава', img: 'flower_6.png' },
    { id: 7, name: 'Дзвоники', img: 'flower_7.png' }, { id: 8, name: 'Тирлич', img: 'flower_8.png' },
    { id: 9, name: 'Айстра', img: 'flower_9.png' }, { id: 10, name: 'Фіалка', img: 'flower_10.png' },
    { id: 11, name: 'Підсніжник', img: 'flower_11.png' }, { id: 12, name: 'Черевички', img: 'flower_12.png' },
    { id: 13, name: 'Лілія', img: 'flower_13.png' }, { id: 14, name: 'Едельвейс', img: 'flower_14.png' },
    { id: 15, name: 'Червона рута', img: 'flower_15.png' }
  ];
  const QR_MAP = {
    "SMARTLESSA_FLOWER_1":1,"SMARTLESSA_FLOWER_2":2,"SMARTLESSA_FLOWER_3":3,"SMARTLESSA_FLOWER_4":4,
    "SMARTLESSA_FLOWER_5":5,"SMARTLESSA_FLOWER_6":6,"SMARTLESSA_FLOWER_7":7,"SMARTLESSA_FLOWER_8":8,
    "SMARTLESSA_FLOWER_9":9,"SMARTLESSA_FLOWER_10":10,"SMARTLESSA_FLOWER_11":11,"SMARTLESSA_FLOWER_12":12
  };
  let foundFlowers = []; // IDs знайдених квітів
  let wreathFlowers = []; // IDs у вінку
  let deviceId = null;
  let supabase = null;

  // ---------- SUPABASE (опціонально, але для 10/10 додаємо) ----------
  // Якщо не хочеш використовувати Supabase, закоментуй весь блок нижче – все працюватиме локально.
  // Для роботи створи безкоштовний проект на https://supabase.com і встав свої URL та anon key.
  const SUPABASE_URL = 'https://твій-проект.supabase.co';
  const SUPABASE_ANON_KEY = 'твій-аннон-ключ';
  const USE_SUPABASE = false; // Зміни на true, якщо налаштував Supabase

  if (USE_SUPABASE) {
    import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/module/index.js').then(async ({ createClient }) => {
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data: { user }, error } = await supabase.auth.signInAnonymously();
      if (!error && user) deviceId = user.id;
      await loadFromCloud();
      updateUI();
    });
  } else {
    // Локальне збереження
    loadFromLocal();
    updateUI();
  }

  function loadFromLocal() {
    const stored = localStorage.getItem('smartlessa_found');
    foundFlowers = stored ? JSON.parse(stored) : [];
    const wreath = localStorage.getItem('smartlessa_wreath');
    wreathFlowers = wreath ? JSON.parse(wreath) : [];
  }
  function saveToLocal() {
    localStorage.setItem('smartlessa_found', JSON.stringify(foundFlowers));
    localStorage.setItem('smartlessa_wreath', JSON.stringify(wreathFlowers));
  }
  async function loadFromCloud() {
    if (!supabase) return;
    const { data, error } = await supabase.from('users').select('found, wreath').eq('id', deviceId).single();
    if (data) {
      foundFlowers = data.found || [];
      wreathFlowers = data.wreath || [];
    } else {
      foundFlowers = [];
      wreathFlowers = [];
    }
    updateUI();
  }
  async function saveToCloud() {
    if (!supabase) return;
    await supabase.from('users').upsert({ id: deviceId, found: foundFlowers, wreath: wreathFlowers });
    // Оновлюємо лідерборд
    const { data } = await supabase.from('users').select('id, found').order('found', { ascending: false }).limit(10);
    if (data) {
      const leaderDiv = document.getElementById('leaderboard');
      leaderDiv.innerHTML = '<span>🏆 Лідерборд (топ-10)</span><br>' + data.map((u,i)=>`${i+1}. ${u.id.slice(0,6)} — ${u.found.length} квітів`).join('<br>');
    }
  }

  function addFlower(flowerId) {
    if (!foundFlowers.includes(flowerId)) {
      foundFlowers.push(flowerId);
      if (USE_SUPABASE) saveToCloud(); else saveToLocal();
      updateUI();
      const flower = FLOWERS.find(f => f.id === flowerId);
      showPopup(`🌼 ${flower.name} знайдено!`, 2500);
      playSound();
      if (navigator.vibrate) navigator.vibrate(50);
      // Анімація в гербарії
      const herbItem = document.querySelector(`.herb-item[data-id='${flowerId}']`);
      if (herbItem) herbItem.classList.add('found');
    }
  }

  function updateUI() {
    // Лічильник
    document.getElementById('flowerCounter').textContent = `${foundFlowers.length}/12`;
    // Гербарій
    const grid = document.getElementById('herbariumGrid');
    grid.innerHTML = '';
    FLOWERS.forEach(f => {
      const div = document.createElement('div');
      div.className = `herb-item ${foundFlowers.includes(f.id) ? 'found' : ''}`;
      div.setAttribute('data-id', f.id);
      div.innerHTML = `<img src="${f.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23c9a23d%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2255%22%20text-anchor%3D%22middle%22%20fill%3D%22black%22%3E${f.name[0]}%3C%2Ftext%3E%3C%2Fsvg%3E'"><span>${f.name.split(' ')[0]}</span>`;
      grid.appendChild(div);
    });
    // Скрол квітів для вінка – оновлюємо візуально, але залишаємо старі картки (вони вже створені)
    updateWreath3D();
  }

  function updateWreath3D() {
    // Видаляємо старі спрайти
    while(wreathGroup.children.length) wreathGroup.remove(wreathGroup.children[0]);
    const count = wreathFlowers.length;
    if (count === 0) return;
    wreathFlowers.forEach((id, i) => {
      const flower = FLOWERS.find(f => f.id === id);
      if (!flower) return;
      const texture = new THREE.CanvasTexture(generateFlowerIcon(flower.name));
      const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
      const sprite = new THREE.Sprite(material);
      const angle = (i / count) * Math.PI * 2;
      const radius = 0.8;
      sprite.position.set(Math.cos(angle) * radius, Math.sin(angle) * 0.4, 0);
      sprite.scale.set(0.5, 0.5, 1);
      wreathGroup.add(sprite);
    });
  }
  function generateFlowerIcon(name) {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#c9a23d';
    ctx.fillRect(0,0,128,128);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 20px Inter';
    ctx.fillText(name[0], 50, 70);
    return canvas;
  }

  function showPopup(msg, duration=2000) {
    const popup = document.getElementById('flowerNamePopup');
    document.getElementById('popupText').textContent = msg;
    popup.classList.add('show');
    setTimeout(() => popup.classList.remove('show'), duration);
  }
  function playSound() {
    const audio = document.getElementById('addSound');
    audio.play().catch(e=>console.log('audio play blocked'));
  }
  function showInfo(msg) {
    const toast = document.getElementById('infoToast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
  function showError(msg) {
    const toast = document.getElementById('errorToast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);
  }

  // ---------- AR та Three.js ----------
  const video = document.getElementById('videoElement');
  const canvas = document.getElementById('outputCanvas');
  const ctx = canvas.getContext('2d');
  let frameCount = 0;
  let lastQRTime = 0;
  let faceMesh = null;

  // Three.js сцена
  const renderer = new THREE.WebGLRenderer({ alpha: true, preserveDrawingBuffer: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.domElement.style.position = 'absolute';
  renderer.domElement.style.top = '0'; renderer.domElement.style.left = '0';
  renderer.domElement.style.zIndex = '15';
  renderer.domElement.style.pointerEvents = 'none';
  document.querySelector('.ar-viewport').appendChild(renderer.domElement);
  const scene = new THREE.Scene();
  const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera3D.position.z = 5;
  const wreathGroup = new THREE.Group();
  scene.add(wreathGroup);

  function animate3D() {
    requestAnimationFrame(animate3D);
    renderer.render(scene, camera3D);
  }
  animate3D();

  // Основний цикл MediaPipe
  async function startAR() {
    const faceMeshLib = await import('https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js');
    const cameraLib = await import('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js');
    faceMesh = new faceMeshLib.FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults(onResults);
    const camera = new cameraLib.Camera(video, {
      onFrame: async () => {
        if (video.readyState >= 2) {
          canvas.width = video.videoWidth || 640;
          canvas.height = video.videoHeight || 480;
          await faceMesh.send({ image: video });
        }
      },
      width: 640, height: 480
    });
    camera.start();
  }

  function onResults(results) {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
    
    // Сканування QR (1 раз на 10 кадрів)
    frameCount++;
    if (frameCount % 10 === 0) {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);
      if (code && QR_MAP[code.data]) {
        addFlower(QR_MAP[code.data]);
      }
    }
    
    // Позиція вінка за обличчям
    if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
      const lm = results.multiFaceLandmarks[0];
      const centerX = (lm[234].x + lm[454].x) / 2;
      const centerY = (lm[10].y + lm[168].y) / 2 - 0.02;
      wreathGroup.position.set((centerX - 0.5) * 5, -(centerY - 0.5) * 5, -lm[1].z * 5);
      wreathGroup.rotation.z = Math.atan2(lm[454].y - lm[234].y, lm[454].x - lm[234].x);
    }
    ctx.restore();
  }

  // ---------- ІНІЦІАЛІЗАЦІЯ UI ----------
  // Скрол квітів
  const scroll = document.getElementById('flowerScroll');
  FLOWERS.forEach(f => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.innerHTML = `<img src="${f.img}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2240%22%20fill%3D%22%23c9a23d%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2265%22%20text-anchor%3D%22middle%22%20fill%3D%22black%22%20font-size%3D%2240%22%3E${f.name[0]}%3C%2Ftext%3E%3C%2Fsvg%3E'">`;
    card.onclick = () => {
      if (!wreathFlowers.includes(f.id)) {
        wreathFlowers.push(f.id);
        if (USE_SUPABASE) saveToCloud(); else saveToLocal();
        updateWreath3D();
        showPopup(`🌺 ${f.name} додано до вінка`, 1500);
        playSound();
      } else {
        showPopup(`🌸 ${f.name} вже у вінку`, 1000);
      }
    };
    scroll.appendChild(card);
  });

  document.getElementById('resetWreathBtn').onclick = () => {
    wreathFlowers = [];
    if (USE_SUPABASE) saveToCloud(); else saveToLocal();
    updateWreath3D();
    showInfo('Вінок очищено');
  };
  document.getElementById('captureBtn').onclick = () => {
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
    const fCtx = finalCanvas.getContext('2d');
    fCtx.drawImage(canvas, 0, 0);
    fCtx.drawImage(renderer.domElement, 0, 0);
    const link = document.createElement('a');
    link.download = `lessa-${Date.now()}.png`;
    link.href = finalCanvas.toDataURL('image/png');
    link.click();
  };
  document.getElementById('shareBtn').onclick = async () => {
    document.getElementById('captureBtn').click();
    if (navigator.share) {
      try {
        await navigator.share({ title: 'Мій гербарій', text: `Я знайшов ${foundFlowers.length} квітів!` });
      } catch(e) {}
    }
  };
  document.getElementById('toggleHerbarium').onclick = () => document.getElementById('herbariumPanel').classList.add('show');
  document.getElementById('closeHerbarium').onclick = () => document.getElementById('herbariumPanel').classList.remove('show');
  document.getElementById('useHerbariumBtn').onclick = () => {
    if (foundFlowers.length === 0) { showError('Спочатку знайди квіти через QR!'); return; }
    wreathFlowers = [...foundFlowers];
    if (USE_SUPABASE) saveToCloud(); else saveToLocal();
    updateWreath3D();
    document.getElementById('herbariumPanel').classList.remove('show');
    showInfo(`Вінок зібрано з ${wreathFlowers.length} квітів!`);
  };
  document.getElementById('resetProgressBtn').onclick = () => {
    if (confirm('Скинути весь прогрес? Всі знайдені квіти зникнуть.')) {
      foundFlowers = [];
      wreathFlowers = [];
      if (USE_SUPABASE) saveToCloud(); else saveToLocal();
      updateUI();
      updateWreath3D();
      showInfo('Прогрес скинуто');
    }
  };

  // Старт камери після кліку
  document.getElementById('startBtn').onclick = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
      document.getElementById('welcome').classList.add('hidden');
      startAR();
    } catch (err) {
      showError('Помилка доступу до камери. Перевір дозволи.');
      console.error(err);
    }
  };

  // Адаптація розмірів
  window.addEventListener('resize', () => {
    camera3D.aspect = window.innerWidth / window.innerHeight;
    camera3D.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
