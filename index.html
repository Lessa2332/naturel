<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a2f1f">
    <meta name="description" content="Лісовий вінок — AR-маска з квітами для обличчя. Створіть магічне фото з вінком Мавки.">
    <title>🌾 Лісовий вінок · Магічна AR-маска</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0d1f0d;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Quicksand', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            touch-action: pan-x pan-y;
        }

        /* Головний контейнер */
        .app-container {
            max-width: 540px;
            width: 100%;
            max-height: 95vh;
            background: linear-gradient(145deg, #2a3a25, #1f2e1a);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px #e9c47e, 0 0 0 5px rgba(201, 169, 90, 0.3);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            scrollbar-width: thin;
        }

        .app-container::-webkit-scrollbar {
            width: 4px;
        }

        /* Камера */
        .camera-box {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #0a1008;
            overflow: hidden;
            flex-shrink: 0;
            border-radius: 32px 32px 28px 28px;
            margin-bottom: 6px;
        }

        #videoElement, #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #outputCanvas {
            pointer-events: none;
        }

        /* Анімовані стрічки — лісовий вітер */
        .ribbons-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 12;
            overflow: hidden;
        }

        .ribbon {
            position: absolute;
            width: 12px;
            height: 140%;
            top: -20%;
            opacity: 0.9;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            border-radius: 8px;
            animation: swayForest 5s ease-in-out infinite, flutter 2.5s infinite alternate;
            transform-origin: top center;
        }

        .ribbon.blue {
            left: 12%;
            background: linear-gradient(180deg, #2c7ab1, #5dade2, #85c1e9, #5dade2, #2c7ab1);
            animation-delay: 0s, 0.2s;
        }

        .ribbon.yellow {
            right: 12%;
            background: linear-gradient(180deg, #e67e22, #f1c40f, #f9e79f, #f1c40f, #e67e22);
            animation-delay: -1s, 0.7s;
        }

        @keyframes swayForest {
            0%, 100% { transform: rotate(-2deg) translateY(0); }
            50% { transform: rotate(2.5deg) translateY(12px); }
        }

        @keyframes flutter {
            0% { clip-path: inset(0 0 0 0); opacity: 0.85; }
            100% { clip-path: inset(0 -3px 0 3px); opacity: 1; }
        }

        /* Панель квітів */
        .flower-panel {
            background: rgba(45, 35, 25, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            margin: 12px 12px 6px;
            padding: 8px 0;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            border: 1px solid #e2bc73;
        }

        .flower-strip {
            display: inline-flex;
            gap: 12px;
            padding: 0 16px;
        }

        .flower-card {
            font-size: 2.5rem;
            background: radial-gradient(circle at 30% 20%, #fff5e0, #fde5b4);
            width: 70px;
            height: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .flower-card:active {
            transform: scale(0.94);
        }

        .flower-card.selected {
            border-color: #f7b32b;
            box-shadow: 0 0 0 3px #f9d56e, 0 8px 20px black;
            transform: scale(1.02);
        }

        /* Інфо-бар */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: #2b3d25;
            color: #fff2cf;
            font-weight: 600;
            border-radius: 60px;
            margin: 6px 12px;
            backdrop-filter: blur(4px);
        }

        .counter-badge {
            background: #cb7b3c;
            padding: 4px 16px;
            border-radius: 40px;
            color: #2f1d0c;
            font-weight: 800;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.4), 0 2px 6px black;
        }

        .control-btn {
            background: linear-gradient(145deg, #5c3f24, #784e2a);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #fff0d4;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: 0.08s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .control-btn:active {
            transform: scale(0.96);
        }

        .selected-mini-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(25, 38, 20, 0.7);
            border-radius: 48px;
            margin: 6px 12px;
            justify-content: center;
            min-height: 60px;
            backdrop-filter: blur(8px);
        }

        .mini-flower {
            background: linear-gradient(135deg, #ffefcf, #ffe2b5);
            border-radius: 60px;
            padding: 5px 14px;
            font-size: 1.6rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            transition: 0.08s linear;
            font-weight: 500;
        }

        .mini-flower:active {
            transform: scale(0.94);
            background: #ffda99;
        }

        .mini-flower span {
            font-size: 1rem;
            font-weight: bold;
            color: #9b4a1a;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 6px 16px 16px;
        }

        .action-buttons .control-btn {
            flex: 1;
            justify-content: center;
            font-size: 1rem;
        }

        .photo-btn {
            background: linear-gradient(145deg, #b36b2a, #d48d44);
            color: white;
            text-shadow: 0 1px 1px black;
        }

        .instruction {
            text-align: center;
            font-size: 0.75rem;
            padding: 8px 16px 18px;
            color: #dac98b;
        }

        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a18dd;
            backdrop-filter: blur(16px);
            color: #ffefb0;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 300;
            pointer-events: none;
            font-size: 0.9rem;
            border: 1px solid #f5c56e;
            box-shadow: 0 8px 20px black;
            animation: fadeUp 0.2s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .start-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, #1b3518, #0a1808);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
            padding: 32px;
            text-align: center;
        }

        .start-overlay h2 {
            font-size: 2rem;
            color: #fff0bc;
            text-shadow: 0 4px 12px #1f3a1a;
            margin-bottom: 12px;
        }

        .start-btn {
            background: linear-gradient(145deg, #dcb05c, #f7ca7a);
            border: none;
            padding: 14px 36px;
            border-radius: 80px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #2b2a0f;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: 0.1s linear;
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #ddb763;
            border-top: 4px solid #2f6b2f;
            border-radius: 50%;
            animation: spin 1s infinite;
            margin-top: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 500px) {
            .flower-card { width: 60px; height: 60px; font-size: 2rem; }
            .mini-flower { font-size: 1.3rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>

<div class="start-overlay" id="startOverlay">
    <h2>🌾 Лісовий вінок</h2>
    <p style="color:#e7daa4; max-width:280px;">Оберіть квіти та одягніть магічний вінок Мавки. Зробіть фото з лісовою душею ✨</p>
    <button class="start-btn" id="startBtn">🌿 Розпочати</button>
    <div class="loader hidden" id="loaderSpinner"></div>
    <div style="margin-top:24px; font-size:12px; opacity:0.7;">🎵 Фоновий спів лісу</div>
</div>

<div class="app-container hidden" id="appContainer">
    <div class="camera-box">
        <video id="videoElement" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
        <div class="ribbons-container">
            <div class="ribbon blue"></div>
            <div class="ribbon yellow"></div>
        </div>
    </div>

    <div class="info-bar">
        <span>🍃 ВІНОК ЛІСУ</span>
        <span class="counter-badge" id="flowerCounter">0/7</span>
        <button class="control-btn" id="cameraSwitchBtn" title="Перемкнути камеру">📷↺</button>
        <button class="control-btn mute-btn" id="muteBtn">🔊</button>
    </div>

    <div class="flower-panel">
        <div class="flower-strip" id="flowerStrip"></div>
    </div>

    <div class="selected-mini-list" id="selectedMiniList"></div>

    <div class="action-buttons">
        <button class="control-btn photo-btn" id="takePhotoBtn">📸 Зберегти фото</button>
        <button class="control-btn" id="resetBtn">🍂 Скинути</button>
    </div>

    <div class="instruction">
        🌟 Торкнись квітки — додай у вінок (макс. 7) • Торкнись квітки в списку — прибери • Вінок слідує за обличчям
    </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    (function() {
        // ---------- ГЛОБАЛЬНІ КОНСТАНТИ ----------
        const MAX_FLOWERS = 7;
        const FLOWER_EMOJIS = ["🌻", "🌼", "🌸", "🌺", "🌷", "🌹", "💐", "🏵️", "🥀", "🌿", "🍀", "🌸", "🌻", "🌼", "💮", "🌺", "🌷", "🌹", "🌼", "🌸"];
        
        // Точки верхньої дуги голови + вилиці для плавного вінка
        const HEAD_ARC_INDICES = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 0, 263];
        
        // Стан додатку
        let appState = {
            selectedFlowers: [],
            faceLandmarks: null,
            isMuted: false,
            audioCtx: null,
            forestSound: null,
            isARSessionActive: false,
            currentCameraFacing: 'user',
            cameraInstance: null,
            faceMeshInstance: null,
            lastFrameTime: 0,
            isLoading: false
        };
        
        // DOM елементи
        const dom = {
            startOverlay: document.getElementById('startOverlay'),
            appContainer: document.getElementById('appContainer'),
            startBtn: document.getElementById('startBtn'),
            video: document.getElementById('videoElement'),
            canvas: document.getElementById('outputCanvas'),
            flowerCounter: document.getElementById('flowerCounter'),
            resetBtn: document.getElementById('resetBtn'),
            takePhotoBtn: document.getElementById('takePhotoBtn'),
            muteBtn: document.getElementById('muteBtn'),
            cameraSwitchBtn: document.getElementById('cameraSwitchBtn'),
            selectedMiniList: document.getElementById('selectedMiniList'),
            flowerStrip: document.getElementById('flowerStrip'),
            loaderSpinner: document.getElementById('loaderSpinner')
        };
        
        let canvasCtx = null;
        let animationId = null;
        
        // ---------- ФУНКЦІЇ UI ----------
        function showToast(message, duration = 2200) {
            let existing = document.querySelector('.toast-msg');
            if(existing) existing.remove();
            let toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, duration);
        }
        
        function updateFlowerPanel() {
            dom.flowerStrip.innerHTML = '';
            FLOWER_EMOJIS.forEach(emoji => {
                const card = document.createElement('div');
                card.className = 'flower-card';
                card.textContent = emoji;
                card.dataset.flower = emoji;
                if(appState.selectedFlowers.includes(emoji)) card.classList.add('selected');
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addFlower(emoji);
                });
                dom.flowerStrip.appendChild(card);
            });
        }
        
        function updateUI() {
            dom.flowerCounter.textContent = `${appState.selectedFlowers.length}/${MAX_FLOWERS}`;
            dom.selectedMiniList.innerHTML = '';
            if(appState.selectedFlowers.length === 0) {
                let hint = document.createElement('div');
                hint.textContent = '✨ оберіть квіти для віночка ✨';
                hint.style.cssText = 'font-size:0.8rem; opacity:0.8; color:#dccc8a';
                dom.selectedMiniList.appendChild(hint);
            } else {
                appState.selectedFlowers.forEach((flower, idx) => {
                    const chip = document.createElement('div');
                    chip.className = 'mini-flower';
                    chip.innerHTML = `${flower} <span>✕</span>`;
                    chip.addEventListener('click', (e) => {
                        e.stopPropagation();
                        removeFlowerAtIndex(idx);
                    });
                    dom.selectedMiniList.appendChild(chip);
                });
            }
            // Оновлюємо виділення в панелі
            document.querySelectorAll('.flower-card').forEach(card => {
                if(appState.selectedFlowers.includes(card.dataset.flower)) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }
        
        function addFlower(flower) {
            if(appState.selectedFlowers.length >= MAX_FLOWERS) {
                showToast(`🌿 Вінок вже має ${MAX_FLOWERS} квітів!`);
                return false;
            }
            if(appState.selectedFlowers.includes(flower)) {
                showToast('🍃 Ця квітка вже у вінку');
                return false;
            }
            appState.selectedFlowers.push(flower);
            updateUI();
            playSoftSound();
            return true;
        }
        
        function removeFlowerAtIndex(index) {
            if(index >= 0 && index < appState.selectedFlowers.length) {
                appState.selectedFlowers.splice(index, 1);
                updateUI();
                playSoftSound();
            }
        }
        
        function resetWreath() {
            appState.selectedFlowers = [];
            updateUI();
            showToast('🍂 Вінок очищено, оберіть нові квіти');
        }
        
        // ---------- АУДІО (ЛІСОВИЙ ЕМБІЄНТ) ----------
        async function initForestAudio() {
            if(appState.audioCtx) return;
            try {
                appState.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = 4096;
                const noiseNode = (() => {
                    const scriptNode = appState.audioCtx.createScriptProcessor(bufferSize, 1, 1);
                    scriptNode.onaudioprocess = (e) => {
                        const output = e.outputBuffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            output[i] = (Math.random() * 2 - 1) * 0.08;
                        }
                    };
                    return scriptNode;
                })();
                const filter = appState.audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 800;
                filter.Q.value = 2;
                const gain = appState.audioCtx.createGain();
                gain.gain.value = 0.25;
                noiseNode.connect(filter);
                filter.connect(gain);
                gain.connect(appState.audioCtx.destination);
                appState.forestSound = { noiseNode, gain, filter };
                if(appState.audioCtx.state === 'suspended') await appState.audioCtx.resume();
                showToast('🎵 Лісова пісня лунає', 1500);
            } catch(e) { console.warn("audio fallback", e); }
        }
        
        function setAudioMute(muted) {
            if(!appState.forestSound) return;
            appState.forestSound.gain.gain.value = muted ? 0 : 0.25;
            appState.isMuted = muted;
            dom.muteBtn.textContent = muted ? '🔇' : '🔊';
        }
        
        function playSoftSound() {
            if(appState.isMuted || !appState.audioCtx) return;
            try {
                const osc = appState.audioCtx.createOscillator();
                const gain = appState.audioCtx.createGain();
                osc.connect(gain);
                gain.connect(appState.audioCtx.destination);
                osc.frequency.value = 660;
                gain.gain.value = 0.12;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, appState.audioCtx.currentTime + 0.2);
                osc.stop(appState.audioCtx.currentTime + 0.2);
            } catch(e) {}
        }
        
        // ---------- AR: МАЛЮВАННЯ ВІНКА ----------
        function getHeadArcPosition(landmarks, canvasW, canvasH) {
            if(!landmarks) return null;
            const points = HEAD_ARC_INDICES.map(idx => landmarks[idx]).filter(p => p);
            if(points.length < 6) return null;
            let leftMost = points[0], rightMost = points[0], topMost = points[0];
            for(let p of points) {
                if(p.x < leftMost.x) leftMost = p;
                if(p.x > rightMost.x) rightMost = p;
                if(p.y < topMost.y) topMost = p;
            }
            const centerX = (leftMost.x + rightMost.x) / 2;
            const arcHeightPx = (topMost.y - (leftMost.y + rightMost.y)/2) * canvasH;
            const widthPx = (rightMost.x - leftMost.x) * canvasW;
            return {
                leftX: leftMost.x * canvasW,
                rightX: rightMost.x * canvasW,
                topY: topMost.y * canvasH,
                centerX: centerX * canvasW,
                centerY: (leftMost.y + rightMost.y)/2 * canvasH,
                width: widthPx,
                arcCurve: Math.max(24, arcHeightPx * 0.9)
            };
        }
        
        function drawWreathOnCanvas(ctx, canvasW, canvasH, landmarks) {
            if(!landmarks || appState.selectedFlowers.length === 0) return;
            const head = getHeadArcPosition(landmarks, canvasW, canvasH);
            if(!head) return;
            const flowers = appState.selectedFlowers;
            const count = flowers.length;
            const startX = head.leftX;
            const endX = head.rightX;
            const peakY = head.topY - (head.arcCurve * 0.18);
            
            for(let i = 0; i < count; i++) {
                const t = count === 1 ? 0.5 : i / (count - 1);
                const x = startX * (1 - t) + endX * t;
                const yOffset = Math.sin(t * Math.PI) * head.arcCurve * 0.9;
                let y = head.centerY + yOffset - head.arcCurve * 0.2;
                if(t < 0.2) y = peakY + (y - peakY) * (t/0.2);
                if(t > 0.8) y = peakY + (y - peakY) * ((1-t)/0.2);
                
                // Зовнішнє відхилення для природності
                const outward = Math.sin(t * Math.PI) * 14;
                const finalX = x + (t - 0.5) * outward * 0.5;
                const finalY = y - 12;
                const size = 40 + head.arcCurve * 0.12;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.font = `${Math.floor(size)}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = "rgba(0,0,0,0.45)";
                ctx.fillText(flowers[i], finalX + 2, finalY + 2);
                ctx.fillStyle = "#fffef7";
                ctx.fillText(flowers[i], finalX, finalY);
            }
            ctx.shadowBlur = 0;
        }
        
        // ---------- RENDER LOOP (ОПТИМІЗОВАНИЙ) ----------
        function renderFrame() {
            if(!canvasCtx || !dom.canvas || !dom.video.videoWidth) {
                animationId = requestAnimationFrame(renderFrame);
                return;
            }
            if(dom.canvas.width !== dom.video.videoWidth || dom.canvas.height !== dom.video.videoHeight) {
                dom.canvas.width = dom.video.videoWidth;
                dom.canvas.height = dom.video.videoHeight;
            }
            canvasCtx.drawImage(dom.video, 0, 0, dom.canvas.width, dom.canvas.height);
            if(appState.faceLandmarks && appState.selectedFlowers.length > 0) {
                drawWreathOnCanvas(canvasCtx, dom.canvas.width, dom.canvas.height, appState.faceLandmarks);
            }
            animationId = requestAnimationFrame(renderFrame);
        }
        
        // ---------- MEDIAPIPE ТА КАМЕРА ----------
        async function initFaceMeshAndCamera() {
            if(appState.faceMeshInstance) {
                try { await appState.faceMeshInstance.close(); } catch(e) {}
            }
            if(appState.cameraInstance) {
                try { await appState.cameraInstance.stop(); } catch(e) {}
            }
            appState.faceMeshInstance = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });
            appState.faceMeshInstance.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            appState.faceMeshInstance.onResults((results) => {
                if(results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    appState.faceLandmarks = results.multiFaceLandmarks[0];
                } else {
                    appState.faceLandmarks = null;
                }
            });
            
            const videoElement = dom.video;
            const cameraUtils = Camera;
            appState.cameraInstance = new cameraUtils(videoElement, {
                onFrame: async () => {
                    if(appState.isARSessionActive && appState.faceMeshInstance) {
                        await appState.faceMeshInstance.send({image: videoElement});
                    }
                },
                width: 720,
                height: 960,
                facingMode: appState.currentCameraFacing
            });
            await appState.cameraInstance.start();
        }
        
        async function switchCamera() {
            if(!appState.isARSessionActive) return;
            appState.currentCameraFacing = appState.currentCameraFacing === 'user' ? 'environment' : 'user';
            showToast(`🔄 Перемикаємо камеру`, 1000);
            await initFaceMeshAndCamera();
        }
        
        // ---------- ФОТО З ВІНКОМ ----------
        function capturePhoto() {
            if(!dom.canvas.width) {
                showToast("⏳ Камера ще не готова");
                return;
            }
            if(appState.faceLandmarks && appState.selectedFlowers.length) {
                canvasCtx.drawImage(dom.video, 0, 0, dom.canvas.width, dom.canvas.height);
                drawWreathOnCanvas(canvasCtx, dom.canvas.width, dom.canvas.height, appState.faceLandmarks);
            } else if(appState.selectedFlowers.length === 0) {
                showToast("🌼 Додайте хоча б одну квітку до вінка!");
                return;
            }
            try {
                const link = document.createElement('a');
                link.download = `lisovyi_vinok_${Date.now()}.png`;
                link.href = dom.canvas.toDataURL('image/png');
                link.click();
                showToast("📸 Фото збережено! 🌸");
            } catch(e) {
                showToast("❌ Помилка збереження");
            }
        }
        
        // ---------- ЗАПУСК ДОДАТКУ ----------
        async function startApp() {
            if(appState.isLoading) return;
            appState.isLoading = true;
            dom.loaderSpinner.classList.remove('hidden');
            dom.startBtn.disabled = true;
            try {
                await initForestAudio();
                await initFaceMeshAndCamera();
                canvasCtx = dom.canvas.getContext('2d');
                appState.isARSessionActive = true;
                dom.startOverlay.classList.add('hidden');
                dom.appContainer.classList.remove('hidden');
                renderFrame();
                showToast("✨ Вінок готовий! Обирайте квіти ✨");
                if(!appState.isMuted && appState.forestSound) {
                    setAudioMute(false);
                }
            } catch(err) {
                console.error(err);
                showToast("❌ Не вдалося запустити камеру. Перевірте дозволи.");
                dom.startOverlay.classList.remove('hidden');
                dom.appContainer.classList.add('hidden');
            } finally {
                dom.loaderSpinner.classList.add('hidden');
                dom.startBtn.disabled = false;
                appState.isLoading = false;
            }
        }
        
        // ---------- ПОДІЇ ТА ЖИТТЄВИЙ ЦИКЛ ----------
        function bindEvents() {
            dom.startBtn.addEventListener('click', startApp);
            dom.resetBtn.addEventListener('click', resetWreath);
            dom.takePhotoBtn.addEventListener('click', capturePhoto);
            dom.muteBtn.addEventListener('click', () => {
                setAudioMute(!appState.isMuted);
                showToast(appState.isMuted ? "🔇 Ліс затихає" : "🔊 Спів лісу чути");
            });
            dom.cameraSwitchBtn.addEventListener('click', switchCamera);
        }
        
        function initUI() {
            updateFlowerPanel();
            updateUI();
            bindEvents();
        }
        
        document.addEventListener('visibilitychange', () => {
            if(document.hidden && appState.isARSessionActive) {
                if(animationId) cancelAnimationFrame(animationId);
            } else if(!document.hidden && appState.isARSessionActive) {
                renderFrame();
            }
        });
        
        window.addEventListener('load', () => {
            initUI();
        });
    })();
</script>
</body>
</html>
